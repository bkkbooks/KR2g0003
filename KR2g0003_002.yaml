body:
  text: 內篇諫下景公藉重而獄多欲託晏子晏子諫景公藉重而獄多拘者滿圄怨者滿朝晏子諫公不聽公謂晏子曰夫獄國之重官也願託之夫子晏子對曰君將使嬰勑其功乎則嬰有一妄能書足以治之矣君將使嬰勑其意乎夫民無欲殘其家室之生以奉暴上之僻者則君使吏比而焚之而已矣景公不悅曰勑其功則使一妄勑其意則比焚如是夫子無所謂能治國乎晏子曰嬰聞與君異今夫胡狢戎狄之蓄狗也多者十有余寡者五六然不相害傷今束雞豚妄投之其折骨決皮可立待也且夫上正其治下審其論則貴賤不相踰越今君舉千鍾爵祿而妄投之于左右左右爭之甚于胡狗而公不知也寸之管無當天下不能足之以粟今齊國丈夫耕女子織夜以接日不足以奉上而君側皆雕文刻鏤之觀此無當之管也而君終不知五尺童子操寸之煙天下不能足以薪今君之左右皆操煙之徒而君終不知鐘鼓成肆干戚成舞雖禹不能禁民之觀且夫飾民之欲而嚴其聽禁其心聖人所難也而況奪其財而飢之勞其力而疲之常致其苦而嚴聽其獄痛誅其罪非嬰所知也景公欲殺犯所愛之槐者晏子諫景公有所愛槐令吏謹守之植木縣之下令曰犯槐者刑傷之者死有不聞令醉而犯之者公聞之曰是先犯我令使吏拘之且加罪焉其子往辭晏子之家託曰負廓之民賤妾請有道于相國不勝其欲願得充數乎下陳晏子聞之笑曰嬰其淫于色乎何為老而見奔雖然是必有故令內之女子入門晏子望見之曰怪哉有深憂進而問焉曰所憂何也對曰君樹槐縣令犯之者刑傷之者死妾父不仁不聞令醉而犯之吏將加罪焉妾聞之明君蒞國立政不損祿不益刑又不以私恚害公法不為禽獸傷人民不為草木傷禽獸不為野草傷禾苗吾君欲以樹木之故殺妾父孤妾身此令行于民而法于國矣雖然妾聞之勇士不以衆強凌孤獨明惠之君不拂是以行其所欲此譬之猶自治魚鱉者也去其腥臊者而已昧墨與人比居庾肆而教人危坐今君出令于民苟可法于國而善益于後世則父死亦當矣妾為之收亦宜矣甚乎今之令不然以樹木之故罪法妾父妾恐其傷察吏之法而害明君之義也鄰國聞之皆謂吾君愛樹而賤人其可乎願相國察妾言以裁犯禁者晏子曰甚矣吾將為子言之于君使人送之歸明日蚤朝而復于公曰嬰聞之窮民財力以供嗜欲謂之暴崇玩好威嚴擬乎君謂之逆刑殺不稱謂之賊此三者守國之大殃也今君窮民財力以羡飲食之具繁鍾鼓之樂極宮室之觀行暴之大者也崇玩好縣愛槐之令載過者馳步過者趨威嚴擬乎君逆之明者也犯槐者刑傷槐者死刑殺不稱賊民之深者也君享國德行未見于衆而三辟著于國嬰恐其不可以蒞國子民也公曰微大夫教寡人幾有大罪以纍社稷今子大夫教之社稷之福寡人受命矣晏子出公令趣罷守槐之役拔置縣之木廢傷槐之法出犯槐之囚景公逐得斬竹者囚之晏子諫景公樹竹令吏謹守之公出過之有斬竹者焉公以車逐得而拘之將加罪焉晏子入見曰公亦聞吾先君丁公乎公曰何如晏子曰丁公伐曲城勝之止其財出其民公日自蒞之有輿死人以出者公怪之令吏視之則其中有金與玉焉吏請殺其人收其人丁公曰以兵降城以衆圍財不仁且吾聞之人君者寬惠慈衆不身傳誅令捨之公曰善晏子退公令出斬竹之囚景公以摶治之兵未成功將殺之晏子諫景公令兵摶治當臘冰月之間而寒民多凍餒而功不成公怒曰為我殺兵二人晏子曰諾少間晏子曰昔者先君莊公之伐于晉也其役殺兵四人今令而殺兵二人是殺師之半也公曰諾是寡人之過也令止之景公冬起大臺之役晏子諫晏子使于魯比其返也景公使國人起大臺之役歲寒不已役之凍餒者鄉有焉國人望晏子晏子至已復事公延坐飲酒樂晏子曰君若賜臣臣請歌之歌曰庶民之言曰凍水洗我若之何太上靡散我若之何歌終喟然流涕公就止之曰夫子曷為至此殆為大臺之役夫寡人將速罷之晏子再拜出而不言遂如大臺執朴鞭其不務者曰吾細人也皆有蓋廬以避燥濕君為一臺而不速成何為國人皆曰晏子助天為虐晏子歸未至而君出令趣罷役車馳而人趨仲尼聞之喟然嘆曰古之善為人臣者聲名歸之君禍災歸之身入則切磋其君之不善出則高譽其君之德義是以雖事惰君能使垂衣裳朝諸侯不敢伐其功當此道者其晏子是耶景公為長庲欲美之晏子諫景公為長庲將欲美之有風雨作公與晏子入坐飲酒致堂上之樂酒酣晏子作歌曰穗兮不得穫秋風至兮殫零落風雨之弗殺也太上之靡弊也歌終顧而流涕張躬而舞公就晏子而止之曰今日夫子為賜而誡于寡人是寡人之罪遂廢酒罷役不果成長庲景公為鄒之長塗晏子諫景公築路寢之臺三年未息又為長庲之役二年未息又為鄒之長塗晏子諫曰百姓之力勤矣公不息乎公曰塗將成矣請成而息之對曰君屈民財者不得其利窮民力者不得其樂昔者楚靈王作傾宮三年未息也又為章華之臺五年未息也而又為乾溪之役八年百姓之力不足而自息也靈王死于乾溪而民不與君歸今君不遵明君之義而循靈王之迹嬰懼君有暴民之行而不睹長庲之樂也不若息之公曰善非夫子者寡人不知得罪于百姓深也于是令勿委壞餘財勿收斬板而去之景公春夏遊獵興役晏子諫景公春夏遊獵又起大臺之役晏子諫曰春夏起役且遊獵奪民農時國家空虛不可景公曰吾聞相賢者國治臣忠者主逸吾年無幾矣欲遂吾所樂卒吾所好子其息矣晏子曰昔文王不敢盤遊于田故國昌而民安楚靈王不廢乾溪之役起章華之臺而民叛之今君不革將危社稷而為諸侯笑臣聞忠不避死諫不違罪君不聽臣臣將逝矣景公曰唯唯將弛罷之未幾朝韋冏解役而歸景公獵休坐地晏子席而諫景公獵休坐地而食晏子後至左右滅葭而席公不説曰寡人不席而坐地二三子莫席而子獨搴草而坐之何也晏子對曰臣聞介胄坐陳不席獄訟不席尸在堂不席三者皆憂也故不敢以憂侍坐公曰善令人下席曰大夫皆席寡人亦席矣景公獵逢蛇虎以為不祥晏子諫景公出獵上山見虎下澤見蛇歸召晏子而問之曰今日寡人出獵上山則見虎下澤則見蛇殆所謂不祥也晏子對曰國有三不祥是不與焉夫有賢而不知一不祥也知而不用二不祥也用而不任三不祥也所謂不祥乃若此者也今上山見虎虎之室也下澤見蛇蛇之穴也如虎之室如蛇之穴而見之曷為不祥也景公為臺成又欲為鐘晏子諫景公為臺臺成又欲為鐘晏子諫曰君國者不樂民之哀君不勝欲既築臺矣今復欲為鐘是重斂于民民必哀矣夫斂民之哀而以為樂不祥非所以君國者公乃止景公為泰呂成將以燕饗晏子諫景公為泰呂成謂晏子曰吾欲與夫子燕對曰未祀先君而以燕非禮也公曰何以禮為對曰夫禮者民之紀紀亂則民失亂紀失民危道也公曰善乃以祀焉景公為履而飾以金玉晏子諫景公為履黃金之綦飾以銀連以珠良玉之絇其長尺冰月服之以聽朝晏子朝公迎之履重僅能舉足問曰天寒乎晏子曰君奚問天之寒也古聖人製衣服也冬輕而暖夏輕而凊今金玉之履冰月服之是重寒也履重不節是過任也失生之情矣故魯工不知寒溫之節輕重之量以害正生其罪一也作服不常以笑諸侯其罪二也用財無功以怨百姓其罪三也請拘而使吏度之公曰苦請釋之晏子曰不可嬰聞之苦身為善者其賞厚苦身為非者其罪重公不對晏子出令吏拘魯工令人送之境使不得入公撤履不復服也景公欲以聖王之居服而致諸侯晏子諫景公問晏子曰吾欲服聖王之服居聖王之室如此則諸侯其至乎晏子對曰法其節儉則可法其服室無益也三王不同服而王非以服致諸侯也誠于愛民果于行善天下懷其德而歸其義善其衣服節儉而衆悅也夫冠足以修敬不務其飾衣足以掩形禦寒不務其美衣不務于隅眥之削冠無觚羸之理身服不雜綵首服不鏤刻且古者嘗有紩衣攣領而王天下者其義好生而惡殺節上而羡下天下不朝其服而共歸其義古者嘗有處橧巢窟穴而不惡豫而不取天下不朝其室而共歸其仁及三代作服為益敬也首服足以修敬而不重也身服足以行潔而不害于動作服之輕重便于身用財之費順于民其不為橧巢者以避風也其不為窟穴者以避濕也是故明堂之制下之潤濕不能及也上之寒暑不能入也土事不文木事不鏤示民知節也及其衰也衣服之侈過足以敬宮室之美過避潤濕用力甚多用財甚費與民為讎今君欲法聖王之服不法其制法其節儉也則雖未成治庶其有益也今君窮臺榭之高極汙池之深而不止務于刻鏤之巧文章之觀而不厭則亦與民為讎矣若臣之慮恐國之危而公不平也公乃願致諸侯不亦難乎公之言過矣景公自矜冠裳遊處之貴晏子諫景公為西曲潢其深滅軌高三仞橫木龍蛇立木鳥獸公衣黼黻之衣素繡之裳一衣而五彩具焉帶球玉而冠且被髮亂首南面而立傲然晏子見公曰昔仲父之霸晏何如子抑首而不對公又曰昔管文仲之霸何如晏子對曰臣聞之維翟人與龍蛇比今君橫木龍蛇立木鳥獸亦室一就矣何暇在霸哉且公伐宮室之美矜衣服之麗一衣而五彩具焉帶球玉而亂首被髮亦室一容矣萬乘之君而一心于邪君之魂魄亡矣以誰與圖霸哉公下堂就晏子曰梁丘據裔款以室之成告寡人是以竊襲此服與據為笑又使夫子及寡人請改室易服而敬聽命其可乎晏子曰夫二子營君以邪公安得知道哉且伐木不自其根則孽又生也公何不去二子者毋使耳目淫焉景公為巨冠長衣以聽朝晏子諫景公為巨冠長衣以聽朝疾視矜立日晏不罷晏子進曰聖人之服中侻而不駔可以導衆其動作侻順而不逆可以奉生是以下皆法其服而民爭學其容今君之服駔華不可以導衆民疾視矜立不可以奉生日晏矣君不若脫服就燕公曰寡人受命退朝遂去衣冠不復服景公朝居嚴下不言晏子諫晏子朝復於景公曰朝居嚴乎公曰朝居嚴則曷害於治國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則吾謂之瘖上無聞則吾謂之聾聾瘖非害國家而如何也且合升斗之微以滿倉廩合疏縷之綈以成幃幕太山之高非一石也纍卑然後高也夫治天下者非用一士之言也固有受而不用惡有拒而不受者哉景公登路寢臺不終不悅晏子諫景公登路寢之臺不能終而息乎陛忿然而作色不悅曰孰為高臺病人之甚也晏子曰君欲節於身而勿高使人高之而勿罪也今高從之以罪卑亦從以罪敢問使人如此可乎古者之為宮室也足以便生不以為奢侈也故節於身調於民及夏之衰也其王桀背棄德行作為璿室玉門殷之衰也其王紂作為傾宮靈臺卑狹者有罪高大者有賞是以身及焉今君高亦有罪卑亦有罪甚於夏殷之王民力殫乏矣而不免於罪嬰恐國之流失而公不得亨也公曰善寡人自知誠費財勞民以為無功又從而怨之是寡人之罪也非夫子之教豈得守社稷哉遂下再拜不果登臺景公登路寢臺望國而歎晏子諫景公與晏子登寢而望國公愀然而歎曰使後嗣世世有此豈不可哉晏子曰臣聞明君必務正其治以事利民然後子孫享之詩云武王豈不事貽厥孫謀以燕翼子今君處佚怠逆政害民有日矣而猶出若言不亦甚乎公曰然則後世孰將把齊國對曰服牛死夫婦哭非骨肉之親也為其利之大也欲知把齊國者則其利之者耶公曰然何以易之對曰移之以善政今公之牛馬老於欄牢不勝服也車蠹於巨戶不勝乘也衣裘襦褲朽弊於藏不勝衣也醯醢腐不勝沽也酒醴酸不勝飲也府粟鬱而不勝食又厚藉斂於百姓而不以分餒民夫藏財而不用凶也財苟失守下其報環至其次昧財之失守委而不以分人者百姓必進自分也故君人者與其請於人不如請於己也景公路寢臺成逢於何願合葬晏子諫而許景公成路寢之臺逢於何遭喪遇晏子於途再拜乎馬前晏子下車挹之曰子何以命嬰也對曰於何之母死兆在路寢之臺牗下願請命合骨晏子曰嘻難哉雖然嬰將為子復之適為不得子將若何對曰夫君子則有以如我者儕小人吾將左手擁格右手梱心立餓枯稿而死以告四方之士曰於何不能葬其母者也晏子曰諾遂入見公曰有逢於何者母死兆在路寢當牗下願請合骨公作色不悅曰自古及今子亦嘗聞請葬人主之宮者乎晏子對曰古之人君其宮室節不侵生人之居其臺榭儉不殘死人之墓故未嘗聞諸請葬人主之宮者也今君侈為宮室奪人之居廣為臺榭殘人之墓是生者愁憂不得安處死者離易不得合骨豐樂侈遊兼傲生死非人君之行也遂欲滿求不顧細民非存之道也且嬰聞之生者不得安命之曰蓄憂死者不得葬命之曰蓄哀蓄憂者怨蓄哀者危君不如許之公曰諾晏子出梁丘據曰自昔及今未嘗聞求葬公宮者也若何許之公曰削人之居殘人之墓凌人之喪而禁其葬是於生者無施於死者無禮詩云穀則異室死則同穴吾敢不許乎逢於何遂葬其母路寢之牗下解衰去絰布衣縢履玄冠茈武踊而不哭躄而不拜已乃涕洟而去景公嬖妾死守之三日不斂晏子諫景公之嬖妾嬰子死公守之三日不食膚著于席不去左右以復而君無聽焉晏子入復曰有術客與醫俱言曰聞嬰子病死願請治之公喜遽起曰病猶可為乎晏子曰客之道也以為良醫也請嘗試之君請屏潔沐浴飲食間病者之宮彼亦將有鬼神之事焉公曰諾屏而沐浴晏子令棺人入斂已斂而復曰醫不能治病已殮矣不敢不以聞公作色不説曰夫子以醫命寡人而不使視將斂而不以聞吾之為君名而已矣晏子曰君獨不知死者之不可以生耶嬰聞之君正臣從謂之順君僻臣從謂之逆今君不道順而行僻從邪者邇道善者遠讒諛萌通而賢良廢滅是以諂諛繁於閭邪行交於國也昔吾先君桓公用管仲而霸嬖乎豎刁而滅今君薄於賢人之禮而厚嬖妾之哀且古聖王畜私不傷行殮死不失愛送死不失哀行傷則溺己愛失則傷生哀失則害性是故聖王節之也死即畢殮不留生事棺椁衣衾不以害生養哭泣處哀不以害生道今朽尸以留生廣愛以傷行循哀以害性君之失矣故諸侯之賓客慚入吾國本朝之臣慚守其職崇君之行不可以導民從君之欲不可以持國且嬰聞之朽而不殮謂之僇尸臭而不收謂之陳胔反明王之性行百姓之誹而內嬖妾於僇胔此之為不可公曰寡人不識請因夫子而為之晏子復曰國之士大夫諸侯四鄰賓客皆在外君其哭而節之仲尼聞之曰星之昭昭不若月之曀曀小事之成不若大事之廢君子之非賢於小人之是也其晏子之謂歟景公欲厚葬梁丘據晏子諫梁丘據死景公召晏子而告之曰據忠且愛我我欲豐厚其葬高大其壟晏子曰敢問據之忠與愛於君者可得聞乎公曰吾有喜於玩好有司未能我共也則據以其所有共我吾是以知其忠也每有風雨暮夜求之必存吾是以知其愛也晏子曰嬰對則為罪不對則無以事君敢不對乎嬰聞之臣專其君謂之不忠子專其父謂之不孝妻專其夫謂之不嫉事君之道導親於父兄有禮於群臣有惠於百姓有信於諸侯謂之忠為子之道以鍾愛其兄弟施行於諸父慈惠於衆子誠信於朋友謂之孝為妻之道使其衆妾皆得歡欣於其夫謂之不嫉今四封之民皆君之臣也而維據盡力以愛君何愛者之少邪四封之貨皆君之有也而維據也以其私財忠於君何忠者之寡邪據之防塞群臣壅蔽君無乃甚乎公曰善哉微子寡人不知據之至於是也遂罷為壟之役廢厚葬之令令有司據法而責群臣陳過而諫故官無廢法臣無隱忠而百姓大説景公欲以人禮葬走狗晏子諫景公走狗死公令外共之棺內給之祭晏子聞之諫公曰亦細物也特以與左右為笑耳晏子曰君過矣夫厚籍斂不以反民棄貨財而笑左右傲細民之憂而崇左右之笑則國亦無望已且夫孤老凍餒而死狗有祭鰥寡不恤而死狗有棺行辟若此百姓聞之必怨吾君諸侯聞之必輕吾國怨聚於百姓而權輕於諸侯而乃以為細物君其圖之公曰善趣庖治狗以會朝屬景公養勇士三人無君臣之義晏子諫公孫接田開疆古冶子事景公以勇力搏虎聞晏子過而趨三子者不起晏子入見公曰臣聞明君之蓄勇力之士也上有君臣之義下有長率之倫內可以禁暴外可以威敵上利其功下服其勇故尊其位重其祿今君之蓄勇力之士也上無君臣之義下無長率之倫內不可以禁暴外不可以威敵此危國之器也不若去之公曰三子者搏之恐不得刺之恐不中也晏子曰此皆力攻勍敵之人也無長幼之禮因請公使人少餽之二桃曰三子何不計功而食桃公孫接仰天而歎曰晏子智人也夫使公之計吾功者不受桃是無勇也士衆而桃寡何不計功而食桃矣接一搏豜而再搏乳虎若接之功可以食桃而無與人同矣援桃而起田開疆曰吾仗兵而卻三軍者再若開疆之功亦可以食桃而無與人同矣援桃而起古冶子曰吾嘗從君濟於河黿銜左驂以入砥柱之流當是時也冶少不能遊潛行逆流百步順流九里得黿而殺之左操驂尾右挈黿頭鶴躍而出津人皆曰河伯也若冶視之則大黿之首若冶之功亦可以食桃而無與人同矣二子何不反桃抽劍而起公孫接田開疆曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也皆反其桃挈領而死古冶子曰二子死之冶獨生之不仁恥人以言而夸其聲不義恨乎所行不死無勇雖然二子同桃而節冶專其桃而宜亦反其桃挈領而死使者復曰已死矣公殮之以服葬之以士禮焉景公登射思得勇力士與之圖國晏子諫景公登射晏子修禮而侍公曰選射之禮寡人厭之矣吾欲得天下勇士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也夫臣勇多則弒其君子力多則殺其長然而不敢者維禮之謂也禮者所以御民也轡者所以御馬也無禮而能治國家者嬰未之聞也景公曰善乃飾射更席以為上客終日問禮
