body:
  text: 晏子春秋佚文天子以天下至士皆祭以首時禮記王制孔疏引允矣君子直言是務王應麟詩考引寡婦樹蘭生而不芳繼子得食肥而不澤太平御覽八百四十九引余家素貧晝則苦於作勞夜則甘於疲寢三時之際書皆生塵太平御覽三十七引治天下若委裘用賢委裘之實桓公聽管仲而趙襄聽王登此之謂委裘然文選任昉為蕭揚州薦士表李注引為代于足修為市死者又修為也北堂書鈔四十五引君之所以尊者令令不行是無君也故明君慎令太平御覽六百三十八引北堂書鈔四十五藝文類聚五十四均引為申子夫爵益高者意益下官益大者心益小祿益厚者施益博藝文類聚二十三引人之將疾必先不甘粱肉之味國之將亡必先惡忠臣之語藝文類聚二十三引其文好者身必剝其角美者身見煞甘泉必竭直木必伐藝文類聚二十三引寧戚欲干齊桓公困窮飯牛於北門之外桓公詔夜門避任車戚乃擊轅而歌桓公憫而異之命後車載之北堂書鈔一百四十一引齊侯自頰谷歸謂晏子曰寡人獲罪於魯君如之何晏子曰君子謝過以質小人謝過以文齊嘗侵魯四邑請皆歸之公羊定十年傳何休解詁引疏云皆晏子春秋及家語孔子世家之文齊侯送晏子於雪宮元和郡縣圖志河南道六臨淄縣引人不衣裋褐不食糟粳飲食不美面目顏色不足視也是以食必粱肉北堂書鈔一百四十三引管夷吾曰吾既告子養生矣送死奈何晏平仲曰送死略矣將何以告焉管夷吾曰吾固欲聞之平仲曰既死豈在我哉焚之亦可沈之亦可瘞之亦可露之亦可衣薪而棄諸溝壑亦可袞丈繡裳而納諸石椁亦可唯所遇焉見列子楊朱篇意林二引列子徑稱晏子曰四海之雲湊千里之雨至記纂淵海卷二引師曠識爨薪易牙別淄澠記纂淵海卷六十一引
