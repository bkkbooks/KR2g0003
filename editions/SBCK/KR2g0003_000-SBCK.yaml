  text: 晏子春秋目録
  hash: sha256:ef77354dd9ed3ea406da0b868faffeab325eb5b218cd8243e1d5d2e3f7463a44
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2g0003_SBCK_000-1a}
body:
  text: 内篇諫上第一凢二十五章内篇諫下第二凢二十五章内篇問上第三凢三十章内篇問下第四凢二十章内篇􅇎上第五凢三十章内篇􅇎下第六凢三十章外篇重而異者第七凢二十七章外篇不合經術者第八凢十八章右晏子凢内外八篇緫二百十五章護左都水使者光祿大夫臣向言所校中書晏子十一篇臣向謹與長社尉臣叅校讐太史書五篇臣向書一篇叅書十三篇凢中外書三十篇爲八百三十八章除復重二十二篇六百三十八章定著八篇二百一十五章外書無有三十六章中書無有七十一章中外皆有㠯相定中書㠯夭爲芳文爲僃先爲牛章爲長如此􅁼者多謹頗略椾皆巳定㠯殺青書可繕寫晏子名嬰謚平仲萊人萊者今東萊地也晏子􅀶聞彊記通于古今事齊靈公莊公景公㠯節儉力行盡忠極諫道齊􅀦君得㠯正行百姓得㠯附親不用則退耕于野用則必不詘義不可脅㠯邪白刅雖交胸終不受崔杼之刼諌齊君懸而至順而刻及使諸侯莫能詘其辭其博通如此蓋次管仲内能親親外能厚賢居相􅀦之位受萬鍾之祿故親戚待其祿而衣食五百餘家處士待而舉火者亦甚衆晏子衣苴布之衣麋鹿之裘駕敝車疲馬盡㠯祿給親戚朋友齊人㠯此重之晏子蓋短疑缺其書六篇皆忠諌其君文章可觀義理可法皆合六經之義又有復重文辭頗異不敢遺失復列㠯爲一篇又有頗不合經術似非晏子言疑後世辯士所爲者故亦不敢失復㠯爲一篇凢八篇其六篇可常置旁御觀謹第錄臣向昧死上
  hash: sha256:0f91e749c9eaa3b1b71f84c2db50acb1d379955e3a46b6659d2d0d668c86f089
