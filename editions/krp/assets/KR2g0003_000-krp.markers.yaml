  - {type: variant, offset: 276, length: 250, content: 景公㠯節儉力行盡忠極諫道齊國君得㠯正行百姓得㠯附親不用則退耕于野用則必不詘義不可脅㠯邪白刅雖交胸終不受崔杼之刼諌齊君懸而至順而刻及使諸侯莫能詘其辭其博通如此蓋次管仲内能親親外能厚賢居相國之位受萬鍾之祿故親戚待其祿而衣食五百餘家處士待而舉火者亦甚衆晏子衣苴布之衣麋鹿之裘駕敝車疲馬盡㠯祿給親戚朋友齊人㠯此重之晏子蓋短疑缺其書六篇皆忠諌其君文章可觀義理可法皆合六經之義又有復重文辭頗異不敢遺失復列㠯爲一篇又有頗不合經術似非晏子言疑後世辯士所爲者故亦不敢失復㠯爲一篇凢八篇其六篇可常置旁御觀謹第錄臣向昧死上, WYG: 奮}
