  - {type: variant, offset: 6, length: 268, content: 凢二十五章内篇諫下第二凢二十五章内篇問上第三凢三十章内篇問下第四凢二十章内篇襍上第五凢三十章内篇襍下第六凢三十章外篇重而異者第七凢二十七章外篇不合經術者第八凢十八章右晏子凢内外八篇緫二百十五章護左都水使者光祿大夫臣向言所校中書晏子十一篇臣向謹與長社尉臣叅校讐太史書五篇臣向書一篇叅書十三篇凢中外書三十篇爲八百三十八章除復重二十二篇六百三十八章定著八篇二百一十五章外書無有三十六章中書無有七十一章中外皆有㠯相定中書㠯夭爲芳文爲僃先爲牛章爲長如此類者多謹頗略椾皆巳定㠯殺青書可繕寫晏子名嬰謚平仲萊人萊者今東萊地也晏子博聞彊記通于古今事齊靈公, WYG: ''}
