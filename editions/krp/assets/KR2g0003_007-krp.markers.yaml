  - {type: variant, offset: 0, length: 7421, content: 晏子春秋外篇重而異者第七凢二十七章景公飲酒命晏子去禮晏子諫第一景公置酒㤗山四望而泣晏子諫第二景公夢見彗星使人占之晏子諫第三景公問古而無死其樂若何晏子諫第四景公謂梁丘據與巳和晏子諌第五景公使祝史禳彗星晏子諫第六景公有疾梁丘據裔欵請誅祝史晏子諫第七景公見道殣自慙無悳晏子諌第八景公欲誅斷所愛橚者晏子諫第九景公坐路寢曰請將有此晏子諌第十景公䑓成盆成适願合葬其母晏子諫而許第十一景公築長庲臺晏子舞而諫第十二景公使燭鄒主鳥而亡之公怒將加誅晏子諫第十三景公問治國之患晏子對以佞人䜛夫在君側十四景公問後孰將踐有齊國晏子對㠯田氏第十五晏子使吳吳王問君子之行晏子對以不亂國俱滅第十六吳王問齊君僈暴吾子何容焉晏子對㠯豈能㠯道食人第十七司馬子期問有不干君不䘏民耴名者乎晏子對㠯不仁也第十八高子問事靈公莊公景公皆敬子晏子對㠯一心第十九晏子再治東河上計景公迎賀晏子辤第二十太卜紿景公能動地晏子知其妄使卜自曉公第二十一有獻書譖晏子退耕而國不治復召晏子第二十二晏子使髙糺治家三年而未嘗弼過逐之第二十三景公稱桓公之封管仲益晏子邑辤不受第二十四景公使梁丘據致千金衣裘晏子固辤不受第二十五晏子衣鹿裘㠯朝景公嗟其貧晏子稱有飾第二十六仲尼稱晏子行𥙷三君而不有果君子也第二十七景公飲酒命晏子去禮晏子諫第一景公飮酒數日而樂釋衣冠自鼓缶謂左右曰仁人亦樂是夫梁丘據對曰仁人之耳目亦猶人也夫奚爲獨不樂此也公曰趣駕迎晏子晏子朝㠯至受觴再拜公曰寡人甚樂此樂欲與夫子共之請去禮晏子對曰君之言過矣群臣皆欲去禮以事君嬰恐君子之不欲也今齊國五尺之童子力皆過嬰又能勝君然而不敢亂者畏禮義也上若無禮無以使其下下若無禮無以事其上夫麋鹿維無禮故父子同麀人之所貴以扵禽獸者以有禮也嬰聞之人君無禮無以臨其邦大夫無禮官吏不恭父子無禮其家必凶兄弟無禮不能久同詩曰人而無禮胡不遄死故禮不可去也公曰寡人不敏無良左右滛蠱寡人㠯至于此請殺之晏子曰右左何罪君若無禮則好禮者去無禮者至君若好禮則有禮者至無禮者去公曰善請易衣革冠更受命晏子避走立乎門外公令人糞灑改席召衣冠以迎晏子晏子入門三讓升階用三獻焉嗛酒嘗膳再拜告饜而出公下拜送之門反命撒酒去樂曰吾㠯彰晏子之教也此章與景公酒酣願無爲禮晏子諫大旨同但辭有詳略爾故著于此篇景公置酒㤗山四望而泣晏子諫第二景公置酒于㤗山之上酒酣公四望其地喟然嘆泣數行而下曰寡人將去此堂堂國者而死乎左右佐哀而泣者三人曰吾細人也猶將難死而况公乎棄是國也而死其孰可爲乎晏子獨搏其髀仰天而大笑曰樂哉今日之飲也公怫然怒曰寡人有哀子獨大笑何也晏子對曰今日見怯君一䛕臣三人是㠯大笑公曰何謂䛕怯也晏子曰夫古之有死也今後世賢者得之㠯息不肖者得之以伏若使古之王者毋知有死自昔先君太公至今尚在而君亦安得此國而哀之夫盛之有哀生之有死天之分也物有必至事有常然古之道也曷爲可悲至老尚哀死者怯也左右助哀者䛕也怯䛕聚居是故笑之公慙而更辭曰我非爲去國而死哀也寡人聞之彗星出其所向之國君當之今彗星出而向吾國我是㠯悲也晏子曰君之行義囘邪無德于國穿池沼則欲其深㠯廣也爲臺榭則欲其高且大也賦歛如撝奪誅僇如仇讐自是觀之茀又將出天之變彗星之出庸可悲乎于是公惧廼歸寘池沼廢䑓榭薄賦歛緩刑罸三十七日而彗星亡此章與景公登牛山而悲登公阜睹彗星而感旨同而辭少異爾故著于此篇景公夢見彗星使人占之晏子諫第三景公瞢見彗星眀日召晏子而問焉寡人聞之有彗星者必有亡國夜者寡人夢見彗星吾欲召占者夢使占之晏子對曰君居處無節衣服無度不聽正諌興事無巳賦歛無厭使民如將不勝萬民懟怨見茀星又將見瞢奚獨彗星乎此章與景公登公阜見彗星使禳之晏子諫辭旨同而此特言夣見爲異爾故著扵此篇景公問古而無死其樂若何晏子諫第四景公飮酒樂公曰古而無死其樂若何晏子對曰古而死則古之樂也君何得焉昔爽鳩氏始居此地季前因之有逢伯陵困蒲姑氏因之而後太公因之古君無死爽鳩氏之樂非君所願也此章與景公謂梁丘據與巳和景公使祝史讓彗星皆出扵景公游公阜一日而有三過言但㭊爲章而辭少異皆著于此篇景公謂梁丘據與巳和晏子諫第五景公至自畋晏子侍扵遄臺梁丘據造焉公曰維據與我和夫晏子對曰㨿亦同也焉得爲和公曰和與同異乎對曰異和如羹焉水火醯醢鹽梅㠯烹魚肉燀之㠯薪宰夫和之齊之以味濟其不及㠯洩其遇君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否㠯成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羹既戒且平奏鬷無言時靡有爭先王之濟五味和五聲也㠯平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌㠯相成也清濁小大矩長疾徐哀樂剛柔遲速高下出入周流以相濟也君子听之以平其心心平悳和故詩曰悳音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是公曰善景公使祝史禳彗星晏子諫第六齊有彗星景公使祝禳之晏子諌曰無益也秪耴誣焉天道不謟不貳其命若之何禳之也且天之有彗㠯除穢也君無穢德又何禳焉若悳之穢禳之何損詩云維此文王小心翼翼昭事上帝聿懐多福厥德不囘以受方國君無違悳方國將至何患于彗詩曰我無所監夏后及啇用亂之故民卒㳅亡若徳之囘亂民將㳅亡祝史之爲無能𥙷也公說乃止此章與景公登公阜見彗星章㫖同故著于此篇景公有疾梁丘㨿裔欵請誅祝史晏子諫第七景公疥遂痁期而不瘳諸侯之賓問疾者多在梁丘㩀裔欵言於公曰吾事鬼神豐于先君有加矣今君疾病爲諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅于祝固使嚚㠯辤賓公說吿晏子晏子對曰日宋之盟屈建問范㑹之悳扵趙武趙武曰夫子家事治言于晉國竭情無私其祝史祭祀陳信不愧其家事無情其祝史不祈建以語康王康王曰神人無怨宜夫子之先輔五君以爲諸主也公曰據與欵謂寡人能事鬼神故欲誅于祝史子稱是語何故對曰若德之君外内不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所㠯蕃禮老壽者爲信君使也其言忠信扵鬼神其適遇淫君外内頗邪上下怨疾動作辟逺從欲厭私高臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐滛縱肆行非度無所還忌不思謗讟不憚鬼神鬼神怒民痛無悛扵心其祝史薦信是言罪也其盖失數美是矯誣也進退無辭則虗以求媚是㠯鬼神不饗其國㠯禍之祝史與焉所以夭昏孤疾者其暴君使也其言僭嫚于鬼神公曰然則若之何對曰不可爲也山林之木衡鹿守之澤之雚蒲舟鮫守之藪之薪虞候猴守之海之鹽蜃祈望守之縣鄙之人入從其政偪介之關暴征其私承嗣大夫彊易其賄布常無藝徴歛無度宫室日更滛樂不違内寵之妾肆奪于市外寵之臣僣全扵鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛不有損聊攝㠯東姑尤以西其爲人也多矣雖其善祝豈能勝億兆人之詛君若欲誅扵祝史修德而後可公說使有司寛政毀關去禁薄歛巳責公疾愈此章與景公病久欲誅祝史㠯謝事悉旨同但述辭有首末之異故著于此篇景公見道殣自慙無德晏子諫第八景公賞賜及後宫文繡𬒳䑓榭菽粟食鳬鴈出而見殣謂晏子曰此何爲而死晏子對曰此餧而死公曰嘻寡人之無德也甚矣對曰君之悳著而彰何爲無悳也景公曰何謂也對曰君之徳及後宫與䑓榭君之玩物衣以文繡君之鳬鴈食㠯菽粟君之營内自樂延及後宫之族何爲其無悳顧臣願有請于君由君之意自樂之心推而與百姓同之則何殣之有君不推此而苟營内好私使財貨衝有所聚菽粟幣帛腐扵囷府惠不遍加于百姓公心不周乎萬國則桀紂之所㠯亡也夫士民之所㠯叛由徧之也君如察臣嬰之言推君之盛悳公布之于天下則湯武可爲也一殣何足恤哉此章與景公逰塞塗不䘏死胔辭如相反而其㫖實同故著扵此篇景公欲誅斷所􅋢橚者晏子諫第九景公登箐室而望見人有斷雍門之橚者公令吏拘之顧謂晏子趣誅之晏子黙然不對公曰雍門之橚寡人所甚􅋢也此見斷之故使夫子誅之黙然而不應何也晏子對曰嬰聞之古者人君出則闢道十里非畏也冕前有旒惡多所見也纊紘珫耳惡多所聞也㤗帶重半鈞舄履倍重不欲輕也刑死之罪曰中之朝君過之則赦之嬰未嘗聞爲人君而自坐其民者也公曰赦之無使夫子復言此章與景公欲殺犯槐者景公逐得斬竹事悉同但悉辭少異耳故著扵此篇景公坐路寢曰誰將有此晏子諌第十一景公坐扵路寢曰美哉其室將誰有此乎晏子對曰其田氏乎田無宇爲垾矣公曰然則柰何晏子對曰爲善者君上之所勸也豈可禁哉夫田氏國門擊柝之家父以託其子兄以託其弟扵今三世矣山木如市不加于山魚鹽蚌唇不加于海民財爲之歸今嵗㐫飢蒿種芼歛不半道路有死人齊舊四量而豆豆四而區區四而釡釡十而鐘田氏四量各加一焉㠯家量貸㠯公量収則所以糴百姓之死命者澤矣今公家驕汰而田氏慈惠國澤是將焉歸田氏雖無悳而施于民公厚歛而田氏厚施焉詩曰雖無悳與汝式歌且舞田氏之施民歌舞之也國之歸焉不亦宜乎此章與景公登路寢而嘆景公問後世有齊者叔向問齊國之若辭㫖畧同而小異故著于此篇景公臺成盆成适願合葬其母晏子諫而許第十一景公宿于路寢之宫夜分聞西方有男子哭者公悲之眀日朝問扵晏子曰寡人夜者聞西方有男子哭者聲甚哀氣甚悲是奚爲者也寡人哀之晏子對曰西郭徒居布衣之士盆成适也父之孝子兄之順弟也又嘗爲孔子門人今其母不幸而死祔柩未葬家貧身老子􅳼恐力不能合祔是以悲也公曰子爲寡人吊之因問其偏祔何所在晏子奉命往吊而問偏之所在盆成适再拜稽首而不起曰偏祔寄于路寢得爲地下之臣擁札摻筆給事宫殿中右陛之下願㠯某日送未得君之意也窮困無以圖之布唇枯舌焦心熱中今君不辱而臨之願君圖之晏子曰然此人之甚重者也而恐君不許也盆成适蹷然曰凢在君耳且臣聞之越王好勇其民輕死楚靈王好細腰其朝多餓死人子胥忠其君故天下皆願得㠯爲子今爲人子臣而離散其親戚孝乎哉足㠯爲臣乎若此而得祔是生臣而安死母也若此而不得則臣請輓尸車而寄之扵國門外宇溜之下身不敢飮食擁轅執輅木乾鳥栖袒肉暴骸以望君愍之賤臣雖愚竊意明君哀而不忍也晏子入復乎公公忿然作色而怒曰子何必患若言而教寡人乎晏子對曰嬰聞之忠不避危愛無惡言且嬰固㠯難之矣今君營處爲游觀既奪人有又禁其葬非仁也肆心傲聽不恤民憂非義也若何勿聽因道盆成适之辭公喟然太息曰悲乎哉子勿復言廼使男子袒免女子髮笄者以百數爲𨳩㐫門以迎盆成适适脫衰絰冠條纓墨緣㠯見乎公公曰吾聞之五子不滿隅一子可滿朝非廼子耶盆成适于是臨事不敢哭奉事以禮畢出門然後舉聲焉此章與扵何請合葬正同而辭少異故著扵此篇景公築長庲臺晏子舞而諫第十二景公築長庲之䑓晏子侍坐觴三行晏子起舞曰嵗巳暮矣而禾不穫忽忽矣若之何歲巳寒矣而役不罷惙惙矣如之何舞三而涕下沾襟景公慙焉爲之罷長庲之役此章與景公爲長庲欲美之景公冬𧺫大臺之役辭㫖同而小異故著扵此篇景公使燭鄒主鳥而亡之公怒將加誅晏子諫第十三景公好弋使燭鄒主鳥而亡之公怒詔吏殺之晏子曰燭鄒有罪三請數之㠯其罪而殺之公曰可扵是召而數之公前曰燭鄒汝爲吾君主鳥而亡之是罪一也使吾君㠯鳥之故殺人是罪二也使諸侯聞之㠯吾君重鳥㠯輕士是罪三也轂燭鄒罪已畢請殺之公曰勿殺寡人聞命矣此章與景公欲誅野人景公欲殺圉人章旨同而辭少異故著扵此篇景公問治國之患晏子對㠯佞人讒夫在君側第十四景公問晏子曰治國之患亦有常乎對曰佞人䜛夫之在君側者好惡良臣而行與小人此國之長患也公曰讒佞之人則誠不善矣雖然則奚曾爲國常患乎晏子曰君以爲耳目而好繆事則是君之耳目繆也夫上亂君之耳目下使群臣皆失其職豈不誠足患哉公曰如是乎寡人將去之晏子曰公不能去也公忿然作色不說曰夫子何小寡人甚也對曰臣何敢槁也夫能自周扵君者才能皆非常也夫藏大不誠于中者必謹小誠扵外以成其大不誠于中者必謹小誠于外㠯成其大不誠入則求君之嗜欲能順之公怨良臣則具其往失而益之出則行威以耴冨夫何宻近不爲大利變而務與君至義者也此難得其知也公曰然則先聖柰何對曰先聖之治也審見賓客聽治不留曰不足群臣皆得畢其誠䜛䛕安得容其私公曰然則夫子助寡人止之寡人亦事勿用對曰讒夫佞人之在君側者若社之有䑕也諺言有之曰社䑕不可熏去䜛佞之人隱君之威以自守也是難去焉此章與景公問佞人之事若何如景公問治國何患三章大旨同而辭少異故著扵此篇景公問後世孰將踐有齊者晏子對以田氏第十五景公與晏子立曲潢之上望見齊國問晏子曰後世孰將踐有齊國者乎晏子對曰非賤臣之所敢議也公曰胡必然也得者無失則虞夏常存矣晏子對曰臣聞見不足㠯知之者智也先言而後當者惠也夫智與惠君子之事臣奚足以知之乎雖然臣請陳其爲政君彊臣弱政之本也君唱臣和教之隆也刑罸在君民之紀也今夫田無宇二世有功于國而利耴分寡公室兼之國權專之君臣易施而無衰乎嬰聞之臣冨主亡由是觀之其無宇之後無㡬齊國田氏之國也嬰老不能待公之事公若即世改不在公室公曰然則柰何晏子對其維禮可以巳之其在禮也家施不及國民不懈貨不移工賈不變士不濫官不謟大夫不収公利公曰善今知禮之可以爲國也對曰禮之可以爲國也久矣與天地並立君令臣忠父慈子孝兄􅋢弟敬夫和妻柔姑慈婦聽禮之經也君令而不違厲臣忠而不二父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而貞姑慈而從婦聽而婉禮之質也公曰善哉寡人廼今知禮之尚也晏子曰夫禮先王之所以臨天下也㠯爲其民是故尚之此章與景公坐路寢問誰將有此景公問魯莒孰先亡田問後世孰有齊國晉叔向問齊國若何之章畣旨同而辭異故著扵此篇晏子使吳吳王問君子之行晏子對以不與亂國俱滅第十六晏子聘于吳吳王問君子之行何如晏子對曰君順懐之政治歸之不懐暴君之祿不居亂國之位君子見兆則退不與亂國俱滅不與暴君偕亡此章與吳王問可處可去事㫖旣同但辭有詳畧之異故著扵此篇吳王問齊君僈暴吾子何容焉晏子對㠯豈能㠯道食人第十七晏子使吳吳王曰寡人得寄僻陋蠻夷之郷希見教君子之行請私而無爲罪晏子蹵然辟位吳王曰吾聞齊君盖賊㠯僈野以暴吾子容焉何甚也晏子遵而對曰臣聞之㣲事不通麤事不能者必勞大事不得小事不爲者必貧大者不能致人小者不能至人之門者必困此臣之所㠯仕也如臣者豈能以道食人者哉晏子出王笑曰嗟乎今日吾譏晏子訾猶倮而高橛者也此章與景公問天下之所以存亡魯君問何事囘曲之君二章或事異而辭同或㫖同而辭異故著于此篇司馬子期問有不干君不恤民耴名者乎晏子對㠯不仁也第十八司馬子期問晏子曰士亦有不干君不恤民徒居無爲而耴名者乎晏子對曰嬰聞之能足以瞻上益民而不爲者謂之不仁不仁而耴名者嬰未得聞之也此章與叔向問徒處之義章㫖同而有詳略之異故著于此篇高子問子事靈公莊公景公皆敬子晏子對以一心第十九高子問晏子曰子事靈公莊公景公皆敬子三君之心一耶夫子之心三也晏子對曰善哉問事君嬰聞一心可以事百君三心不可以事一君故三君之心非一也而嬰之心非三必也且嬰之扵靈公也盡復而不能立之政所謂僅全其四支㠯從其君者也及莊公陳武夫尚勇力欲辟勝干邪而嬰不能禁故退而埜處嬰聞之言不用者不受其祿不治其事者不與其難吾扵莊公行之矣今之君輕國而重樂薄扵民而厚于養籍歛過量使令過任而嬰不能禁嬰庸知其能全身以事君乎此章與梁丘據問事三君不同心九子之齊不見晏子㫖同而辭少異故著扵此篇晏子再治東阿上計景公迎賀晏子辤第二十晏子治東阿三年景公召而數之曰吾以子爲可而使子治東阿今子治而亂子退而自察也寡人將加大誅扵子晏子對曰臣請改道易行而治東阿三年不治臣請死之景公許於是眀年上計景公迎而賀之曰甚善矣子之治東阿也晏子對曰前臣之治東阿也属託不行貨賂不至陂池之魚以利貧民當此之旹民無飢君反以罪臣今臣後之東阿也属託行貨賂至并重賦歛倉庫少内便事左右陂池之魚入于權宗當此之旹飢者過半矣君廼反迎而賀臣愚不能復治東阿願乞骸骨避贒者之路再拜便僻景公廼下席而謝之曰子彊復治東阿東阿者子之東阿也寡人無復與焉此章與晏子再治阿而見信景公任以國政章㫖同而述辭少異故著于此篇太卜紿景公能動地晏子知其妄使卜自曉公第二十一景公問太卜曰汝之道何能對曰臣能動地公召晏子而吿之曰寡人問太卜曰汝之道何能對曰能動地地可動乎晏子黙黙不對出見太卜曰昔吾見鈎星在四心之間地其動乎太卜曰然晏子曰吾言之恐子死之也黙然不對恐君之惶也子言君臣俱得焉忠於君者豈必傷人哉晏子出太卜走入見公曰臣非能動地地固將動也陳子陽聞之曰晏子黙而不對者不欲太卜之死也往見太卜者恐君之惶也晏子仁人也可謂忠上而惠下也章與栢常騫禳鳥死將爲公請壽晏子識其妄章㫖同而辭異故著于此篇有獻書譛晏子退畊而國不治復召晏子第二十二晏子相景公其論人也見贒而進之不同君所欲見不善則廢之不辟君所􅋢行巳而無私直言而無諱有納書者曰廢置不周於君前謂之專出言不諱於君前謂易專易之行存則君臣之道廢矣吾不知晏子之爲忠臣也公以爲然晏子入朝公色不恱故晏子歸僃載使人辭曰嬰故老悖無能毋敢服壯者事辭而不爲臣退而窮處東畊海濱堂下生黎藿門外生荆棘七年燕魯分爭百姓惛亂而家無積公自治國權輕諸侯身弱高國公恐復召晏子晏子至公一歸七年之祿而家無藏晏子立侯諸忌其威髙國服其政燕魯貢職小國旹朝晏子没而後衰此章與景公惡故人晏子退章㫖同叙事少異故著于此篇晏子使高糺治家三年而未嘗弼過逐之第二十三晏子使高糺治家三年而辭焉儐者諫曰髙糺之事夫子三年曾無以爵位而逐之敢請其罪晏子曰若夫方立之人維聖人而已如嬰者反陋之人也若夫左嬰右嬰之人不舉曰維將不正今此子事吾三年未嘗弼吾過也吾是以辤之此章與景公欲見高糺章㫖同而辭少異故著扵此篇景公稱桓公之封管仲益晏子邑辤不受第二十四景公謂晏子曰昔吾先君桓公予管仲狐與榖其縣十七著之于帛申之以策通之諸侯以爲其子孫賞邑寡人不足㠯辱而先君今爲夫子賞邑通之子孫晏子辤曰昔聖王論功而賞賢贒者得之不肖者失之御德修禮無有荒怠今事君而免于罪者其子孫奚宜與焉若爲齊國大夫者必有賞邑則齊君何以共其社稷與諸侯幣帛嬰請辤遂不受此章與景公致千金而晏子固不受使田無宇致封邑晏子辭章㫖悉同而辭少異故著于此篇景公使梁丘據致千金之裘晏子固辤不受第二十五景公賜晏子狐之白裘玄豹之茈其貲千金使梁丘據致之晏子辤而不受三反公曰寡人有此二將欲服之今夫子不受寡人不敢服與其閉藏之豈如弊之身乎晏子曰君就賜使嬰脩百官之政君服之上而使嬰服之于下不可以爲教固辤而不受此章與景公使梁丘㨿遺之車馬三返不受章㫖同而事少異故著于此篇晏子衣鹿裘以朝景公嗟其貧晏子稱有飾第二十六晏子相景公布衣鹿裘㠯朝公曰夫子之家若此其貧也是奚衣之惡也寡人不知是寡人之罪也晏子對曰嬰聞之盖顧人而後衣食者不以貪味爲非盖顧人而後行者不㠯邪辟爲累嬰不肖嬰之族又不如嬰也待嬰以祀其先人者五百家嬰又得布衣鹿裘而朝於嬰不有飾乎再拜而辭此章與陳無字請浮晏子景公睹晏子之食而嗟其貧章㫖同而辭少異故著于此篇仲尼稱晏子行𥙷三君而不有果君子也第二十七仲尼曰靈公汙晏子事之以整齊莊公壯晏子事之㠯宣武景公奢晏子事之㠯恭儉君子也相三君而善不通下晏子細人也晏子聞之見仲尼曰嬰聞君子有譏扵嬰是以來見如嬰者豈能以道食人者哉嬰嬰宗族待嬰而祝其先人者數百家與齊國之間士待嬰而舉火者數百家臣爲此仕者也如臣者豈能以道食人者哉晏子出仲尼送之以賓客之禮再拜其辱反命門弟子曰救民之姓而不夸行𥙷三君而不有晏子果君子也此章與仲尼之齊不見晏子魯君問何事囘曲之君章㫖同而述辭少異故著於此篇晏子春秋外篇重而異者第七終, WYG: ''}
