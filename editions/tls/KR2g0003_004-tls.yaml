body:
  text: 內篇問下景公問何脩則夫先王之游晏子對以省耕實景公出游問於晏子曰吾欲循海而南至於琅琊寡人何修則夫先王之游晏子再拜曰善哉君之問也嬰聞之天子之諸侯為巡狩諸侯之天子為述職故春省耕而補不足者謂之游秋省實而助不給者謂之豫夏語曰吾君不遊我曷以休吾君不豫我曷以助一遊一豫為諸侯度今君之游不然師行而量食貧苦不補勞者不息夫從高歷時而不反謂之流從下歷時而不反謂之連從獸而不歸謂之荒從樂而不歸謂之亡古者聖王無流連之游荒亡之行公曰善命吏計公稟之粟藉長幼貧氓之數吏所委發廩出粟以予貧者三千鍾公所身見癃老者七十人振贍之然後歸也景公問桓公何以致霸晏子對以下賢以身景公問於晏子曰昔吾先君桓公善飲酒窮樂食味方丈好色無別辟若此何以能率諸侯以朝天子乎晏子對曰昔吾先君桓公變俗以政下賢以身管仲君之賊也知其能足以安國濟功故迎之于魯郊自御禮之於廟異日君過于康莊聞甯戚歌止車而聽之則賢人之風也舉以為大田先君見賢不留使能不怠是以內政則民懷之征伐則諸侯畏之今君聞先君之過而不能明其大節桓公之霸也君奚疑焉景公問欲逮桓公之後晏子對以任非其人景公問晏子曰昔吾先君桓公從車三百乘九合諸侯一匡天下今吾從車千乘可以逮先君桓公之後乎晏子對曰桓公從車三百乘九合諸侯一匡天下者左有鮑叔右有仲父今君左為倡右為優讒人在前諛人在後又焉可逮桓公之後乎景公問廉政而長久晏子對以其行水也景公問晏子曰廉政而長久其行何也晏子對曰其行水也美哉水乎清清其濁無不雩途其清無不灑除是以長久也公曰廉政而遫亡其行何也對曰其行石也堅哉石乎落落視之則堅循之則堅內外皆堅無以為久是以遫亡也景公問為臣之道晏子對以九節景公問晏子曰請問為臣之道晏子對曰見善必通不私其利薦善而不有其名稱身居位不為苟進稱事授祿不為苟得體貴側賤不逆其倫居賢不肖不亂其序肥利之地不為私邑賢質之士不為私臣君用其所言民得其所利而不伐其功此臣之道也景公問賢不肖可學乎晏子對以勉強為上景公問晏子曰人性有賢不肖可學乎晏子對曰詩云高山仰之景行行之鄉者其人也故諸侯並立善而不怠者為長列士竝學終善者為師景公問富民安眾晏子對以節欲中聽景公問晏子曰富民安眾難乎晏子對曰易節欲則民富中聽則民安行此兩者而已矣景公問國何如則謂安晏子對以內安政外歸義景公問晏子曰國如何則可謂安矣晏子對曰下無諱言官無怨治通人不華窮民不怨喜樂無羨賞忿怒無羨刑上有禮於士下有恩于民地博不兼小兵強不劫弱百姓內安其政外歸其義可謂安矣景公問諸侯孰危晏子對以莒其先亡景公問晏子曰當今之時諸侯孰危晏子對曰莒其先亡乎公曰何故對曰地侵於齊貨竭于晉是以亡也晏子使吳吳王問可處可去晏子對以視國治亂晏子聘於吳吳王曰子大夫以君命辱在弊邑之地施貺寡人寡人受貺矣願有私問焉晏子巡遁而對曰嬰北方之賤臣也得奉君命以趨於末朝恐辭令不審譏於下吏懼不知所以對者吳王曰寡人聞夫子久矣今乃得見願終其問晏子避席對曰敬受命矣吳王曰國如何則可處如何則可去也晏子對曰嬰聞之親疏得處其倫大臣得盡其忠民無怨治國無虐刑則可處矣是以君子懷不逆之君居治國之位親䟽不得居其倫大臣不得盡其忠民多怨治國有虐刑則可去矣是以君子不懷暴君之祿不處亂國之位吳王問保威強不失之道晏子對以先民後身晏子聘於吳吳王曰敢問長保威強勿失之道若何晏子對曰先民而後身先施而後誅強不暴弱貴不凌賤富不傲貧百姓並進有司不侵民和政平不以威強退人之君不以眾強兼人之地其用法為時禁暴故世不逆其志其用兵為眾屏患故民不疾其勞此長保威強勿失之道也失此者危矣吳王忿然作色不說晏子曰寡君之事畢矣嬰無斧鑕之罪請辭而行遂不復見晏子使魯魯君問何事回曲之君晏子對以庇族晏子使魯見昭公昭公說曰天下以子大夫語寡人者眾矣今得見而羨乎所聞請私而無為罪寡人聞大國之君蓋回曲之君也曷為以子大夫之行事回曲之君乎晏子逡循對曰嬰不肖嬰之族又不若嬰待嬰而祀先者五百家故嬰不敢擇君晏子出昭公語人曰晏子仁人也反亡君安危國而不私利焉僇崔杼之尸滅賊亂之徒不獲名焉使齊外無諸侯之憂內無國家之患不伐功焉鍖然不滿退託於族晏子可謂仁人矣魯昭公問魯一國迷何也晏子對以化為一心晏子聘于魯魯昭公問焉曰吾聞之莫三人而迷今吾以一國慮之魯不免于亂何也晏子對曰君之所尊舉而富貴入所以與圖身出所以與圖國及左右偪邇皆同于君之心者也犒魯國化而為一心曾無與二其何暇有三夫偪邇于君之側者距本朝之勢國之所以不治也左右讒諛相與塞善行之所以衰也士者持祿游者養交身之所以危也詩曰芃芃棫樸薪之槱之濟濟辟王左右趨之此言古者聖王明君之使以善也故外知事之情而內得心之誠是以不迷也魯昭公問安國眾民晏子對以事大養小謹聽節儉晏子聘于魯魯昭公問曰大夫儼然辱臨弊邑竊甚嘉之寡人受貺請問安國眾民如何晏子對曰嬰聞傲大賤小則國危慢聽厚歛則民散事大養小安國之器也謹聽節儉眾民之術也晏子使晉晉平公問先君得眾若何晏子對以如美淵澤晏子使晉晉平公饗之文室既靜矣晏以平公問焉曰昔吾先君得眾若何晏子對曰君饗寡君施及使臣御在君側恐懼不知所以對平公曰聞子大夫數矣今迺得見願終聞之晏子對曰臣聞君子如美淵澤容之眾人歸之如魚有依極其游泳之樂若淵澤決竭其魚動流夫往者維雨乎不可復已公又問曰請問莊公與今君孰賢晏子曰兩君之行不同臣不敢知也公曰王室之正也諸侯之專制也是以欲聞子大夫之言也對曰先君莊公不安靜處樂節飲食不好鍾鼓好兵作武士與同飢渴寒暑君之強過人之量有一過不能已焉是以不免于難今君大宮室美臺榭以辟飢渴寒暑畏禍敬鬼神君之善足以沒身不足以及子孫矣晉平公問齊君德行高下晏子對以小善晏子使於晉晉平公問曰吾子之君德行高下如何晏子對以小善公曰否吾非問小善問子之君德行高下也晏子蹴然曰諸侯之交紹而相見辭之有所隱也君之命質臣無所隱嬰之君無稱焉平公蹴然而辭送再拜而反曰殆哉吾過誰曰齊君不肖直稱之士正在本朝也晉叔向問齊國若何晏子對以齊德衰民歸田氏晏子聘于晉叔向從之宴相與語叔向曰齊其何如晏子對曰此季世也吾弗知齊其為田氏乎叔向曰何謂也晏子曰公棄其民而歸於田氏齊舊四量豆區釜鐘四升為豆各自其四以登於釜釜十則鐘田氏三量皆登一焉鐘乃巨矣以家量貸以公量收之山木如市弗加于山魚鹽蜃蛤弗加於海民參其力二入於公而衣食其一公積朽蠹而老小凍餒國之都市屨賤而踊貴民人痛疾或燠休之昔者殷人誅殺不當僇民無時文王慈惠殷眾收卹無主是故天下歸之民無私與維德之授今公室驕暴而田氏慈惠其愛人如父母而歸之如流水欲無獲民將焉避其伯直柄虞遂伯戲其相胡公大姬已在齊矣叔向曰雖吾公室亦季世也戎馬不駕卿無軍行公乘無人卒列無長庶民罷弊宮室滋侈道殣相望而女富溢尤民聞公命如逃寇讎欒郤胥原孤續慶伯降在皁隸政在家門民無所依而君日不悛以樂慆憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠況日不悛其能久乎晏子曰然則子將若何叔向曰人事畢矣待天而已矣晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族維羊舌氏在而已肸又無子公室無度幸而得死豈其獲祀焉叔向問齊德衰子若何晏子對以進不失忠退不失行叔向問晏子曰齊國之德衰矣今子何若晏子對曰嬰聞事明君者竭心力以沒其身行不逮則退不以誣持祿事惰君者優游其身以沒其世力不能則去不以諛持危且嬰聞君子之事君也進不失忠退不失行不苟合以隱忠可謂不失忠不持利以傷廉可謂不失行叔向曰善哉詩有之曰進退維谷其此之謂歟叔向問正士邪人之行如何晏子對以使下順逆叔向問晏子曰正士之義邪人之行何如晏子對曰正士處勢臨眾不阿私行於國足養而不忘故通則事上使卹其下窮則教下使順其上事君盡禮行忠不匄爵祿不用則去而不議其交友也論身義行不為苟戚不同則踈而不悱不毀進於君不以刻民尊於國故用於上則民安行於下則君尊故得眾上不疑其身用于君不悖於行是以進不喪己退不危身此正士之行也邪人則不然用於上則虐民行于下則逆上事君苟進不道忠交友苟合不道行持諛巧以正祿比姦邪以厚養矜爵祿以臨人夸禮貌以華世不任於上則輕議不篤于友則好誹故用于上則民憂行于下則君危是以其事君近於罪其交友近於患其得上辟于辱其為生僨于刑故用于上則誅行于下則弒是故交通則辱生患則危此邪人之行也叔向問事君徒處之義奚如晏子對以大賢無擇叔向問晏子曰事君之倫徒處之義奚如晏子對曰事君之倫知慮足以安國譽厚足以導民和柔足以懷眾不廉上以為名不倍民以為行上也潔于治己不飾過以求先不讒諛以求進不阿所私不誣所能次也盡力守職不怠奉官從上不敢隋畏上故不苟忌罪故不辟下也三者事君之倫也及夫大賢則徒處與有事無擇也隨時宜者也有所謂君子者能不足以補上退處不順上治唐園考菲履共恤上令第長鄉里不夸言不愧行君子也不以上為本不以民為憂內不恤其家外不顧其游夸言愧行自勒于飢寒不及醜儕命之曰狂僻之民明上之所禁也進也不能及上退也不能徒處作窮于富利之門畢志于畎畝之業窮通行無常處之慮佚于心利通不能窮業不成命之曰處封之民明上之所誅也有智不足以補君有能不足以勞民俞身徒處謂之傲上苟進不擇所道苟得不知所惡謂之亂賊身無以與君能無以勞民飾徒處之義揚輕上之名謂之亂國明君在上三者不免罪叔向曰賢不肖性夫吾每有問而未嘗自得也叔向問處亂世其行正曲晏子對以民為本叔向問晏子曰世亂不遵道上辟不用義正行則民遺曲行則道廢正行而遺民乎與持民而遺道乎此二者之于行何如晏子對曰嬰聞之卑而不失尊曲而不失正者以民為本也苟持民矣安有遺道苟遺民矣安有正行焉叔向問意孰為高行孰為厚晏子對以愛民樂民叔向問晏子曰意孰為高行孰為厚對曰意莫高于愛民行莫厚于樂民又問曰意孰為下行孰為賤對曰意莫下於刻民行莫賤于害身也叔向問嗇吝愛之於行何如晏子對以嗇者君子之道叔向問晏子曰嗇吝愛之于行何如晏子對曰嗇者君子之道吝愛者小人之行也叔向曰何謂也晏子曰稱財多寡而節用之富無金藏貧不假貸謂之嗇積多不能分人而厚自養謂之吝不能分人又不能自養謂之愛故夫嗇者君子之道吝愛者小人之行也叔向問君子之大義何若晏子對以尊賢退不肖叔向問晏子曰君子之大義何若晏子對曰君子之大義和調而不緣溪盎而不苛莊敬而不狡和柔而不銓刻廉而不劌行精而不以明污齊尚而不以遺罷富貴不傲物貧窮不易行尊賢而不退不肖此君子之大義也叔向問傲世樂業能行道乎晏子對以狂惑也叔向問晏子曰進不能事上退不能為家傲世樂業枯槁為名不疑其所守者可謂能行其道乎晏子對曰嬰聞古之能行道者世可以正則正不可以正則曲其正也不失上下之倫其曲也不失仁義之理道用與世樂業不用有所依歸不以傲上華世不以枯槁為名故道者世之所以治而身之所以安也今以不事上為道以不顧家為行以枯槁為名世行之則亂身行之則危且天之與地而上下有衰矣明王始立而居國為制矣政教錯而民行有倫矣今以不事上為道反天地之衰矣以不顧家為行倍先聖之道矣以枯槁為名則世塞政教之途矣有明上不可以為下遭亂世不可以治亂說若道謂之惑行若道謂之狂惑者狂者木石之樸也而道義未戴焉叔向問人何若則榮晏子對以事君親忠孝叔向問晏子曰何若則可謂榮矣晏子對曰事親孝無悔往行事君忠無悔往辭和於兄弟信於朋友不謟過不責得言不相坐行不相反在上治民足以尊君在下蒞修足以變人身無所咎行無所創可謂榮矣叔向問人何以則可保身晏子對以不要幸叔向問晏子曰人何以則可謂保其身晏子對曰詩曰既明且哲以保其身夙夜匪懈以事一人不庶幾不要幸先其難乎而後幸得之時其所也失之非其罪也可謂保其身矣曾子問不諫上不顧民以成行義者晏子對以何以成也曾子問晏子曰古者嘗有上不諫上下不顧民退處山谷以成行義者也晏子對曰察其身無能也而託乎不欲諫上謂之誕意也上惛亂德義不行而邪辟朋黨賢人不用士亦不易其行而從邪以求進故有隱有不隱其行法士也迺夫議上則不取也夫上不諫上下不顧民退處山谷嬰不識其何以為成行義者也梁丘據問子事三君不同心晏子對以一心可以事百君梁丘據問晏子曰子事三君君不同心而子俱順焉仁人固多心乎晏子對曰嬰聞之順愛不懈可以使百姓暴強不忠不可以使一人一心可以事百君三心不可以事一君仲尼聞之曰小子識之晏子以一心事百君者也柏常騫問道無滅身無廢晏子對以養世君子柏常騫去周之齊見晏子曰騫周室之賤史也不量其不肖願事君子敢問正道直行則不容于世隱道危行則不忍道亦無滅身亦無廢者何若晏子曰善哉問事君乎嬰聞之執二法裾則不取也輕進苟合則不信也直易無諱則速傷也新始好利則無敝也且嬰聞養世之君子從輕不為進從重不為退省行而不伐讓利而不夸陳物而勿專見象而勿強道不滅身不廢矣
