body:
  text: 內篇雜下靈公禁婦人為丈夫飾不止晏子請先內勿服靈公好婦人而丈夫飾者國人盡服之公使吏禁之曰女子而男子飾者裂其衣斷其帶裂衣斷帶相望而不止晏子見公問曰寡人使吏禁女子而男子飾者裂斷其衣帶相望而不止者何也晏子對曰君使服之於內而禁之於外猶懸牛首于門而賣馬肉於市也公何以不使內勿服則外莫敢為也公曰善使內勿服不踰月而國莫之服齊人好轂擊晏子紿以不祥而禁之齊人甚好轂擊相犯以為樂禁之不止晏子患之迺為新車良馬出與人相犯也曰轂擊者不祥臣其祭祀不順居處不敬乎下車棄而去之然後國人乃不為故曰禁之以制而身不先行民不能止故化其心莫若教也景公夢五丈夫稱無辜晏子知其冤景公畋於梧丘夜猶早公姑坐睡而夢有五丈夫北面韋廬稱無罪焉公覺召晏子而告其所夢公曰我其嘗殺不辜誅無罪耶晏子對曰昔者先君靈公畋五丈夫罟而駭獸故殺之斷其頭而葬之命曰五丈夫之丘此其地耶公令人掘而求之則五頭同穴而存焉公曰嘻令吏葬之國人不知其瞢也曰君憫白骨而況於生者乎不遺餘力矣不釋餘知矣故曰君子之為善易矣柏常騫禳梟死將為景公請壽晏子識其妄景公為路寢之臺成而不踊焉柏常騫曰君為臺甚急臺成君何為而不踊焉公曰然有梟昔者鳴聲無不為也吾惡之甚是以不踊焉柏常騫曰臣請禳而去之公曰何具對曰築新室為置白茅焉公使為室成置白茅焉柏常騫夜用事明日問公曰今昔聞鴞聲乎公曰一鳴而不復聞使人往視之鴞當陛布翌伏地而死公曰子之道若此其明也亦能益寡人之壽乎對曰能公曰能益幾何對曰天子九諸侯七大夫五公曰子亦有徵兆之見乎對曰得壽地且動公喜令百官趣具騫之所求柏常騫出遭晏子于塗拜馬前辭曰騫為君禳鴞而殺之君謂騫曰子之道若此其明也亦能益寡人壽乎騫曰能今且大祭為君請壽故將往以聞晏子曰嘻亦善矣能為君請壽也雖然吾聞之維以政與德而順乎神為可以益壽今徒祭可以益壽乎然則福兆有見乎對曰得壽地將動晏子曰騫昔吾見維星絕樞星散地其動汝以是乎柏常騫俯有閒仰而對曰然晏子曰為之無益不為無損也汝薄賦歛毋費民且無令君知之景公成柏寢而師開言室夕晏子辨其所以然景公新成柏寢之室使師開鼓琴師開左撫宮右彈商曰室夕公曰何以知之師開對曰東方之聲薄西方之聲揚公召大匠曰立室何為夕大匠曰立室以宮矩為之於是召司空曰立宮何為夕司空曰立宮以城矩為之明日晏子朝公公曰先君太公以營丘之封立城曷為夕晏子對曰古之立國者南望南斗北戴樞星彼安有朝夕哉然而以今之夕者周之建國國之西方以尊周也公蹴然曰古之臣乎景公病水瞢與日鬭晏子教占瞢者以對景公病水臥十數日夜瞢與二日鬭而不勝晏子朝公曰夕者夢與二日鬭而寡人不勝我其死乎晏子對曰請召占瞢者出於閨使人以車迎占夢者至曰曷為見召晏子曰夜者不勝公夢與二日鬭公曰寡人死乎故請君占夢是所為也占夢者曰請反具書晏子曰毋反書公無所病病者陰也日者陽也一陰不勝二陽公病將已以是對占夢者入公曰寡人瞢與二日鬭而不勝寡人死乎占夢者對曰公之所病陰也日者陽也一陰不勝二陽公病將已居三日公病大愈公且賜占夢者占夢者曰此非臣之力也晏子教臣也公召晏子且賜之晏子曰占夢以臣之言對故有益也使臣身言之則不信矣此占夢之力也臣無功焉公兩賜之曰以晏子不奪人之功以占夢者不蔽人之能景公病瘍晏子撫而對之迺知群臣之野景公病疽在背高子國子請公曰職當撫瘍高子進而撫瘍公曰熱乎曰熱熱何如曰如火其色何如曰如未熟李大小何如曰如豆墮者何如曰如屨辦二子者出晏子請見公曰寡人有病不能勝衣冠以出見夫子夫子其辱視寡人乎晏子入呼宰人具盥御者具巾刷手溫之發席傅薦跪請撫瘍公曰其熱何如曰如日其色何如曰如蒼玉大小何如曰如璧其墮者何如曰如珪晏子出公曰吾不見君子不知野人之拙也晏子使吳吳王命儐者稱天子晏子詳惑晏子使吳吳王謂行人曰吾聞晏嬰蓋北方之辯于辭習于禮者也命儐者曰客見則稱天子請見明日晏子有事行人曰天子請見晏子蹴然行人又曰天子請見晏子蹙然又曰天子請見晏子蹙然者三曰臣受命弊邑之君將使於吳王之所以不敏而迷惑入於天子之朝敢問吳王惡乎存然後吳王曰夫差請見見之以諸侯之禮晏子使楚楚為小門晏子稱使狗國者入狗門晏子使楚以晏子短楚人為小門于大門之側而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當從此門入儐者更道從大門入見楚王王曰齊無人耶使子為使晏子對曰齊之臨淄三百閭張袂成帷揮汗成雨比肩繼踵而在何為無人王曰然則子何為使乎晏子對曰齊命使各有所主其賢者使使賢王不肖者使使不肖王嬰最不肖故直使楚耳楚王欲辱晏子指盜者為齊人晏子對以橘晏子將使楚楚王聞之謂左右曰晏嬰齊之習辭者也今方來吾欲辱之何以也左右對曰為其來也臣請縛一人過王而行王曰何為者也對曰齊人也王曰何坐曰坐盜於是晏子至楚王賜晏子酒酒酣吏二縛一人過王而行王曰縛者曷為者也對曰齊人也王曰曰何坐坐盜王視晏子曰齊人固善盜乎晏子避席對曰嬰聞之橘生淮南則為橘生于淮北則為枳葉徒相似其實味不同所以然者何其水土異也今民生長於齊不盜入楚則盜得無楚之水土使民善盜耶王笑曰聖人非所與熙也寡人反取病焉楚王饗晏子進橘置削晏子不剖而食景公使晏子於楚楚王進橘置削晏子不剖而並食之楚王曰橘當去剖晏子對曰臣聞之賜人主前者瓜桃不削橘柚不剖今者萬乘無教令臣故不敢剖不然臣非不知也晏子布衣棧車而朝田桓子侍景公飲酒請浮之景公飲酒田桓子侍望見晏子而復於公曰請浮晏子公曰何故也無宇對曰晏子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是隱君之賜也公曰諾晏子坐酌者奉觴而進之曰君命浮子晏子曰何故也田桓子曰君賜之卿位以尊其身寵之百萬以富其家群臣其爵莫尊于子祿莫重于子今子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝則是隱君之賜也故浮子晏子避席曰請飲而後辭乎其辭而後飲乎公曰辭然後飲晏子曰君賜之卿位以尊其身嬰非敢為顯受也為行君令也寵之百萬以富其家嬰非敢為富受也為通君賜也臣聞古之賢君臣有受厚賜而不顧其國族則過之臨事守職不勝其任則過之君之內隸臣之父兄若有離散在於野鄙者此臣之罪也君之外隸臣之所職若有播亡在于四方者此臣之罪也兵革之不完戰車之不修此臣之罪也若夫弊車駑馬以朝意者非臣之罪乎且臣以君之賜臣父之黨無不乘車者母之黨無不足于衣食者妻之黨無凍餒者國之閒士待臣而後舉火者數百家如此者為彰君賜乎為隱君賜乎公曰善為我浮無宇也田無宇請求四方之學士晏子謂君子難得田桓子見晏子獨立於墻陰曰子何為獨立而不憂何不求四鄉之學士可者而與坐晏子曰共立似君子出言而非也嬰惡得學士之可者而與之坐且君子之難得也若美山然名山既多矣松柏既茂矣望之然盡目力不知厭而世有所美焉固欲登彼之上仡仡然不知厭小人者與此異若部婁之未登善登之無蹊維有楚棘而已遠望無見也俛就則傷要惡能無獨立焉且人何憂靜處遠慮見歲若月學問不厭不知老之將至安用從酒田桓子曰何謂從酒晏子曰無客而飲謂之從酒今若子者晝夜守尊謂之從酒也田無宇勝欒氏高氏欲分其家晏子使致之公欒氏高氏欲逐田氏鮑氏田氏鮑氏先知而遂攻之高彊曰先得君田鮑安往遂攻虎門二家召晏子晏子無所從也從者曰何為不助田鮑晏子曰何善焉其助之也何為不助欒高曰庸愈於彼乎門開公召而入欒高不勝而出田桓子欲分其家以告晏子晏子曰不可君不能飭法而群臣專制亂之本也今又欲分其家利其貨是非制也子必致之公且嬰聞之廉者政之本也讓者德之主也欒高不讓以至此禍可毋慎乎廉之謂公正讓之謂保德凡有血氣者皆有爭心怨利生孽維義為可以長存且分爭者不勝其禍辭讓者不失其福子必勿取桓子曰善盡致之公而請老于劇子尾疑晏子不受慶氏之邑晏子謂足欲則亡慶氏亡分其邑與晏子邶殿其鄙六十晏子弗受子尾曰富者人之所欲也何獨弗欲晏子對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿迺足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利于是乎正德以幅之使無黜慢謂之幅利利過則為敗吾不敢貪多所謂幅也景公祿晏子平陰與槀邑晏子願行三言以辭景公祿晏子以平陰與槀邑反市者十一社晏子辭曰吾君好治宮室民之力弊矣又好盤游翫好以飭女子民之財竭矣又好興師民之死近矣弊其力竭其財近其死下之疾其上甚矣此嬰之所為不敢受也公曰是則可矣雖然君子獨不欲富與貴乎晏子曰嬰聞為人臣者先君後身安國而度家宗君而處身曷為獨不欲富與貴也公曰然則曷以祿夫子晏子對曰君商漁鹽關市譏而不征耕者十取一焉弛刑罰若死者刑若刑者罰若罰者免若此三言者嬰之祿君之利也公曰此三言者寡人無事焉請以從夫子公既行若三言使人問大國大國之君曰齊安矣使人問小國小國之君曰齊不我加矣梁丘據言晏子食肉不足景公割地將封晏子辭晏子相齊三年政平民說梁丘據見晏子中食而肉不足以告景公旦日封晏子以都昌晏子辭不受曰富而不驕者未嘗聞之貧而不恨者嬰是也所以貧而不恨者以善為師也今封易嬰之師師已輕封已重矣請辭景公以晏子食不足致千金而晏子固不受晏子方食景公使使者至分食食之使者不飽晏子亦不飽使者反言之公公曰嘻晏子之家若是其貧也寡人不知是寡人之過也使吏致千金與市租請以奉賓客晏子辭三致之終再拜而辭曰嬰之家不貧以君之賜澤覆三族延及交遊以振百姓君之賜也厚矣嬰之家不貧也嬰聞之夫厚取之君而施之民是臣代君君民也忠臣不為也厚取之君而不施於民是為筐篋之藏也仁人不為也進取于君退得罪于士身死而財遷於它人是為宰藏也智者不為也夫十總之布一豆之食足於中免矣景公謂晏子曰昔吾先君桓公以書社五百封管仲不辭而受子辭之何也晏子曰嬰聞之聖人千慮必有一失愚人千慮必有一得意者管仲之失而嬰之得者耶故再拜而不敢受命景公以晏子衣食弊薄使田無宇致封邑晏子辭晏子相齊衣十升之布食脫粟之食五卵苔菜而已左右以告公公為之封邑使田無宇致臺與無鹽晏子對曰昔吾先君太公受之營丘為地五百里為世國長自太公至於公之身有數十公矣苟能說其君以取邑不至公之身趣齊摶以求升土不得容足而寓焉嬰聞之臣有德益祿無德退祿惡有不肖父為不肖子為封邑以敗其君之政者乎遂不受田桓子疑晏子何以辭邑晏子荅以君子之事也景公賜晏子邑晏子辭田桓子謂晏子曰君歡然與子邑必不受以恨君何也晏子對曰嬰聞之節受于上者寵長于君儉居處者名廣於外夫長寵廣名君子之事也嬰獨庸能已乎景公欲更晏子宅晏子辭以近市得求諷公省刑景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者晏子辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既竊利之敢不識乎公曰何貴何賤是時也公繁于刑有鬻踊者故對曰踊貴而屨賤公愀然改容公為是省于刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄已其是之謂乎景公毀晏子鄰以益其宅晏子因陳桓子以辭晏子使晉景公更其宅反則成矣既拜迺毀之而為里室皆如其舊則使宅人反之曰諺曰非宅是卜維鄰是卜二三子先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅公弗許因陳桓子以請迺許之景公欲為晏子築室於宮內晏子稱是以遠之而辭景公謂晏子曰寡人欲朝昔見為夫子築室於閨內可乎晏子對曰臣聞之隱而顯近而結維至賢耳如臣者飾其容止以待承令猶恐罪戾也今君近之是遠之也請辭景公以晏子妻老且惡欲內愛女晏子再拜以辭景公有愛女請嫁于晏子公迺往燕晏子之家飲酒酣公見其妻曰此子之內子耶晏子對曰然是也公曰嘻亦老且惡矣寡人有女少且姣請以滿夫子之宮晏子違席而對曰乃此則老且惡嬰與之居故矣故及其少而姣也且人固以壯託乎老姣託乎惡彼嘗託而嬰受之矣君雖有賜可以使嬰倍其託乎再拜而辭景公以晏子乘弊車駑馬使梁丘據遺之三返不受晏子朝乘弊車駕駑馬景公見之曰嘻夫子之祿寡耶何乘不佼之甚也晏子對曰賴君之賜得以壽三族及國游士皆得生焉臣得暖衣飽食弊車駑馬以奉其身於臣足矣晏子出公使梁丘據遺之輅車乘馬三返不受公不悅趣召晏子晏子至公曰夫子不受寡人亦不乘晏子對曰君使臣臨百官之吏臣節其衣服飲食之養以先國之民然猶恐其侈靡而不顧其行也今輅車乘馬君乘之上而臣亦乘之下民之無義侈其衣服飲食而不顧其行者臣無以禁之遂讓不受景公睹晏子之食菲薄而嗟其貧晏子稱有參士之食晏子相景公食脫粟之食炙三弋五卵苔菜耳矣公聞之往燕焉睹晏子之食也公曰嘻夫子之家如此其貧乎而寡人不知寡人之罪也晏子對曰以世之不足也免粟之食飽士之一乞也炙三弋士之二乞也五卵士之三乞也嬰無倍人之行而有參士之食君之賜厚矣嬰之家不貧再拜而謝梁丘據自患不及晏子晏子勉據以常為常行梁丘據謂晏子曰吾至死不及夫子矣晏子曰嬰聞之為者常成行者常至嬰非有異于人也常為而不置常行而不休者故難及也晏子老辭邑景公不許致車一乘而後止晏子相景公老辭邑公曰自吾先君定公至今用世多矣齊大夫未有老辭邑者今夫子獨辭之是毀國之故棄寡人也不可晏子對曰嬰聞古之事君者稱身而食德厚而受祿德薄則辭祿德厚受祿所以明上也德薄辭祿可以潔下也嬰老薄無能而厚受祿是掩上之明污下之行不可公不許曰昔吾先君桓公有管仲恤勞齊國身老賞之以三歸澤及子孫今夫子亦相寡人欲為夫子三歸澤至子孫豈不可哉對曰昔者管子事桓公桓公義高諸侯德備百姓今嬰事君也國僅齊於諸侯怨積乎百姓嬰之罪多矣而君欲賞之豈以其不肖父為不肖子厚受賞以傷國民義哉且夫德薄而祿厚智惛而家富是彰污而逆教也不可公不許晏子出異日朝得閒而入邑致車一乘而後止晏子病將死妻問所欲言云毋變爾俗晏子病將死其妻曰夫子無欲言乎子曰吾恐死而俗變謹視爾家毋變爾俗也晏子病將死鑿楹納書命子壯而示之晏子病將死鑿楹納書焉謂其妻曰楹語也子壯而示之及壯發書書之言曰布帛不可窮窮不可飾牛馬不可窮窮不可服士不可窮窮不可任國不可窮窮不可竊也
