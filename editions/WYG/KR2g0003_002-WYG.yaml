body:
  text: 晏子朝復於景公曰朝居嚴乎公曰嚴居朝則曷害於治國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則吾謂之瘖上無聞則吾謂之聾聾瘖非害國家而如何也且合升鼓之㣲以滿倉廪合䟽縷之綈以成帷幕太山之高非一石也累卑然後髙天下者非用一士之言也固有受而不用惡有拒而不受者哉景公登路寢之臺不能終而息乎陛忿然而作色不悅曰孰為髙臺病人之甚也晏子曰君欲節於身而勿髙使人髙之而勿罪也今髙從之以罪卑亦從以罪敢問使人如此可乎古者之為宫室也足以便生不以為奢侈也故節於身謂於民及夏之衰也其王桀背棄德行為璿室玉門殷之衰也其王紂作為傾宫靈臺卑狹者有罪髙大者有賞是以身及焉今君髙亦有罪卑亦有罪甚於夏殷之王民力殫乏矣而不免於罪嬰恐國之流失而公不得享也公曰善寡人自知誠費財勞民以為無功又從而怨之是寡人之罪也非夫子之教豈得守社稷哉遂下再拜不果登臺景公與晏子登寢而望國公愀然而歎曰使後嗣世世有此豈不可哉晏子曰臣聞明君必務正其治以事利民然後子孫享之詩云武王豈不事貽厥孫謀以燕翼子今君處佚怠逆政害民有日矣而猶出若言不亦甚乎公曰然則後世孰將把齊國對曰服牛死夫婦笑非骨肉之親也為其利之大也欲知把齊國者則其利之者耶公曰然何以易對曰移之以善政今公之牛馬老於欄牢不勝服也車蠧於巨户不勝乗也衣裘襦袴朽弊於蔵不勝衣也醯醢腐不勝沽也酒醴酸不勝飲也府粟鬱而不勝食又厚藉斂於百姓而不以分餒民夫蔵財而不用凶也財茍失守下其報環至其次昧財之失守委而不以分人者百姓必進自分也故君人者與其請於人不如請於已也景公成路寢之臺逢於何遭䘮遇晏子於途再拜乎馬前晏子下車挹之曰子何以命嬰也對曰於何之母死兆在路寢之臺牖下願請命合骨晏子曰嘻難哉雖然嬰將為子復之適為不得子將若何對曰夫君子則有以如我者儕小人吾將左手擁格右手梱心立餓枯槁而死以吿四方之士曰於何不能葬其母者也晏子曰諾遂入見公曰有逢於何者母死兆在路寢當如之何願請合骨公作色不悅曰古之及今子亦甞聞請葬人主之宫者乎晏子對曰古之人君其室宫節不侵生民之居臺榭儉不殘死人之墓故未甞聞諸請葬人主之宫者也今君侈為宫室奪人之居廣為臺榭殘人之墓是生者愁憂不得安處死者離易不得合骨豐樂侈逰兼傲生死非人君之行也遂欲滿求不顧細民非存之道且嬰聞之生者不得安命之曰蓄憂死者不得葬命之曰蓄哀蓄憂者怨蓄哀者危君不如許之公曰諾晏子出梁丘據曰自昔及今未甞聞求葬公宫者也若何許之公曰削人之居殘人之墓凌人之䘮而禁其葬是於生者無施於死者無禮詩云榖則異室死則同穴吾敢不許乎逢於何遂塟其母路寢之牖下解衰去絰布衣縢履𤣥冠紕武踊而不哭躃而不拜已乃涕洟而去景公之嬖妾嬰子死公守之三日不食膚著于席不去左右以復而君無聽焉晏子入復曰有術客與醫俱言曰聞嬰子病死願請治之公喜遽起曰病猶可為乎晏子曰客之道也以為良醫也請甞試之君請屏潔沐浴飲食間病者之宫彼亦將有鬼神之事焉公曰諾屏而沐浴晏子令棺人入斂已斂而復曰醫不能治病已斂矣不敢不以聞公作色不說曰夫子以醫命寡人而不使視將斂而不以聞吾之為君名而已矣晏子曰君獨不知死者之不可以生耶嬰聞之君正臣從謂之順君僻臣從謂之逆今君不道順而行僻從邪者邇導害者逺䜛諛萌通而賢良廢滅是以謟諛繁於間邪行交於國也昔吾先君桓公用管仲而覇嬖乎竪刁而滅今君薄於賢人之禮而厚嬖妾之哀且古聖王畜私不傷行斂死不失愛送死不失哀行傷則溺巳愛失則傷生哀失則害性是故聖王節之也即畢殮不留生事棺槨衣衾不以害生飬哭泣處哀不以害生道今朽尸以留生廣愛以傷行修哀以害性君之失矣故諸侯之賔客慙入吾國本朝之臣慙守其職崇君之行不可以導民從君之欲不可以持國且嬰聞之朽而不斂謂之僇尸臭而不收謂之陳胔反明王之性行百姓之誹而内嬖妾於僇胔此之為不可公曰寡人不識請因夫子而為之晏子復曰國之士大夫諸侯四隣賔客皆在外君其哭而節之仲尼聞之曰星之昭昭不若月之曀曀小事之成不若大事之廢君子之非賢於小人之是也其晏子之謂歟梁丘據死景公召晏子而吿之曰據忠且愛我我欲豐厚其葬高大其壟晏子曰敢問據之忠與愛於君者可得聞乎公曰吾有喜於玩好有司未能我具也則據以其所有共我是以知其忠也每有風雨暮夜求必存吾是以知其愛也晏子曰嬰對則為罪不對則無以事君敢不對乎嬰聞之臣專其君謂之不忠子專其父謂之不孝妻專其夫謂之嫉事君之道導親於父兄有禮於羣臣有惠於百姓有信於諸侯謂之忠為子之道以鍾愛其兄弟施行於諸父慈惠於衆子誠信於朋友謂之孝為妻之道使其衆妾皆得歡忻於其夫謂之不嫉今四封之民皆君之臣也而維據盡力以愛君闕景公走狗死公令外共之棺内給之祭晏子聞之諫公曰亦細物也特以與左右為笑耳晏子曰君過矣夫厚籍斂不以反民棄貨財而笑左右傲細民之憂而崇左右之笑則國亦無望巳且夫孤老凍餒而死狗有祭鰥寡不恤而死狗有棺行辟若此百姓聞之必怨吾君諸侯聞之必輕吾國怨聚於百姓而權輕於諸侯而乃以為細物君其圖之公曰善趣庖治狗以會朝屬公孫接田開疆古冶子事景公以勇力搏虎聞晏子過而趨三子者不起晏子入見公曰臣聞明君之蓄勇力之士也上有君臣之義下有長率之倫内可以禁暴外可以威敵上利其功下服其勇故尊其位重其禄今君之蓄勇力之士也上無君臣之義下無長率之倫内不以禁暴外不可威敵此危國之噐也不若去之公曰三子者搏之恐不得刺之恐不中也晏子曰此皆力攻勍敵之人也無長㓜之禮因請公使人少餽之二桃曰三子何不計功而食桃公孫接仰天而歎曰晏子智人也夫使公之計吾功者不受桃是無勇也士衆而桃寡何不計功而食桃矣接一搏􅢢而再搏乳虎若接之功可以食桃而無與人同矣援桃而起田開疆曰吾伏兵而郤三軍者再若開疆之功亦可以食桃而無與人同矣援桃而起古冶子曰吾嘗從君濟於河黿御左驂以入砥柱之流當是時也冶少不能游濳行逆流百歩順流九里得黿而殺之左操驂尾右挈黿頭鶴躍而出津人皆曰河伯也若冶視之則大黿之首若冶之功亦可以食桃而無與人同矣二子何不反桃抽劒而起公孫接田開疆曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也皆反其桃挈領而死古冶子曰二子死之冶獨生之不仁耻人以言而夸其聲不義恨乎所行不死無勇雖然二子同桃而節冶專桃而宜亦反其桃挈領而死使者復曰已死矣公斂之以服葬之以士禮焉景公登射晏子修禮而侍公曰選射之禮寡人厭之矣吾欲得夫勇力士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也夫勇多則弑其君力多則殺其長然而不敢者維禮之謂也禮者所以御民也轡者所以御馬也無禮而能治國家者嬰未之聞也景公曰善廼飾射更席以為上客終日問禮晏子春秋巻二欽定四庫全書晏子春秋巻三内篇
