front:
  text: 諫下第二景公藉重而獄多拘者滿圄怨者滿朝晏子諫公不聼公謂晏子曰夫獄國之重官也願託之夫子晏子對曰君將使嬰勑其功乎則嬰有壹妄能書足以治之矣君將使嬰勑其意乎夫民無欲殘其家室之生以奉暴上之僻者則君使吏比而焚之而已矣景公不悅曰勑其功則使一妄勑其意則比焚如是夫子無所謂能治國乎晏子曰嬰聞與君異今夫胡貉戎狄之蓄狗也多者十有餘寡者五六然不相害傷今束鷄豚妄投之其折骨决皮可立得也且夫上正其治下審其論則貴賤不相踰越今君舉千鍾爵禄而妄投之于左右左右争之甚于胡狗而公不知也寸之管無當天下不能足之以粟今齊國丈夫畊女子織夜以接日不足以奉上而君側皆彫文刻鏤之觀此無當之管也而君終不知五尺童子操寸之煙天下不能足以薪今君之左右皆操煙之徒而君終不知鍾鼓成肆干戚成舞雖禹不能禁民之觀且夫飾民之欲而嚴其聼禁其心聖人所難也而况奪其財而饑之勞其力而疲之常致其苦而嚴聼其獄痛誅其罪非嬰所知也景公有所愛槐令吏謹守之植木縣之下令曰犯槐者刑傷之者死有不聞令醉而犯之者公聞之曰是先犯我令使吏拘之且加罪焉其子徃辭晏子之家託曰負廓之民賤妾請有道于相國不勝其欲願得充數乎下陳晏子聞之笑曰嬰其滛于色乎何為老而見犇雖然是必有故令内之女子入門晏子望見之曰恠哉有深憂進而問焉曰所憂何也對曰君樹槐縣令犯之者刑傷之者死妾父不仁不聞令醉而犯之吏將加罪焉妾聞之明君莅國立政不損禄不益刑又不以私恚害公法不為禽獸傷人民不為草木傷禽獸不為野草傷禾苖吾君欲以樹木之故殺妾父孤妾身此令行于民而法于國矣雖然妾聞之勇士不以衆彊凌孤獨明惠之君不拂是以行其所欲此譬之猶自治魚鱉者也去其腥臊者而巳昧墨與人比居庾肆而教人危坐今君出令于民茍可法于國而善益于後世則父死亦當矣妾為之收亦宜矣甚乎今之令不然以樹木之故罪法妾父妾恐其傷察吏之法而害明君之義也隣國聞之皆謂吾君愛樹而賤人其可乎願相國察妾言以裁犯禁者晏子曰甚矣吾將為子言之于君使人送之歸明日蚤朝而復于公曰嬰聞之窮民財力以供嗜欲謂之暴崇玩好威嚴擬乎君謂之逆刑殺不辜謂之賊此三者守國之大殃今君窮民財力以羡餒食之具繁鍾鼓之樂極宫室之觀行暴之大者崇玩好縣愛槐之令載過者馳歩過者趨威嚴擬乎君逆之明者也犯槐者刑傷槐者死殺不稱賊民之深者君享國德行未見于衆而三辟著于國嬰恐其不可以莅國子民也公曰㣲大夫寡人㡬有大罪以累社稷今子大夫教之社稷之福寡人受命矣晏子出公令趣罷守槐之役㧞置縣之木廢傷槐之法出犯槐之囚景公樹竹令吏謹守之公出過之有斬竹者焉公以車逐得而拘之將加罪焉晏子入見曰公亦聞吾先君丁公乎公曰何如晏子曰丁公伐曲沃勝之止其財出其民公曰自莅之有輿死人以出者公恠之令吏視之則其中金與玉焉吏請殺其人收其金玉公曰以兵降城以衆圍財不仁且吾聞之人君者寛惠慈衆不身傳誅令捨之公曰善晏子退公令出斬竹之囚景公令兵搏治當臈氷月之間而寒民多凍餒而功不成公怒曰為我殺兵二人晏子曰諾少為間晏子曰昔者先君荘公之伐于晉也其役殺兵四人今令而殺兵二人是殺師之半也公曰諾是寡人之過也令止之晏子使于魯比其返也景公使國人起大臺之役嵗寒不巳凍餒之者鄉有焉國人望晏子晏子至巳復事公廼坐飲酒樂晏子曰君若賜臣臣請歌之歌曰庶民之言曰凍水洗我若之何太上靡散我若之何歌終喟然歎而流涕公就止之曰夫子曷為至此殆為大臺之役夫寡人將速罷之晏子再拜出而不言遂如大臺執扑鞭其不務者曰吾細人也皆有蓋廬以避燥濕君為壹臺而不速成何為國人皆曰晏子􅂇天為虐晏子歸未至而君出令趣罷役車馳而人趨仲尼聞之喟然嘆曰古之善為人臣者聲名歸之君禍災歸之身入則切磋其君之不善出則高譽其君之德義是以雖事惰君能使垂衣裳朝諸侯不敢伐其功當此道者其晏子是耶景公為長庲將欲美之有風雨作公與晏子入坐飲酒致堂上之樂酒酣晏子作歌曰穗乎不得穫秋風至兮殫零落風雨之弗殺也太上之靡弊也歌終顧而流涕張躬而舞公就晏子而止之曰今日夫子為賜而誡于寡人是寡人之罪遂廢酒罷役不果成長庲景公築路􅃦之臺三年未息又為長庲之役二年未息又為鄒之長塗晏子諫曰百姓之力勤矣公不息乎公曰塗將成矣請成而息之對曰明君不屈民財者不得其利不窮民力者不得其樂昔者楚靈王作傾宫三年未息也又為章華之臺五年又不息也乾溪之役八年百姓之力不足而息也靈王死于乾溪而民不與君歸今君不遵明君之義而循靈王之跡嬰懼君有暴民之行而不睹長庲之樂也不若息之公曰善非夫子者寡人不知得罪于百姓深也于是令勿委壞餘財勿收斬板而去之景公春夏游獵又起大臺之役晏子諫曰春夏起役且游獵奪民農旹國家空虗不可景公曰吾聞相賢者國治臣忠者主逸吾年無㡬矣欲遂吾所樂卒吾所好子其息矣晏子曰昔文王不敢盤游于田故國昌而民安楚靈王不廢乾溪之役起章華之臺而民叛之今君不革將危社稷而為諸侯笑臣聞忠不避死諫不違罪君不聼臣臣將遊矣景公曰唯唯將弛罷之未㡬朝韋冏解役而歸景公獵休坐地而食晏子後至左右滅葭而席公不說曰寡人不席而坐地二三子莫席而子獨搴草而坐之何也晏子對曰吾聞介冑坐陣不席獄訟不席尸坐堂上不席三者皆憂也故不敢以憂侍坐公曰諾令人下席曰大夫皆席寡人亦席矣景公出獵上山見虎下澤見蛇歸召晏子而問之曰今日寡人出獵上山則見虎下澤則見蛇殆所謂不祥也晏子對曰國有三不祥是不與焉夫有賢而不知一不祥知而不用二不祥用而不任三不祥也所謂不祥乃若此者今上山見虎虎之室也下澤見蛇蛇之穴也如虎之室如蛇之穴而見之曷為不祥也景公為臺臺成又欲為鐘晏子諫曰君國者不樂民之哀君不勝欲既築臺矣今復為鐘是重斂于民民必哀矣夫斂民之哀而以為樂不祥非所以君國者公乃止景公臺已成謂晏子曰吾欲與夫子燕對曰未祀先君而以燕非禮也公曰何以禮為對曰夫禮者民之紀紀亂則民失亂紀失民危道也公曰善乃以祀焉景公為履黄金之綦飾以銀連以珠良玉之絇其長尺冰月服之以聽朝晏子朝公迎之履重僅能舉足問曰天寒乎晏子曰君奚問天之寒也古聖人製衣服也冬輕而暖夏輕而清今君之履冰月服之是重寒也履重不節是過任也失生之情矣故魯工不知寒温之節輕重之量以害正生其罪一也作服不常以笑諸侯其罪二也用財無功以怨百姓其罪三也請拘而使吏度之公苦請釋之晏子曰不可嬰聞之苦身為善者其賞厚苦身為非者其罪重公不對晏子出令吏拘魯工令人送之境吏不得入公撤履不復服也景公問晏子曰吾欲服聖王之服居聖王之室如此則諸侯其至乎晏子對曰法其節儉則可法其服居其室無益也三王不同服而王非以服致諸侯也誠于愛民果于行善天下懷其德而歸其義若其衣服節儉而衆悅也夫冠足以修敬不務其飾衣足以掩形禦寒不務其美衣不務于隅肶之削冠無觚羸之理身服不雜綵首服不鏤刻且古者甞有紩衣攣領而王天下者其義好生而惡殺節上而羡下天下不朝其服而共歸其義古者甞有處櫓巢窟穴而不惡予而不取天下不朝其室而共歸其仁及三代作服為益敬也首服足以修敬而不重也身服足以行潔而不害于動作服之輕重便于身用財之費順于民其不為櫓巢者以避風也其不為穴者以避濕也是故明堂之制下之潤濕不能及也上之寒暑不能入也土事不文木事不鏤示民之節也及其衰也衣服之侈過足以敬宫室之美過避潤濕用力甚多用財甚費與民為讐今君欲法聖王之服不法其制法其節儉也則雖未成治庶其有益也今君窮臺榭之髙極汙池之深而不止務于刻鏤之巧文章之觀而不厭則亦與民而讐矣若臣之慮恐國之危而公不平也公乃願致諸侯不亦難乎公之言過矣景公為西曲潢其深滅軌髙三仞横木龍蛇立木鳥獸公衣黼黻之衣素繡之裳一衣而五彩具焉帶球玉而冠且被髪亂首南面而立傲然晏子見公曰昔仲父之覇何如晏子抑首而不對公又曰昔管文仲之覇何如晏子對曰臣聞之維翟人與龍蛇比今君横木龍蛇立木鳥獸亦室一就矣何暇在覇哉且公伐宫室之美矜衣服之麗一衣而五彩具焉帶球玉而亂首被髪亦室一容矣萬乗之君而一心于邪君之魂魄亡矣以誰與圖覇哉公下堂就晏子曰梁丘據裔欵以室之成吿寡人是以竊襲此服與據為笑又使夫子及寡人請改室易服而敬聽命其可乎晏子曰夫二子營君以邪公安得知道哉且伐木不自其根則蘖又生也公何不去二子者毋使耳目淫焉景公為巨冠長衣以聽朝疾視矜立日晏不罷晏子進曰聖人之服中侻而不駔可以導衆其動作侻順而不逆可以奉生是以下皆法其服而民争學其容今君之服駔華不可以導衆民疾視矜立不可以奉生日晏矣君不若脫服就燕公曰寡人受命退朝遂去衣冠不復
