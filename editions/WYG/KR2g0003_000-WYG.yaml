body:
  text: 晏子春秋𫝊記類二名人之屬提要臣等謹案晏子春秋八巻舊本題齊晏嬰撰晁公武讀書志嬰相景公此書著其行事及諫諍之言崇文總目謂後人採嬰行事為之非嬰所撰然則是書所記乃唐人魏徵諫錄李綘論事集之流特失其編次者之姓名耳題為嬰者依託也其中如王士禎池北偶談所摘濟景公圉人一事鄙倍荒唐殆同戲劇則妄人又有所竄入非原本矣劉向班固俱列之儒家中惟柳宗元以為墨子之徒有齊人者為之其㫖多尚兼愛非厚葬久喪者又往往言墨子聞其道而稱之薛季宣浪語集又以為孔叢子詰墨諸條今皆見晏子書中則嬰之學實出于墨盖嬰雖畧在墨翟前而史角止魯實在恵公之時見吕氏春秋仲春記尚染篇故嬰能先宗其説也其書自史記管晏列𫝊已稱為晏子春秋故劉知㡬史通稱晏子虞卿吕氏陸賈其書篇第本無年月而亦謂之春秋然漢志惟作晏子隋志乃名春秋盖二名兼行也漢志隋志皆作八篇至陳氏晁氏書目乃皆作十二巻盖篇帙己多有更改矣此為明季氏綿𦕈閣刻本内篇分諫上諫下問上問下雜上雜下六篇外篇上下二篇與漢志八篇之數相合若世所𫝊烏程閔氏刻本以一事而内篇外篇􅃨見所記大同小異者悉移而夾註内篇下殊為變亂無緒今故仍從此本著錄庶㡬猶畧近古焉乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書晏子春秋巻一内篇諫上第一莊公奮
  hash: sha256:fff874bf26497008b199e03c3da675e74044841ff2bf9fe415001bfcd9fad633
