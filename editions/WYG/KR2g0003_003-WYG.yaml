front:
  text: 問上第三荘公問晏子曰威當世而服天下時耶晏子對曰行也公曰何行對曰能愛邦内之民者能服境外之不善重士民之死力者能禁暴國之邪逆聽任賢者能威諸侯安仁義而樂利世者能服天下不能愛邦内之民者不能服境外之不善輕士民之死力者不能禁暴國之邪逆愎諫傲賢者之言不能威諸侯倍仁義而貪名實者不能威當世而服天下者此其道也已而公不用晏子退而窮處公任勇力之士而輕臣僕之死用兵無休國罷民害朞年百姓大亂而身及崔氏禍君子曰盡忠不豫交不用不懐禄其晏子可謂亷矣荘公將伐晉問于晏子晏子對曰不可君得合而欲多養欲而意驕得合而欲多者危養欲而意驕者困今君任勇力之士以伐明主若不濟國之福也不德而有功憂必及君公作色不說晏子辭不為臣退而窮處堂下生蓼藿門外生荆棘荘公終任勇力之士西伐晉取朝歌及太行孟門兹於兌朞而民散身㓕於崔氏崔氏之亂逐羣公及慶氏亡景公舉兵欲伐魯問於晏子晏子對曰不可魯公好義而民戴之好義者安見戴者和伯禽之治存焉故不可攻攻義者不祥危安者必困且嬰聞之伐人者德足以安其國政足以和其民國安民和然後可以舉兵而征暴今君好酒而辟德無以安國厚藉斂意使令無以和民德無以安之則危政無以和之則亂未免乎危亂之理而欲伐安和之國不可不若脩政而待其君之亂也其君離上怨其下然後伐之則義厚而利多義厚則敵寡利多則民歡公曰善遂不果代魯景公伐斄勝之問晏子曰吾欲賞於斄何如對曰臣聞之以謀勝國者益臣之禄以民力勝國者益民之利故上有羡獲下有加利君上享其名臣下利其實故用智者不偷業用力者不傷苦此古之善伐者也公曰善於是破斄之臣東邑之卒皆有加利是上獨擅名利下流也景公外傲諸侯内輕百姓好勇力崇樂以從嗜欲諸侯不說百姓不親公患之問於晏子曰古之聖王其行若何晏子對曰其行公正而無邪故讒人不得入不阿黨不私色故羣徒之卒不得容薄身厚民故聚斂之人不得行不侵大國之地不耗小國之民故諸侯皆欲其尊不刼人以甲兵不威人以衆彊故天下皆欲其彊德行教訓加於諸侯慈愛利澤加于百姓故海内歸之若流水今衰世君人者辟邪阿黨故讒諂羣徒之卒繁厚身養薄視民故聚斂之人行侵大國之地耗小國之民故諸侯不欲其尊刼人以兵甲威人以衆强故天下不欲其强災害加於諸侯勞苦施於百姓故讐敵進伐天下不救貴威離散百姓不興公曰然則何若對曰請卑辭重幣以說于諸侯輕罪省功以謝于百姓其可乎公曰諾於是卑辭重幣而諸侯附輕罪省功而百姓親故小國入朝燕魯共貢墨子聞之曰晏子知道道在為人而失為已為人者重自為者輕景公自為而小國不為與在為人而諸侯為役則道在為人而行在反已矣故晏子知道矣景公問晏子曰吾欲善治齊國之政以干覇王之諸侯晏子作色對曰官未具也臣數以聞而君不肯聽也故臣聞仲尼居處惰倦亷隅不正則季次原憲侍氣鬱而疾志意不通則仲由卜商侍德不盛行不厚則顔囘騫雍侍今君之朝臣萬人兵車千乗不善政之所失于下霣墜下民者衆矣未有能士敢以聞者臣故曰官未具也公曰寡人今欲從夫子而善齊國之政可乎對曰嬰聞國有具官然後其政可善公作色不說曰齊國雖小柰何謂官不具對曰此非臣之所復也昔吾先君桓公身體惰懈辭令不給則隰朋暱侍右左多過獄讞不中則弦寗暱侍田野不修民氓不安則寗戚暱侍軍吏怠戎士偷則王子成甫暱侍居處佚怠左右懾畏繁乎樂省乎治則東郭牙暱侍德義不中信行衰㣲則管子暱侍先君能以人之長續其短以人之厚補其薄是以辭令窮逺而不逆兵加於有罪而不頓是故諸侯朝其德而天子致其胙今君之過失多矣未有一士以聞也故曰官不具公曰善景公問晏子曰昔吾先君桓公有管仲夷吾保乂齊國能遂武功而立文德糾合兄弟撫存翌州呉越受令荆楚惛憂莫不賔服勤于周室天子加德先君昭功管子之力也今寡人亦欲存齊國之政於夫子夫子以佐佑寡人彰先君之功烈而繼管子之業晏子對曰昔吾先君桓公能任用賢國有什伍治徧細民貴不凌賤冨不傲貧功不遺罷佞不吐愚舉事不私聽獄不阿内妾無羡食外臣無羡禄鰥寡無饑色不以飲食之辟害民之財不以宫室之侈勞人之力節取於民而普施之府無蔵倉無粟上無驕行下無謟德是以管子能以齊國免於難而以吾先君參乎天子今君欲彰先君之功烈而繼管子之業則無以多辟傷百姓無以嗜欲玩好怨諸侯臣孰敢不承善盡力以順君意今君䟽逺賢人而任讒諛使民若不勝藉斂若不得厚取於民而薄其施多求于諸侯而輕其禮府藏朽蠧而禮悖於諸侯菽粟蔵深而怨積于百姓君臣交惡而政刑無常臣恐國之危失而公不得享也又惡能彰先君之功烈而繼管子之業乎景公問晏子莒與魯孰先亡對曰以臣觀之也莒之細人變而不化貪而好假高勇而賤仁士武以疾忿急以速竭是以上不能養其下下不能事其上上下不能相收則政之大體失矣故以臣觀之也莒其先亡公曰魯何如對曰魯之君臣猶好為義下之妥妥也奄然寡聞是以上能養其下下能事其上上下相收政之大體存矣故魯猶可長守然其亦有一焉彼鄒滕雉犇而出其地猶稱公侯大之事小弱之事强乆矣彼周者殷之樹國也魯近齊而親殷以變小國而不服於隣以逺望魯㓕國之道也齊其有魯與莒乎公曰魯與莒之事寡人既得聞之矣寡人之德亦薄然後世孰踐有齊國者對曰田無宇之後為㡬公曰何故也對曰公量小私量大以施於民其與士交也用財無筐篋之藏國人負携其子而歸之若水之流下也夫先與人利而後辭其難不亦寡乎若茍勿辭也從而撫之不亦㡬乎景公問於晏子曰治國何患晏子對曰患夫社䑕公曰何謂也對曰夫社束木而塗之䑕因徃託焉熏之則恐燒其木灌之則恐敗其塗此䑕所以不可得殺者以社故也夫國亦有焉人主左右是也内則蔽善惡于君上外則賣權重于百姓不誅之則為亂誅之則為人主所案據腹而有之此亦國之社䑕也人有酤酒者為噐甚潔清置表甚長而酒酸不售問之里人其故里人云公狗之猛人挈噐而入且酤公酒狗迎而噬之此酒所以酸而不售也夫國亦有猛狗用事者是也有道術之士欲干萬乗之主而用事者迎而齕之此亦國之猛狗也左右為社䑕用事者為猛狗主安得無壅國安得無患乎景公問晏子曰寡人意氣衰身病甚今吾欲具圭璋犧牲令祝宗薦之乎上帝宗廟意者禮可以干福乎晏子對曰嬰聞之古者先君之干福也政必合乎民行必順乎神節宫室不敢大斬伐以無偪山林節飲食無多畋漁以無偪川澤祝宗用事辭罪而不敢有所求也是以神民俱順而山川納禄今君政反乎民而行悖乎神大宫室多斬伐以偪山林羡飲食多畋漁以偪川澤是以民神俱怨而山川收禄司過薦罪而祝宗祈福意者逆乎公曰寡人非夫子無所聞此請革心易行于是廢公阜之遊止海食之獻斬伐者以時畋漁者有數居處飲食節之勿羡祝宗用事辭罪而不敢有所求也故隣國忌之百姓親之晏子没而後衰景公問晏子曰古之盛君其行如何晏子對曰薄于身而厚于民約于身而廣于世其處上也足以明政行教不以威天下其取財也權有無均貧富不以養嗜欲誅不避貴賞不遺賤不淫于樂不遁于哀盡智導民而不伐焉勞力嵗事而不責焉為政尚相利故下不以相害行教尚相愛故民不以相惡為名刑罰中於法廢罪順於民是以賢者處上而不華不肖者處下而不怨四海之内社稷之中粒食之民一意同欲若夫私家之政生有遺教此盛君之行也公不圖晏子曰臣聞問道者更政聞道者更容今君稅斂重故民心離市賈悖故商旅絶玩好充故家貨殚積邪在於上蓄怨蔵於民嗜欲備於側毁非滿於國而公不圖公曰善于是令玩好不御公市不豫宫室不飾業土不成止役輕稅上下行之而百姓相親景公問晏子曰謀必得事必成有術乎晏子對曰有公曰其術如何晏子曰謀度於義者必得事因于民者必成公曰奚謂也對曰其謀也左右無所繫上下無所靡其聲不悖其實不逆謀于上不違天謀于下不違民以此謀者必得矣事大則利厚事小則利薄稱事之小大權利之輕重國有義勞民有如利以此舉事者必成矣夫逃人而謀雖成不安傲民舉事雖成不榮故臣聞義謀之法以民事之本也故及義而謀信民而動未聞不存者也昔三代之興也謀必度其義事必因于民及其衰也建謀不及義興事傷民故度義因民謀事之術也公曰寡人不敏聞善不行其危如何對曰上君全善其次出入焉其次結邪而羞問全善之君能制出入之君時問雖日危尚可以没身羞問之君不能保其身今君雖危尚可没其身也景公問晏子曰莅國治民善為國家者何如晏子對曰舉賢以臨國官能以敕民則其道也舉賢官能則民與若矣公曰雖有賢能吾庸知乎晏子對曰賢而隠庸為賢乎吾君亦不務乎是故不知也公曰請問求賢對曰觀之以其游説之以其行君無以靡曼辯辭定其行無以毁譽非議定其身如此則不為行以揚聲不掩欲以榮君故通則視其所舉窮則視其所不為富則視其所不取夫上士難進而易退也其次易進易退也其下易進難退也以此數物者取人其可乎景公問晏子曰為君身尊民安為臣事治身榮難乎易乎晏子對曰易公曰何若對曰為君節養其餘以顧民則君尊而民安為臣忠信而無踰職業則事治而身榮公又問為君何行則危為臣何行則廢晏子對曰為君厚藉斂而託之為民進讒諛而託之用賢逺公正而託之不順君行此三者則危為臣比周以求進踰職業防下隱利而求多從君不陳過而求親人臣行此三者則廢故明君不以邪觀民守則而不虧立法儀而不犯茍有所求于民而不以身害之是故刑政安於下民心固於上故察士不比周而進不為苟而求言無隂陽行無内外順則進否則退不與上行邪是以進不失亷退不失行也景公問晏子曰寡人持不仁其無義耳也不然北面與夫子而義晏子對曰嬰人臣也公曷為出若言公曰請終問天下之所以存亡晏子曰縵宻不能蔍苴學者詘身無以用人而又不為人用者卑善人不能戚惡人不能踈者危交游朋友從無以說于人又不能說人者窮事君要利大者不得小者不為者餧脩道立義大不能專小不能附者滅此足以觀存亡矣景公問晏子曰君子常行曷若晏子對曰衣冠不中不敢以入朝所言不義不敢以要君行已不順治事不公不敢以莅衆衣冠無不中故朝無竒辟之服所言無不義故下無偽上之報身行順治事公故國無阿黨之義三者君子之常行者也景公問晏子曰賢君之治國若何晏子對曰其政任賢其行愛民其取下節其自養儉在上不犯下在治不傲窮從邪害民者有罪進善舉過者有賞其政刻上而饒下赦過而救窮不因喜以加賞不因怒以加罰不從欲以勞民不脩怒而危國上無驕行下無謟德上無私義下無竊權上無朽蠧之蔵下無凍餒之民不事驕行而尚同其民安樂而尚親賢君之治國若此景公問晏子曰明王之教民何若晏子對曰明其教令而先之以行義養民不苛而防之以刑辟所求于下者不務于上所禁于民者不行于身守于民財無虧之以利立于儀法不犯之以邪苟所求于民不以身害之故下之勸從其教也稱事以任民中聽以禁邪不窮之以勞不害之以實茍所禁于民不以事逆之故下不敢犯其上也古者百里而異習千里而殊俗故明王脩道一民同俗上愛民為法下相親為義是以天下不相遺此明王教民之理也景公問于晏子曰忠臣之事君也何若晏子對曰有難不死出亡不送公不悅曰君裂地而封之䟽爵而貴之君有難不死出亡不送可謂忠乎對曰言而見用終身無難臣奚死焉謀而見從終身不出臣奚送焉若言不用有難而死之是妄死也謀而不從出亡而送之是詐偽也故忠臣也者能納善於君不能與君陷於難景公問晏子曰忠臣之行何如對曰不掩君過諫乎前不華乎外選賢進能不私乎内稱身就位計能定禄睹賢不居其上受禄不過其量不權居以為行不稱位以為忠不揜賢以隠長不刻下以諛上君在不事太子國危不交諸侯順則進否則退不與君行邪也景公問佞人之事君如何晏子對曰意難難不至也明言行之以飾身偽言無欲以說人嚴其交以見其愛觀上之所欲而㣲為之偶求君逼邇而隂為之與内重爵禄而外輕之以誣行下事左右而面示至公以偽亷求上采聽而幸以求進傲禄以求多辭任以求重工乎取鄙乎予歡乎新慢乎故恡乎財薄乎施覩貧窮若不識趨利若不及外交以自揚背親以自厚積豐義之養而聲矜䘏之義非譽乎情而言不行身渉旹所議而好論賢不肖有之已不難非之人無之已不難求之人其言彊梁而信其進敏遜而順此佞人之行也明君之所誅愚君之所信也景公問晏子曰聖人之不得意何如晏子對曰上作事反天時從政逆鬼神籍斂殫百姓四時易序神祗並怨道忠者不聽薦善者不行諛過者有賚救失者有罪故聖人伏匿隠處不干長上潔身守道不與世䧟乎邪是以卑而不失義瘁而不失亷此聖人之不得意也聖人之得意何如對曰世治政平舉事調乎天藉斂和乎百姓樂及其政逺者懐其德四時不失序風雨不降虐天明象而贊地長育而具物神降福而不靡民服教而不偽治無怨業居無廢民此聖人之得意也景公問晏子曰古者君民而不危用國而不弱惡乎失之晏子對曰嬰聞之以邪莅國以暴和民者危脩道以要利得求而返邪者弱古者文王修德不以要利㓕暴不以順紂干崇侯之暴而禮梅伯之醢是以諸侯明乎其行百姓通乎其德故君民而不危用國而不弱也景公問晏子曰古之莅國治民者其任人何如晏子對曰地不同生而任之以一種責其俱生不可得人不同能而任之以一事不可責徧成責焉無已智者有不能給求焉無饜天地有不能贍也故明王之任人謟諛不邇乎左右阿黨不治乎本朝任人之長不强其短任人之工不强其拙此任人之大畧也景公問晏子曰古者離散其民而隕失其國者其常行何如晏子對曰國貧而好大智薄而好專貴賤無親焉大臣無禮焉尚䜛諛而賤賢人樂簡慢而玩百姓國無常法民無經紀好辯以為忠流湎而忘國好兵而忘民肅于罪誅而慢于慶賞樂人之哀利人之難德不足以懐人政不足以惠民賞不足以勸善刑不足以防非亡國之行也今民聞公令如冦讐此古離散其民隕失其國所常行者也景公問晏子曰吾欲和民親下柰何晏子對曰君得臣而任使之與言信必順其令赦其過任大無多責焉使邇臣無求嬖焉無以嗜欲貧其家無信䜛人傷其心家不外求而足事君不因人而進則臣和矣儉於藉斂節于貨財作工不歴時使民不盡力百官節適闗市省征山林陂澤不專其利領民治民勿使煩亂知其貧冨勿使凍餒則民親矣公曰善寡人聞命矣故令諸子無外親謁辟梁丘據無使受報百官節適闗市省征陂澤不禁寃報者過留獄者請焉景公問晏子曰取人得賢之道何如晏子對曰舉之以語考之以事能諭則尚而親之近而勿辱以取人則得賢之道也是以明君居上寡其官而多其行拙于文而工于事言不中不言行不法不為也景公問晏子曰臣之報其君何以晏子對曰臣雖不知必務報君以德士逢有道之君則順其令逢無道之君則争其不義故君者擇臣而使之臣雖賤亦得擇君而事之景公問晏子曰臨國莅民所患何也晏子對曰所患者三忠臣不信一患也信臣不忠二患也君臣異心三患也是以明君居上無忠而不信無信而不忠者是故君臣同欲而百姓無怨也景公問于晏子曰為政何患晏子對曰患善惡之不分公曰何以察之對曰審擇左右善則百僚各得其所宜而善惡分孔子聞之曰此言也信矣善進則不善無由入矣不善進則善無由入矣
