front:
  text: 雜下第六靈公好婦人而丈夫飾者國人盡服之公使吏禁之曰女子而男子飾者裂其衣斷其帶裂衣斷帶相望而不止晏子見公問曰寡人使吏禁女子而男子飾裂斷其衣帶相望而不止者何也晏子對曰君使服之于内而禁之於外猶懸牛首于門而賣馬肉于内也公何以不使内勿服則外莫敢為也公曰善使内勿服踰月而國莫之服齊人甚好轂擊相犯以為樂禁之不止晏子患之廼為新車良馬出與人相犯也曰轂擊者不祥臣其祭祀不順居處不敬乎下車而棄去之然後國人乃不為故曰禁之以制而身不先行民不能止故化其心莫若教也景公畋于梧丘夜猶早公姑坐睡而夢有五丈夫北面常廬稱無罪焉公覺召晏子而告其所夢公曰我其嘗殺不辜誅無罪耶晏子對曰昔者先君靈公畋五丈夫罟而駭獸故殺之斷其頭而葬之命曰五丈夫之丘此其地耶公令人掘而求之則五頭同穴而存焉公曰嘻令吏葬之國人不知其夢也曰君憫白骨而况于生者乎不遺餘力矣不釋餘知矣故曰君子之為善易矣景公為路寢之臺成而不通焉栢常騫曰君為臺甚急臺成君何為而不通焉公曰然有鴞昔者鳴聲無不為也吾惡之甚是以不通焉栢常騫曰臣請禳而去公曰何具對曰築新室為置白茅公使為室成置白茅焉栢常騫夜用事明日問公曰今昔聞鴞聲乎公曰一鳴而不復聞使人徃視之鴞當陛布翌伏地而死公曰子之道若此其明亦能益寡人之夀乎對曰能公曰能益幾何對曰天子九諸侯七大夫五公曰子亦有徴兆之見乎對曰得夀地且動公喜令百官趣具騫之所求栢常騫出遭晏子于塗拜馬前騫辭曰為君禳鴞而殺之君謂騫曰子之道若此其明也亦能益寡人夀乎騫曰能今且大祭為君請夀故將徃以聞晏子曰嘻亦善能為君請夀也雖然吾聞之維以政與徳而順乎神為可以益夀今徒祭可以益夀乎然則福兆有見乎對曰得夀地將動晏子曰騫昔吾見維星絶樞星散地其動汝以是乎栢常騫俯有間仰而對曰然晏子曰為之無益不為無損也汝薄斂毋費民且令君知之景公新成栢寢之室使師開鼔琴師開左撫宮右彈商曰室夕公曰何以知之師開對曰東方之聲薄西方之聲揚公召大匠曰室何為夕大匠曰立室以宮矩為之于是召司空曰立宮何為夕司空曰立宮以城矩為之明日晏子朝公公曰先君太公以營丘之封立城曷為夕晏子對曰古之立國者南望南斗北戴樞星彼安有朝夕哉然而以今之夕者周之建國國之西方以尊周也公蹵然曰古之臣乎景公病水卧十数日夜夢與二日鬭不勝晏子朝公曰夕者夢與二日鬬而寡人不勝我其死乎晏子對曰請召占夢者出于閨使人以車迎占夢者至曰曷為見召晏子曰夜者公夢二日與公鬬不勝公曰寡人死乎故請君占夢是所為也占夢者曰請反其書晏子曰毋反書公所病者隂也日者陽也一隂不勝二陽故病將巳以是對占夢者入公曰寡人夢與二日鬬而不勝寡人死乎占夢者對曰公之所病隂也日者陽也一隂不勝二陽公病將巳居三日公病大愈公且賜占夢者占夢者曰此非臣之力晏子教臣也公召晏子且賜之晏子曰占夢以占之言對故有益也使臣言之則不信矣此占夢之力也臣無功焉公兩賜之曰以晏子不奪人之功以占夢者不蔽人之能景公病疽在背髙子國子請公曰職當撫瘍高子進而撫瘍公曰熱乎曰熱熱何如曰如火其色何如曰如未熟李大小何如曰如豆墮者何如曰如屨辦二子者出晏子請見公曰寡人有病不能勝衣冠以出見夫子夫子其辱視寡人乎晏子入呼宰人具盥御者具巾刷手温之發席傅薦跪請撫瘍公曰其熱何如曰如日其色何如曰如蒼玉大小何如曰如璧其墮者何如曰如珪晏子出公曰吾不見君子不知野人之拙也晏子使吳吳王謂行人曰吾聞晏嬰盖北方辯于辭習于禮者也命儐者曰客見則稱天子請見明日晏子有事行人曰天子請見晏子蹵然行人又曰天子請見晏子蹵然又曰天子請見晏子蹵然者三曰臣受命敝邑之君將使于吳王之所以不敏而迷惑入于天子之朝敢問吳王惡乎存然後吳王曰夫差請見見之以諸侯之禮晏子使楚以晏子短楚人為小門于大門之側而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當從此門入儐者更道從大門入見楚王王曰齊無人耶晏子對曰臨淄三百閭張袂成隂揮汗成雨比肩繼踵而在何為無人王曰然則子何為使乎晏子對曰齊命使各有所主其賢者使使賢王不肖者使使不肖王嬰最不肖故直使楚矣晏子將至楚楚聞之謂左右曰晏嬰齊之習辭者也今方來吾欲辱之何以也左右對曰為其來也臣請縛一人過王而行王曰何為者也對曰齊人也王曰何坐曰坐盗晏子至楚王賜晏子酒酒酣吏二縛一人詣王王曰縛者曷為者也對曰齊人也坐盗王視晏子曰齊人固善盗乎晏子避席對曰嬰聞之橘生淮南則為橘生于淮北則為枳葉徒相似其實味不同所以然者何水土異也今民生長于齊不盗入楚則盗得無楚之水土使民善盗耶王笑曰聖人非所與嬉也寡人反取病焉景公使晏子于楚楚王進橘置削晏子不剖而並食之楚王曰當剖晏子對曰臣聞之賜人主前者𤓰桃不削橘柚不剖今者萬乗無教令臣故不敢剖不然臣非不知也景公飲酒田桓子侍望見晏子而復于公曰請浮晏子公曰何故也無宇對曰晏子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是隠君之賜也公曰諾晏子坐酌者奉觴進之曰君命浮子晏子曰何故也田桓子曰君賜之卿位以尊其身寵之百萬以富其家羣臣其爵莫尊于子祿莫重于子今子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是則隠君之賜也故浮子晏子避席曰請飲而後辭乎其辭而後飲乎公曰辭然後飲晏子曰君之賜卿位以尊其身嬰非敢為顯受也為行君令也寵以百萬以富其家嬰非敢為富受也為通君賜也臣聞古之賢君有受厚賜而不顧其困族則過之臨事守職不勝其任則過之君之内𨽻臣之父兄若有離散在于野鄙此臣之罪也君之内𨽻臣之所職若有播之在于四方此臣之罪也兵革之不完戰車之不修此臣之罪也若夫敝車駑馬以朝意者非臣之罪乎且臣以君之賜父之黨無不乗車者母之黨無不足于衣食者妻之黨無凍餒者國之閒士待臣而後舉火者数百家如此者為彰君賜乎為隠君賜乎公曰善為我浮無宇也田桓子見晏子獨立于墻隂曰子何為獨立而不憂何不求四鄉之學士可者而與坐晏子曰共立似君子出言而非也嬰惡得學士之可者而與之坐且君子之難得也若美山然名山既多矣松栢既茂矣望之相相然盡目力不知厭而世有所美焉固欲登彼相相之上仡仡然不知厭小人者與此異若部婁之未登善登之無蹊維有楚棘而巳逺望無見也俛就則傷嬰惡能無獨立焉且人何憂静處逺慮見嵗若月學問不厭不知老之將至安用從酒田桓子曰何謂從酒晏子曰無客而飲謂之從酒今若子者晝夜守尊謂之從酒也欒氏髙氏欲逐田氏鮑氏田氏鮑氏先知而遂攻之髙彊曰先得君田鮑安徃遂攻虎門二家召晏子晏子無所從也從者曰何為不助田鮑晏子曰何善焉其助之也何為不助欒髙曰庸愈于彼乎門開公召而入欒髙不勝而出田桓子欲分其家以告晏子晏子曰不可君不能飭法而羣臣専制亂之本也今又欲分其家利其貨是非制也子必致之公且嬰聞之禁者政之本也讓者徳之主也欒髙不讓以至此禍可毋慎乎㢘之謂公正讓之謂保徳凡有血氣者皆有争心蕰利生孽維義可以為長存且分争者不勝其禍辭讓者不失其福子必勿取桓子曰善盡致之公而請老于劇慶氏亡分其邑與晏子􅆁殿其鄙六十晏子弗受子尾曰富者人之所欲也何獨弗欲晏子對曰慶氏之邑足欲故亡吾邑不足欲也益之以􅆁殿廼足欲足欲亡無日矣在外不得宰吾一邑不受􅆁殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫生厚而用利于是乎正徳以幅之使無黜慢謂之幅利利過則為敗吾不敢貪多所謂幅也景公祿晏子以平隂與棠邑反市者十一社晏子辭曰吾君好治宫室民之力弊矣又好盤游翫好以飭女子民之財竭矣又好興師民之死近矣弊其力竭其財近其死下之疾其上甚矣此嬰之所為不敢受也公曰是則可矣雖然君子獨不欲富與貴乎晏子曰嬰聞為人臣者先君後身安國而度家宗君而處身曷為獨不欲富與貴也公曰然則曷以禄夫子晏子對曰君商漁鹽闗市譏而不征耕者十取一焉弛刑罰若死者刑若刑者罰若罰者免若此三言者嬰之禄君之利也公曰此三言者寡人無事焉請以從夫子公既行若三言使人問大國大國之君曰齊安矣使人問小國小國之君曰齊不我加矣晏子相齊三年政平民説梁丘據見晏子中食而肉不足以告景公旦日割地將封晏子晏子辭不受曰富而不驕者未嘗聞之貧而不恨者嬰是也所以貧而不恨者以善為師也今封易嬰之師師巳輕封巳重矣請辭晏子方食景公使使者至分食食之使者不飽晏子亦不飽使者反言之公公曰嘻晏子之家若是其貧也寡人不知是寡人之過也使吏致千金與市租請以奉賔客晏子辭三致之終再拜而辭曰嬰之家不貧以君之賜澤覆三族延及交遊以振百姓君之賜也厚矣嬰之家不貧也嬰聞之夫厚取之君而施之民是臣代君君民也忠臣不為也厚取之君而不施于民是為筐篋之藏也仁人不為也進取于君退得罪于士身死而財遷于它人是為宰藏也智者不為也夫十緫之布一豆之食足于中免矣景公謂晏子曰昔吾先君桓公以書社五百封管仲不辭而受子辭之何也晏子曰嬰聞之聖人千慮必有一失愚人千慮必有一得意者管仲之失而嬰之得者耶故再拜而不敢受命晏子相齊衣十升之布脱粟之食五卵苔菜而巳左右以告公公為之封邑使田無宇致臺與無鹽晏子對曰昔吾先君太公受之營丘為地五百里為世國長自太公至于公之身有数十公矣茍能説其君以取邑不至公之身趣齊搏以求升土不得容足而寓焉嬰聞之臣有徳益禄無徳退禄惡有不肖父為不肖子為封邑以敗其君之政者乎遂不受景公賜晏子邑晏子辭田桓子謂晏子曰君歡然與子邑必不受以恨君何也晏子對曰嬰聞之節受于上者寵長于君儉居處者名廣于外夫長寵廣名君子之事也嬰獨庸能已乎景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者晏子辭曰君之先臣容焉臣不足以嗣之于臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既竊利之敢不識乎公曰何貴何賤是時也公繁于刑有鬻踊者故對曰踊貴而屨賤公愀然改容公為是省于刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄巳其是之謂乎晏子使晉景公更其宅反則成矣既拜廼毁之而為里室皆如其􅁬則使宅人反之且諺曰非宅是卜維隣是卜二三子先卜隣矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其􅃇宅公弗許因陳桓子以請廼許之景公謂晏子曰寡人欲朝夕見為夫子築室于閨内可乎晏子對曰臣聞之隠而顯近而結維至賢耳如臣者飾其容止以待承令猶恐罪戾也今君近之是逺之也請辭景公有愛女請嫁于晏子公廼徃燕晏子之家飲酒酣公見其妻曰此子之内子耶晏子對曰然是也公曰嘻亦老且惡矣寡人有女少且姣請以滿夫子之宮晏子違席而對曰乃此則老且惡嬰與之居故矣故及其少而姣也且人固以壯託乎老姣託乎惡彼嘗託而嬰受之矣君雖有賜可以使嬰倍其託乎再拜而辭晏子朝乗敝車駕駑馬景公見之曰嘻夫子之禄寡耶何乗不任之甚也晏子對曰賴君之賜得以夀三族及國游士皆得生焉臣得暖衣飽食敝車駑馬以奉其身于臣足矣晏子出公使梁丘據遺之輅車乗馬三返不受公不悦趣召晏子晏子至公曰夫子不受寡人亦不乗晏子對曰君使臣臨百官之吏臣節其衣服飲食之養以先國之民然猶恐其侈靡而不顧其行也今輅車乗馬君乗之上而臣亦乗之下民之無義侈其衣服飲食而不顧其行者臣無以禁之遂讓不受晏子相景公食脱粟之食炙三弋五卵苔菜耳矣公聞之徃燕焉睹晏子之食也公曰嘻夫子之家如此其貧乎而寡人不知寡人之罪也晏子對曰以世之不足也免粟之食飽士之一餼也炙三弋士之二餼也五卵士之三餼也嬰無倍人之行而有參士之食君之賜厚矣嬰之家不貧再拜而謝梁丘據謂晏子曰吾至死不及夫子矣晏子曰嬰聞之為者常成行者常至嬰非有異于人也常為而不置常行而不休者故難及也晏子相景公老辭邑公曰自吾先君定公至今用世多矣齊大夫未有老辭邑者矣今夫子獨辭之是毁國之故棄寡人也不可晏子對曰嬰聞古之事君者稱身而食徳厚而受禄徳薄則辭禄徳厚受禄所以明上也徳薄辭禄所以潔下也嬰老薄無能而厚受禄是掩上之明汚下之行不可公不許曰昔吾先君桓公有管仲恤勞齊國身老賞之以三歸澤及子孫今夫子亦相寡人欲為夫子三歸澤至子孫豈不可哉對曰昔者管子事桓公桓公義髙諸侯徳備百姓今嬰事君也國僅齊于諸侯怨積乎百姓嬰之罪多矣而君欲賞之豈以其不肖父其不肖子厚受賞以傷國民義哉且夫徳薄而禄厚智惛而家富是彰汚而逆教也不可公不許晏子出異日朝得間而入邑致車一乗而後止晏子病將死其妻曰夫子無欲言乎子曰吾恐死而俗變謹視爾家毋變爾俗也晏子病將死鑿楹納書焉謂其妻曰楹語也子壮而示之及壮發書之言曰布帛不可窮窮不可飾牛馬不可窮窮不可服士不可窮窮不可任國不可窮窮不可竊也
