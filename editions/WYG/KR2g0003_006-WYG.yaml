body:
  text: 晏子春秋巻六欽定四庫全書晏子春秋巻七外篇上景公飲酒數日而樂釋衣冠自鼔缶謂左右曰仁人亦樂是夫梁丘據對曰仁人之耳目亦猶人也夫奚為獨不樂此也公曰趣駕迎晏子晏子朝以至受觴再拜公曰寡人甚樂此樂欲與夫子共之請去禮晏子對曰君之言過矣羣臣皆欲去禮以事君嬰恐君子之不欲也今齊國五尺之童子力皆過嬰又能勝君然而不敢亂者畏禮義也上若無禮無以使其下下若無禮
  hash: sha256:dfc46a5ecc79206e1b8a46dcd47a1d348c6d0b57e7777609e40ab1f9b3aaa66f
