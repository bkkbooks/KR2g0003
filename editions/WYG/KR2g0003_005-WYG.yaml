front:
  text: 上第五晏子臣于莊公公不悦飲酒令召晏子晏子至入門公令樂人奏歌曰已哉已哉寡人不能説也爾何來為晏子入坐樂人三奏然後知其謂已也遂起北面坐地公曰夫子從席曷為坐地晏子對曰嬰聞訟夫坐地今嬰將與君訟敢毋坐地乎嬰聞之衆而無義彊而無禮好勇而惡賢者禍必及其身若公者之謂矣且嬰言不用願請身去遂趨而歸管籥其家者納之公財在外者斥之市曰君子有力于民則進爵禄不辭貴富無力于民而旅食不惡貧賤遂徒行而東畊于海濵居數年果有崔杼之難晏子為莊公臣言大用每朝賜爵益邑俄而不用每朝致邑與爵爵邑盡退朝而乘嘳然而歎終而笑其僕曰何歎笑相從數也晏子曰吾嘆也哀吾君不免于難吾笑也喜吾自得也吾亦無死矣崔杼果弑莊公晏子立崔杼之門從者曰死乎晏子曰獨吾君也乎哉吾死也曰行乎曰獨吾罪也乎哉吾亡也曰歸乎曰吾君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若君為已死而為已亡非其私暱孰能任之且人有君而弑之吾焉得死之而焉得亡之將庸何歸門唘而入崔子曰子何不死子何不死晏子曰禍始吾不在也禍終吾不知也吾何為死且吾聞之以亡為行者不足以存君以死為義者不足以立功嬰豈其婢子也哉其縊而從之也遂􅃝免坐枕君尸而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民崔杼既弑莊公而立景公杼與慶封相之刼諸將軍大夫及顯士庶人于太宮之坎上令無得不盟者為壇三仞埳其下以甲千列環其内外盟者皆脱劔而入維晏子不肎崔杼許之有敢不盟者㦸拘其頸劔承其心令自盟曰不與崔慶而與公室者受其不祥言不疾指不至血者死所殺七人次及晏子晏子奉桮血仰天嘆曰嗚呼崔子為無道而弑其君不與公室而與崔慶者受此不祥俛而飲血崔杼謂晏子曰子變子言則齊國吾與子共之子不變子言㦸既在脰劒既在心維子圖之也晏子曰刼吾以刃而失其志非勇也回吾以利而倍其君非義也崔子乎獨不為天討乎詩云莫莫葛虆施于條枚愷悌君子求福不回今嬰且可以回而求福乎曲刃鈎之直兵推之嬰不革矣崔杼將殺之或曰不可子以子之君無道而殺之今其臣有道之士也又從而殺之不可以為敎矣崔子遂舍之晏子曰若大夫為大不仁而為小仁焉有中乎趨出授綏而乘其僕將馳晏子撫其手曰徐之疾不必生徐不必死鹿生于野命縣于厨嬰命有繫矣按之成節而後去詩云彼巳之子舍命不渝晏子之謂也景公使晏子為東阿宰三年毁聞于國景公不説召而免之晏子謝曰嬰知嬰之過矣請復治阿三年而譽必聞于國景公不忍復使治阿三年而譽聞于國景公説召而賞之景公問其故對曰昔者嬰之治阿也築蹊徑急門閭之政而滛民惡之舉儉力孝弟罰偷窳而惰民惡之決獄不避貴强惡之左右所求法則予非法則否而左右惡之事貴人體不過禮而貴人惡之是以三邪毁乎内二䜛毁于内三年而毁聞乎君也今臣謹更之不築蹊徑而緩門閭之政而淫民説不舉儉力孝弟不罰偷窳而惰民説決獄阿貴强而貴强説左右所求言諾而左右説事貴人體過禮而貴人説是三邪譽乎外二讒譽乎内三年而譽聞于君也昔者嬰之所以當誅者宜賞今所以當賞者宜誅是故不敢受景公知晏子賢迺任以國政三年而齊大興景公與晏子立于曲潢之上晏子稱曰衣莫若新人莫若故公曰衣之新也信善矣人之故相知情晏子歸負載使人辭于公曰嬰故老耄無能也請毋服壯者之事公自治國身弱於髙國百姓大亂公恐復召晏子諸侯忌其威而髙國服其政田疇墾辟蠶桑豢牧之處不足絲蠶于燕牧馬于魯共貢入朝墨子聞之曰晏子知道景公知窮矣景公之時饑晏子請為民發粟公不許當為路寢之臺晏子令吏重其賃逺其兆徐其日而不趨三年臺成而民振故上悦乎㳺民足乎食君子曰政則晏子欲發粟與民而巳若使不可得則依物而偶于政景公登東門防民單服然後上公曰此大傷牛馬蹄矣夫何不下六尺哉晏子對曰昔者吾先君桓公明君也而管仲賢相也夫以賢相佐明君而東門防全也古者不為殆有為也蚤嵗溜水至入廣門即下六尺耳鄉者防下六尺則無齊矣夫古之重變古常此之謂也景公逰于夀宮睹長年負薪者而有饑色公悲之喟然歎曰令吏養之晏子曰臣聞之樂賢而哀不肖守國之本也今君愛老而恩無所不逮治國之本也公笑有喜色晏子曰聖王見賢以樂賢見不肖以哀不肖今請求老弱之不養鰥寡之無室者論而共秩焉公曰諾於是老弱有養鰥寡有室景公探雀鷇鷇弱反之晏子聞之不待時而入見景公公汗出惕然晏子曰君何為者也公曰吾探雀鷇鷇弱故反之晏子逡巡北面再拜而賀曰吾君有聖王之道矣公曰寡人探雀鷇鷇弱故反之其當聖王之道者何也晏子對曰君探雀鷇鷇弱反之是長幼也吾君仁愛曾禽獸之加焉而况于人乎此聖王之道也景公睹嬰兒有乞于塗者公曰是無歸夫晏子對曰君存何為無歸使吏養之可立而以聞景公正晝被髪乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慙而不朝晏子睹裔款而問曰君何故不朝對曰昔者君正晝被髪乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慙而出反不果是以不朝晏子入見景公曰昔者寡人有罪被髪乘六馬以出正閨刖跪擊馬而反之曰爾非吾君也寡人以天子大夫之賜得率百姓以守宗廟今見戮于刖跪以辱社稷吾猶可以齊于諸侯乎晏子對曰君勿惡焉臣聞下無直辭上有隱君民多諱言君有驕行古者明君在上下多直辭君上好善民多諱言今君有失行刖跪直辭禁之是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諌公笑曰可乎晏子曰可于是令刖跪倍資無征時朝無事也景公飲酒夜移于晏子前驅款門曰君至晏子被𤣥端立于門曰諸侯得㣲有故乎國家得㣲有事乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于司馬穰苴之家前驅款門曰君至穰苴介冑操㦸立于門曰諸侯得㣲有兵乎大臣得㣲有叛者乎君何為非時而夜辱公曰酒醴之味金石之聲願與將軍樂之穰苴對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于梁丘據之家前驅款門曰君至梁丘據左操瑟右挈竽行歌而出公曰樂哉今夕吾飲也㣲彼二子者何以治吾國㣲此一臣者何以樂吾身君子曰聖賢之君皆有益友無偷樂之臣景公弗能及故兩用之僅得不亡晏子侍于景公朝寒公曰請進暖食晏子對曰嬰非君奉餽之臣也敢辭公曰請進服裘對曰嬰非君茵席之臣也敢辭公曰然夫子之于寡人何為者也對曰嬰社稷之臣也公曰何謂社稷之臣對曰夫社稷之臣能立社稷别上下之義使當其理制百官之序使得其宜作為辭令可分布于四方自是之後君不以禮不見晏晏子飲景公酒令器必新家老曰財不足請斂于氓晏子曰止夫樂者上下同之故天子與天下諸侯與境内大夫以下各與其僚無有獨樂今上樂其樂下傷其費是獨樂音也不可晏子飲景公酒日暮公呼具火晏子辭曰詩云側弁之俄言失徳也屢舞傞傞言失容也既醉以酒既飽以徳既醉而出竝受其福賔主之禮也醉而不出是謂伐徳賔之罪也嬰以卜其日未卜其夜公曰善舉酒祭之再拜而出曰豈過我哉吾託國于晏子也以其家貨養寡人不欲其淫侈也而況與寡人謀國乎晉平公欲伐齊使范昭往觀焉景公觴之飲酒酣范昭曰請君之棄罇公曰酌寡人之罇進之于客范昭巳飲晏子曰徹罇更之罇觶具矣范昭佯醉不悦而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰𡨕臣不習范昭趨而出景公謂晏子曰晉大國也使人來將觀吾政今子怒大國之使者將奈何晏子曰夫范昭之為人也非陋而不知禮也且欲試吾君臣故絶之也景公謂太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也調之必人主舞之今范昭人臣欲舞天子之樂臣故不為也范昭歸以報平公曰齊未可伐也臣欲試其君而晏子識之臣欲犯其禮而太師知之仲尼聞曰夫不出于尊俎之間而知千里之外其晏子之謂也可謂折衝矣而太師其與焉景公伐魯傅許得東門無澤公問馬魯之年榖何如對隂水厥陽冰厚五寸不知以告晏子晏子對曰君子也問年榖而對以冰禮也隂水厥陽冰厚五寸者寒温節節則刑政平平則上下和和則年榖熟年充衆和而伐之臣恐罷民敝兵不成君之意請禮魯以息吾怨遣其執以明吾徳公曰善迺不伐魯景公予魯君地山隂數百社使晏子致之魯使子叔昭伯受地不盡受也晏子曰寡君獻地忠廉也曷為不盡受子叔昭伯曰臣受命于君曰諸侯相見交讓争處其卑禮之文也交委多爭受少行之實也禮成文于前行成章于後交之所以長久也且吾聞君子不盡人之歡不竭人之忠吾是以不盡受也晏子歸報公公喜笑曰魯君猶若是乎晏子曰臣聞大國貪于名小國貪于實此諸侯之公患也今魯處卑而不貪乎尊辭實而不貪乎多行廉不為茍得道義不為茍合不盡人之歡不竭人之忠以全其交君之道義殊于世俗國免於公患公曰寡人説魯君故予之地今行果若此吾將使人賀之晏子曰否君以驩予之地而賀其辭則交不親而地不為徳矣公曰善于是重魯之幣毋比諸侯厚其禮毋比賔客君子于魯而後明行廉辭地之可為重名也公逰于紀得金壺發視之中有月書曰食魚無反勿乘駑馬公曰善哉知苦言食魚無反則惡其鱢也勿乘駑馬惡其取道不逺也晏子對曰不然食魚無反毋盡民力乎勿乘駑馬則無置不肖于側乎公曰紀有書何以亡也晏子對曰有以亡也嬰聞之君子有道懸之閭紀有此言注之壺不亡何待乎魯昭公棄國走齊齊公問焉曰君何年之少而棄國之蚤奚道至于此乎昭公對曰吾少之時人多愛我者吾體不能親人多諫我者吾志不能用是則内無拂而外無輔輔拂無一人諂䛕我者甚衆譬之猶秋蓬也孤其根而美枝葉秋風一至根且拔矣景公辯其言以語晏子曰使是人反其國豈不為古之賢君乎晏子對曰不然夫愚者多悔不肖者自賢溺者不問墜迷者不問路溺而後問墜迷而後問路譬之猶臨難而遽鑄兵噎而遽掘井雖速亦無及已晏子使魯仲尼命門弟子往觀子貢反報曰孰謂晏子習于禮乎夫禮曰登階不歴堂上不趨授玉不跪今晏子皆反此孰謂晏子習於禮者晏子既巳有事于魯君退見仲尼仲尼曰夫禮登階不歴堂上不趨授玉不跪夫子反此乎晏子曰嬰聞兩楹之間君臣有位焉君行其一臣行其二君之來遫是以登階歴堂上趨以反位也君授玉卑故跪以下之且吾聞之大者不踰閑小者出入可也晏子出仲尼送之以賔客之禮不計之義維晏子為能行之晏子之魯朝食進餽饍有豚焉晏子曰去其二肩晝者進膳則豚肩不具侍者曰膳豚肩亡晏子曰釋之矣侍者曰我能得其人晏子曰止吾聞之量功而不量力則民盡藏餘不分則民盜子敎我所以改之無敎我求其人也曾子將行晏子送之曰君子贈人以軒不者以言吾請以言乎以軒乎曾子曰請以言晏子曰今夫車輪山之直木也良匠揉之其圓中規雖有槁暴不復嬴矣故君子慎櫽揉和氏之璧井里之困也良工修之則為存國之寶故君子慎所修今夫蘭本三年而成湛之苦酒則君子不近庶人不佩湛之糜醢而賈匹馬矣非蘭本美也所蕩然也願子之必求所湛嬰聞之君子居必擇居㳺必就士擇居所以求士求士所以辟患也嬰聞汨常移質習俗移性不可不慎也晏子之晉至中牟睹敝冠反裘負芻息于塗側者以為君子也使人問焉曰子何為者也對曰我越石父者也晏子曰何為至此曰吾為人臣僕于中牟見使將歸晏子曰何為之僕對曰不免凍餓之切吾身是以為僕也晏子曰為僕幾何對曰三年矣晏子曰可得贖乎對曰可遂解左驂以贈之因載而與之俱歸至舍不辭而入越石父怒而請絶晏子使人應之曰吾未嘗得交夫子也子為僕三年吾迺今日睹而贖之吾于子尚未可乎子何絶我之暴也越石父對之曰臣聞之士者詘乎不知已而伸乎知巳故君子不以功輕人之身不為彼功詘身之理吾三年為人臣僕而莫吾知也今子贖我吾以子為知我矣嚮者子乘不我辭也吾以子為忘今又不辭而入是與臣我者同矣我猶且為臣請鬻于世晏子出見之曰嚮者見客之容而今也見客之意嬰聞之省行者不引其過察實者不譏其辭嬰可以辭而無棄乎嬰誠革之迺今糞灑改席尊醮而禮之越石父曰吾聞之至恭不修途尊禮不受擯夫子禮之僕不敢當也晏子遂以為上客君子曰俗人之有功則徳徳則驕晏子有功免人于厄而反詘下之其去俗亦逺矣此全功之道也晏子為齊相出其御之妻從門間而闚其夫為相御擁大盖策駟門意氣揚揚甚自得也既而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺迺為人僕御然子之意自以為足妾是以求去也其後夫自抑損晏子恠而問之御以實對晏子薦以為大夫燕之㳺士有泯子午者南見晏子于齊言有文章術有條理巨可以補國細可以益晏子者三百篇睹晏子恐慎而不能言晏子假之以悲色開之以禮顔然後能盡其復也客退晏子直席而坐廢朝移旹在側者曰嚮者燕客侍夫子胡為憂也晏子曰燕萬乘之國也齊千里之塗也泯子午以萬乘之國為不足説以千里之塗為不足逺則是千萬人之上也且猶不能殫其言于我況乎齊人之懷善而死者乎吾所以不得睹者豈不多矣然吾失此何之有也齊有北郭騷者結罘罔捆蒲葦織履以養其母猶不足踵門見晏子曰竊説先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金受粟有間晏子見疑于景公出犇過北郭騷之門而辭北郭騷沐浴而見晏子曰夫子將焉適晏子曰見疑于齊君將出犇北郭騷曰夫子勉之矣晏子上車太息而歎曰嬰之亡豈不宜哉亦不知士甚矣晏子行北郭子召其友而告之曰吾説晏子之義而嘗乞所以養母者焉吾聞之養其親者身伉其難今晏子見疑吾將以身死白之著衣冠令其友操劍奉笥而從造于君庭求復者曰晏子天下之賢者也今去齊國齊必侵矣方見國之必侵不若死請以頭託白晏子也因謂其友曰盛吾頭于笥中奉以託退而自刎其友因奉以託其友而謂觀者曰此北郭子為國故死吾將為北郭子死又退而自刎景公聞之大駭乘馹而自追晏子及之國郊請而反之晏子不得巳而反聞北郭子之以死白巳也太息而歎曰嬰之亡豈不宜哉亦愈不知士甚矣景公謂晏子曰吾聞髙糺與夫子逰寡人請見之晏子對曰臣聞之為地戰者不能成其王為禄仕者不能正其君髙糺與嬰為兄弟久矣未嘗干嬰之行特禄仕之臣也何足以補君乎髙糺事晏子而見逐髙糾曰臣事夫子三年無得而卒見逐其説何也晏子曰嬰之家俗有三而子無一焉糾曰可得聞乎晏子曰嬰之家俗閒處從容不談議則疏出不相揚美入不相削行則不與通國事無論驕士慢知者則不朝也此三者嬰之家俗今子是無一馬故嬰非特食餽之長也是以辭
