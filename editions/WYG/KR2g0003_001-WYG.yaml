front:
  text: 乎勇力不顧於行義勇力之士無忌於國貴戚不薦善逼邇不引過故晏子見公公曰古者亦有徒以勇力立於世者乎晏子對曰嬰聞之輕死以行禮謂之勇誅暴不避彊謂之力故勇力之立也以行其禮義也湯武用兵而不為逆并國而不為貪仁義之理也誅暴不避彊替罪不避衆勇力之行也古之為勇力者行禮義也今上無仁義之理下無替罪誅暴之行而徒以勇力立於世則諸侯行之以國危匹夫行之以家殘昔夏之衰也有推侈大戲殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天下威戮無罪崇尚勇力不顧義理是以桀紂以滅殷夏以衰今公自奮乎勇力不顧乎行義勇力之士無忌於國身立威彊行本淫暴貴戚不薦善逼邇不引過反聖王之德而循滅君之行用此者嬰未聞有也景公飲酒酣曰今日願與諸大夫為樂飲請無為禮晏子蹴然改容曰君之言過矣羣臣固欲君之無禮也力多足以勝其長勇多足以弑君而禮不使也禽獸矣力為政彊者犯弱故曰易主今君去禮則是禽獸也羣臣以力為政彊者犯弱而日易主君將安立矣凡人之所以貴於禽獸者以有禮也故詩曰人而無禮胡不遄死禮不可無也公湎而不聽少間公出晏子不起公入不起交舉則先飲公怒色變抑手疾視曰嚮者夫子之敎寡人無禮之不可也寡人出入不起交舉則先飲禮也晏子避席再拜稽首而請曰嬰敢與君言而忘之乎臣以致無禮之實也君若欲無禮此是巳公曰若是孤之罪也夫子就席寡人聞命矣觴三行遂罷酒葢是後也飭法修禮以治國政而百姓肅也景公飲酒酲三日而後發晏子見曰君病酒乎公曰然晏子曰古之飲酒也足以通氣合好而已矣故男不羣樂以妨事女不羣樂以妨功男女羣樂者周觴五獻過之者誅君身服之故外無怨治内無亂行今一日飲酒而三日寢之國治怒乎外左右亂乎内以刑罰自防者勸乎為非以賞譽自勸者惰乎為善上離德行民輕賞罰失所以為國矣願君節之也景公飲酒七日七夜不止弦章諫曰君欲飲酒七日七夜章願君廢酒也不然章賜死晏子入見公曰章諫吾曰願君之廢酒也不然章賜死如是而聽之則臣為制也不聽又愛其死晏子曰幸矣章遇君也令章遇桀紂者章死久矣于是公遂廢酒景公之時霖雨十有七日公飲酒日夜相繼晏子請發粟於民三請不見許公命栢遽廵國致能歌者晏子聞之不説遂分家粟於氓致任器於陌徒行見公曰十有七日矣懷寶鄕有數十飢氓里有數家百姓老弱凍寒不得裋褐飢餓不得糟糠敝撤無走四顧無告而君不䘏日夜飲酒令國致樂不巳馬食府粟狗饜芻豢三保之妾俱足梁肉狗馬保妾不巳厚乎民氓百姓不亦薄乎故里窮而無告無樂有上矣飢餓而無告無樂有君矣嬰奉數之筴以隨百官之吏民飢餓窮約而無告使上淫湎失本而不䘏嬰之罪大矣再拜稽首請身而去遂走而出公從之兼於塗而不能逮令趣駕追晏子其家不及粟米盡於氓任器存於陌公驅及之康内公下車從晏子曰寡人有罪夫子倍棄不援寡人不足以有約也夫子不顧社稷百姓乎願夫子之幸存寡人寡人請奉齊國之粟米財貨委之百姓多寡輕重惟夫子之令遂拜於途晏子乃返命稟廵氓家有布縷之本而絶食者使有終月之委絶本之家使有期年之食無委積之氓與之薪橑使足以畢霖雨令栢廵氓家室不能禦者予之金廵求氓寡用財乏者死三日而畢後者若不用令之罪公出舎損肉撤酒馬不食府粟狗不食飦肉辟拂嗛齊酒徒減賜三日吏告畢工貧氓萬七千家用粟九十七萬鍾薪橑萬三千乗懷寶二千七百家用金三千公然後就内寢食琴瑟不張鐘鼓不陳晏子請左右與可令歌舞足以留思虞者退之辟拂三千謝於下陳人待三士待四出之關外也晏子朝杜扄望羊待於朝晏子曰君奚故不朝對曰君夜發不可以晏子曰何故對曰梁丘據扄入歌人虞變齊音晏子退朝命宗祝修禮而拘虞公聞之而怒曰何故而拘虞晏子曰以新樂淫君公曰諸侯之事百官之政寡人願以請子酒醴之味金石之聲願夫子無與焉夫樂何失必攻哉對曰夫樂亡而禮從之禮亡而政從之政亡而國従之國衰臣懼君之逆政之行有歌紂作北里幽厲之聲顧夫淫以鄙而偕亡君奚輕變夫故哉公曰不幸有社稷之業不擇言而出之請受命矣景公燕賞於國内萬鍾者三千鍾者五令三出而軄計莫之從公怒令免職計令三出而士師莫之從公不説晏子見公謂晏子曰寡人聞君國者愛人則能利之惡人則能䟽之今寡人愛人不能利惡人不能䟽失君道矣晏子曰嬰聞之君正臣從謂之順君僻臣從謂之逆今君賞讒䛕之民而令吏必從則是使君失其道臣失其守也先王之立愛以勸善也其立惡以禁暴也昔者三代之興也利於國者愛之害於國者惡之故明所愛而賢良衆明所惡而邪僻滅是以天下治平百姓和集及其衰也行安簡易身安逸樂順於己者愛之逆於已者惡之故明所愛而邪僻繁明所惡而賢良滅離散百姓危覆社稷君上不度聖王之興而下不觀惰君之衰臣懼君之逆政之行有司不敢爭以覆社稷危宗廟公曰寡人不知也請從士師之策國内之祿所收者三也景公信用讒佞賞無功罰不辜晏子諫曰臣聞明君望聖人而信其敎不聞聽讒佞以誅賞今與左右相恱頌也曰比死者勉為樂乎吾安能為仁而愈黥民耳矣故内寵之妾廹奪於國外寵之臣矯奪於鄙執灋之吏並荷百姓民愁苦約病而姦驅尤佚隠情奄惡蔽謟其上故雖有至聖大賢豈能勝若讒哉是以忠臣之常有災傷也臣聞古者之士可與得之不可與失之可與進之不可與退之臣請逃之矣遂鞭馬而出公使韓子休追之曰孤不仁不能順敎以至此極夫子休國焉而往寡人將從而後晏子遂鞭馬而返其僕曰嚮之去何速今之返又何速晏子曰非子之所知也公之言至矣翟王子羨臣干景公以重駕公觀之而不説也嬖人嬰子欲觀之公曰及晏子寢病也居囿中臺上以觀之嬰子説之因為之請曰厚祿之公許諾晏子起病而見公公曰翟王子羨之駕寡人甚説之請使之示乎晏子曰駕御之事臣無職焉公曰寡人一樂之是欲禄之以萬鍾其足乎對曰昔衛士東野之駕也公説之嬰子不説公曰不説遂不觀今翟王子羨之駕也公不説嬰子説公因説之為請公許之則是婦人為制也且不樂治人而樂治馬不厚禄賢人而厚祿御夫昔者先君桓公之地狹於今修法治廣政敎以霸諸侯今君一諸侯無能親也歳凶年饑道途死者相望也君不此憂耻而惟圖耳目之樂不修先君之功烈而惟飾駕御之伎則公不顧民而忘國甚矣且詩曰載驂載駟君子所誡夫駕八固非制也今又重此其為非制也不滋甚乎且君茍美樂之國必衆為之田獵則不便道行致逺則不可然而用馬數倍此非御下之道也淫於耳目不當民務此聖王之所禁也君茍美樂之諸侯必或效我君無厚德善政以被諸侯而易之以僻此非所以子民彰名致逺親隣國之道也且賢良廢滅孤寡不振而聽嬖妾以祿御夫以蓄怨與民為讎之道也詩曰哲夫成城哲婦傾城今君不思成城之求而惟傾城之務國之亡日至矣君其圖之公曰善遂不復觀乃罷歸翟王子羨而疏嬖人嬰子景公有男子五人所使傅之者皆有車百乗者也晏子為一焉公召其傅曰勉之將以而所傅為子及晏子晏子辭曰君命其臣據其肩以盡其力臣敢不勉乎今有車之家此一國之權臣也人人以君命命之曰將以而所博為子此離樹别黨傾國之道也嬰不敢受命顧君圖之淳于人納女於景公生孺子荼景公愛之諸臣謀欲廢公子陽生而立荼公以告晏子晏子曰不可夫以賤匹貴國之害也置大立少亂之本也夫陽生而長國人戴之君其勿易夫服位有等故賤不陵貴立子有禮故孽不亂宗願君敎荼以禮而勿䧟於邪導之以義而勿湛於利長少行其道宗孽得其倫夫陽生敢毋使荼饜􅆝肉之味玩金石之聲而有患乎廢長立少不可以敎下尊孽卑宗不可以利所愛長少無等宗孽無别是設賊樹姦之本也君其圖之古之明君非不知繁樂也以為樂淫則哀非不知立愛也以為義失則憂是故制樂以節立子以道若夫恃讒䛕以事君者不足以責信今君用讒人之謀聽亂夫之言也廢長立少臣恐後人之有因君之過以資其邪廢少而立長以成其利者君其圖之公不聽景公沒田氏殺君荼立陽生殺陽生立簡公殺簡公而取齊國景公疥且瘧期年不巳召會譴梁丘據晏子而問焉曰寡人之病病矣使史固與祝佗廵山川宗廟犧牲珪璧莫不備具數其常多先君桓公桓公一則寡人再病不已滋甚予欲殺二子者以説於上帝其可乎會譴梁丘據曰可晏子不對公曰晏子何如晏子曰君以祝為有益乎公曰然若以為有益則詛亦有損也君疏輔而遠拂忠臣擁塞諫言不出臣聞之近臣嘿逺臣瘖衆口鑠金今自聊攝以東姑尤以西者此其人民衆矣百姓之咎怨誹謗詛君於上帝者多矣一國詛兩人祝雖善祝者不能勝也且夫祝直言情則謗吾君也隠匿過則欺上帝也上帝神則不可欺上帝不神祝亦無益願君察之也不然刑無罪夏商所以滅也公曰善解予惑加冠命會譴毋治齊國之政梁丘據毋治賔旅之事兼屬之乎晏子晏子辭不得命受相退把政改月而君病悛公曰昔吾先君桓公以管子為有力邑狐與穀以共宗廟之鮮賜其忠臣則是多忠臣者子今忠臣也寡人請賜子州欵辭曰管子有一美嬰不如也有一惡嬰不忍為也其宗廟之養鮮也終辭而不受景公遊於麥丘問其封人曰年幾何矣對曰鄙人之年八十五矣公曰壽哉子其祝我封人曰使君之年長於胡宜國家公曰善哉子其復之曰使君之嗣壽皆若鄙臣之年公曰善哉子其復之封人曰使君無得罪於民公曰誠有鄙民得罪於君則可安有君得罪於民者乎晏子諫曰君過矣彼䟽者有罪戚者治之賤者有罪貴者治之君得罪於民誰將治之敢問桀紂君誅乎民誅乎公曰寡人固也於是賜封人麥丘以為邑楚巫微導裔款以見景公侍坐三日景公説之楚巫曰公明神主之帝王之君也公即位有七年矣事未大濟者明神未至也請致五帝以明君德景公再拜稽首楚巫曰請廵國郊以觀帝位至於牛山而不敢登曰五帝之位在於國南請齋而後登之公命百官供齋具於楚巫之所裔款視事晏子聞之而見於公曰公令楚巫齋牛山乎公曰然致五帝以明寡人之德神將降福於寡人其有所濟乎晏子曰君之言過矣古之王者德厚足以安世行廣足以容衆諸侯戴之以為君長百姓歸之以為父母是故天地四時和而不失星辰日月順而不亂德厚行廣配天象時然後為帝王之君神明之主古者不慢行而繁祭不輕身而恃巫今政亂而行僻而求五帝之明德也棄賢而用巫而求帝王之在身也夫民不茍德福不苟降君之帝王不亦難乎惜夫君位之髙所論之卑也公曰裔欵以楚巫命寡人曰試嘗見而觀焉寡人見而説之信其道行其言今夫子譏之請逐楚巫而拘裔欵晏子曰楚巫不可出公曰何故對曰楚巫出諸侯必或受之公信之以過於内不知出以易諸侯於外不仁請東楚巫而拘裔欵公曰諾故曰送楚巫於東而拘裔欵於國也齊大旱逾時景公召羣臣問曰天不雨久矣民且有饑色吾使人卜云祟在髙山廣水寡人欲少賦斂以祠靈山可乎羣臣莫對晏子進曰不可祠此無益也夫靈山固以石為身以草木為髮天久不雨髮將焦身將熱彼獨不欲雨乎祠之無益公曰不然吾欲祠河伯可乎晏子曰不可河伯以水為國以魚鱉為民天久不雨泉將下百川竭國將亡民將滅矣彼獨不欲雨乎祠之何益景公曰今為之奈何晏子曰君誠避宫殿暴露與靈山河伯共憂其幸而雨乎于是景公出野居暴露三日天果大雨民盡得種蒔景公曰善哉晏子之言可無用乎其維有德景公將觀於淄上與晏子閒立公喟然嘆曰嗚呼使國可長保而傳於子孫豈不樂哉晏子對曰嬰聞明王不徒立百姓不虚至今君以政亂國以行棄民久矣而聲欲保之不亦難乎嬰聞之能長保國者能終善者也諸侯並立能終善者為長列士並學能終善者為師昔先君桓公其方任賢而贊德之時亡國恃以存危國仰以安是以民樂其政而世高其德行逺征暴勞者不疾驅海内使朝天子而諸侯不怨當是時盛君之行不能進焉及其卒而衰怠於德而并於樂身溺於婦侍而謀因竪刁是以民苦其政而世非其行故身死乎胡宫而不舉蟲出而不收當是時也桀紂之卒不能惡焉詩曰靡不有初鮮克有終不能終善者不遂其君今君臨民若冦讎見善若避熱亂政而危賢必逆於衆肆欲於民而誅虐於下恐及於身嬰之年老不能待於君使矣行不能革則持節以沒世耳景公遊於牛山北臨其國城而流涕曰若何滂滂去此而死乎艾孔梁丘據皆從而泣晏子獨笑於旁公刷涕而顧晏子曰寡人今日游悲孔與據皆従寡人而涕泣子之獨笑何也晏子對曰使賢者常守之則太公桓公將常守之矣使勇者常守之則莊公靈公將常守之矣數君者將守之則吾君安得此位而立焉以其迭處之迭去之至於君也而獨為之流涕是不仁也不仁之君見一謟䛕之臣見二此臣之所以獨竊笑也景公出遊於公阜北靣望睹齊國曰嗚呼使古而無死何如晏子曰昔者上帝以人之沒為善仁者息焉不仁者伏焉若使古而無死丁公太公將有齊國桓襄文武將皆相之君將戴笠衣褐執銚耨以蹲行􅅵畆之中孰暇患死公忿然作色不説無幾何而梁丘據御六馬而來公曰是誰也晏子曰據也公曰何如曰大暑而疾馳甚者馬死薄者馬傷非據孰敢為之公曰據與我和者夫晏子曰此所謂同也所謂和者君丼則臣酸君淡則臣鹹今據也甘君亦甘所謂同也安得為和公忿然作色不悦無幾何日暮公西靣望睹彗星召伯常騫使禳去之晏子曰不可此天敎也日月之氣風雨不時彗星之出天為民之亂見之故詔之妖祥以戒不敬今君若設文而受諌謁聖賢人雖不去彗星將自亡今君嗜酒而并於樂政不飾而寛於小人近讒好優惡文而䟽聖賢人何暇在彗茀又將見矣公忿然作色不悦及晏子卒公出背而立曰嗚呼昔者從夫子而游公阜夫子一日而三責我今誰責寡人哉景公出遊於寒塗睹死胔黙然不問晏子諌曰昔吾先君桓公出遊睹饑者與之食睹疾者與之財使令不勞力籍斂不費民先君將遊百姓皆悦曰君當幸遊吾鄕乎今君遊於寒塗據四十里之氓殫財不足以奉斂盡力不能周役民氓饑寒凍餒死胔相望而君不問失君道矣財屈力竭下無以親上驕泰奢侈上無以親下上下交離君臣無親此三代之所以衰也今君行之嬰懼公族之危以為異姓之福也公曰然為上而忘下厚藉斂而忘民吾罪大矣于是斂死胔發粟於民據四十里之氓不服政其年公三月不出游景公之時雨雪三日而不霽公被狐白之裘坐堂側陛晏子入見立有閒公曰怪哉雨雪三日而天不寒晏子對曰天不寒乎公笑晏子曰嬰聞古之賢君飽而知人之饑温而知人之寒逸而知人之勞今君不知也公曰善寡人聞命矣乃令出裘發粟與饑寒令所睹於塗者無問其鄕所睹於里者無問其家循國計數無言其名士既事者兼月疾者兼歳孔子聞之曰晏子能明其所欲景公能行其所善也景公之時熒惑守於虚期年不去公異之召晏子而問曰吾聞之人行善者天賞之行不善者天殃之熒惑天罰也今留虚其孰當之晏子曰齊當之公不悦曰天下大國十二皆曰諸侯齊獨何以當晏子曰虚齊野也且天之下殃固於富彊為善不用出政不行賢人使逺讒人反昌百姓疾怨自為祈祥錄錄彊食進死何傷是以列舎無次變星有芒熒惑回逆孽星在旁有賢不用安得不亡公曰可去乎對曰可致者可去不可致者不可去公曰寡人為之若何對曰盍去寃聚之獄使反田矣散百官之財施之民矣振孤寡而敬老人矣夫若是者百惡可去何獨是孽乎公曰善行之二月而熒惑遷景公舉兵將伐宋師過泰山公夢見二丈夫立而怒其怒甚盛公恐覺辟門召占夢者至公曰今夕吾夢二丈夫立而怒不知其所言其怒甚盛吾猶識其狀識其聲占夢者曰師過泰山而不用事故泰山之神怒也請趣召祝史祠乎泰山則可公曰諾明日晏子朝見公告之如占夢之言也公曰占夢者之言曰師過泰山而不用事故泰山之神怒也今使人召祝史祠之晏子俯有閒對曰占夢者不識也此非泰山之神是宋之先湯與伊尹也公疑以為泰山神晏子曰公疑之則嬰請言湯伊尹之狀也湯質晳而長顔以髯兊上豐下倨身而揚聲公曰然是巳伊尹黑而短蓬而髯豐上兊下僂身而下聲公曰然是巳今若何晏子曰夫湯太甲武丁祖乙天下之盛君也不宜無後今惟宋耳而公伐之故湯伊尹怒請散師以平宋景公不用終伐宋晏子曰伐無罪之國以怒明神不易行以續蓄進師以近過非嬰所知也師若果進軍必有殃軍進再舎鼔毁將殪公乃辭乎晏子散師不果伐宋景公畋於署梁十有八日而不返晏子自國往見公比至衣冠不正不革衣冠望游而馳公望見晏子下而急帶曰夫子何為遽國家無有故乎晏子對曰不亦急也雖然嬰願有復也國人皆以君為安野而不安國好獸而惡民毋乃不可乎公曰何哉吾為夫婦獄訟之不正乎則泰士子牛存矣為社稷宗廟之不享乎則泰祝子游存矣為諸侯賔客莫之應乎則行人子羽存矣為田野之不辟倉庫之不實則申田存焉為國家之有餘不足聘乎則吾子存矣寡人之有五子猶心之有四支心有四支故心得佚焉今寡人有五子故寡人得佚焉豈不可哉晏子對曰嬰聞之與君言異若乃心之有四支而心得佚焉可得令四支無心十有八日不亦久乎公于是罷畋而歸景公射鳥野人駭之公怒令吏誅之晏子曰野人不知也臣聞賞無功謂之亂罪不知謂之虐兩者先王之禁也以飛鳥犯先王之禁不可今君不明先王之制而無仁義之心是以從欲而輕誅夫鳥獸固人之所飬也野人駭之不亦宜乎公曰善自今巳後弛鳥獸之禁無以苛民也景公使圉人飬所愛馬暴死公怒令人操刀解飬馬者是時晏子侍前左右執刀而進晏子止而問於公曰堯舜支解人從何軀始公矍然曰従寡人始遂不支解公曰以屬獄晏子曰此不知其罪而死臣為君數之使知其罪然後致之獄公曰可晏子數之曰爾罪有三公使汝飬馬而殺之當死罪一也又殺公之所最善馬當死罪二也使公以一馬之故而殺人百姓聞之必怨吾君諸侯聞之必輕吾國汝殺公馬使怨積於百姓兵弱於隣國汝當死罪三也今以屬獄公喟然嘆曰夫子釋之夫子釋之勿傷吾仁也
