body:
  text: 內篇問上莊公問威當世服天下時耶晏子對以行也莊公問晏子曰威當世而服天下時耶晏子對曰行也公曰何行對曰能愛邦內之民者能服境外之不善重士民之死力者能禁暴國之邪逆中聽任賢者能威諸侯安仁義而樂利世者能服天下不能愛邦內之民者不能服境外之不善輕士民之死力者不能禁暴國之邪逆愎諫傲賢者不能威諸侯倍仁義而貪名實者不能威當世而服天下者此其道也已而公不用晏子退而窮處公任勇力之士而輕臣僕之死用兵無休國罷民害朞年百姓大亂而身及崔氏禍君子曰盡忠不豫交不用不懷祿晏子可謂廉矣莊公問伐晉晏子對以不可若不濟國之福莊公將伐晉問于晏子晏子對曰不可君得合而欲多養欲而意驕得合而欲多者危養欲而意驕者困今君任勇力之士以伐明主若不濟國之福也不德而有功憂必及君公作色不說晏子辭不為臣退而窮處堂下生藜藋門外生荊棘莊公終任勇力之士西伐晉取朝歌及太行孟門茲於兌朞而民散身滅於崔氏崔氏之朞逐群公子及慶氏亡景公問伐魯晏子對以不若修政待其亂景公舉兵欲伐魯問于晏子晏子對曰不可魯公好義而民戴之好義者安見戴者和伯禽之治存焉故不可攻攻義者不祥危安者必困且嬰聞之伐人者德足以安其國政足以和其民國安民和然後可以舉兵而征暴今君好酒而辟德無以安國厚藉斂意使令無以和民德無以安之則危政無以和之則亂未免乎危亂之理而欲伐安和之國不可不若修政而待其君之亂也民離其君上怨其下然後伐之則義厚而利多義厚則敵寡利多則民歡公曰善遂不果伐魯景公伐斄勝之問所當賞晏子對以謀勝祿臣景公伐斄勝之問晏子曰吾欲賞於斄何如對曰臣聞之以謀勝國者益臣之祿以民力勝國者益民之利故上有羡獲下有加利君上享其名臣下利其實故用智者不偷業用力者不傷苦此古之善伐者也公曰善於是破斄之臣東邑之卒皆有加利是上獨擅名利下流也景公問聖王其行若何晏子對以衰世而諷景公外傲諸侯內輕百姓好勇力崇樂以從嗜欲諸侯不說百姓不親公患之問於晏子曰古之聖王其行若何晏子對曰其行公正而無邪故讒人不得入不阿黨不私色故群徒之卒不得容薄身厚民故聚斂之人不得行不侵大國之地不耗小國之民故諸侯皆欲其尊不劫人以兵甲不威人以衆彊故天下皆欲其彊德行教訓加於諸侯慈愛利澤加于百姓故海內歸之若流水今衰世君人者辟邪阿黨故讒諂群徒之卒繁厚身養薄視民故聚斂之人行侵大國之地耗小國之民故諸侯不欲其尊劫人以兵甲威人以衆強故天下不欲其強災害加於諸侯勞苦施於百姓故讎敵進伐天下不救貴戚離散百姓不與公曰然則何若敓曰請卑辭重幣以說于諸侯輕罪省功以謝於百姓其可乎公曰諾於是卑辭重幣而諸侯附輕罪省功而百姓親故小國入朝燕魯共貢墨子聞之曰晏子知道道在為人而失為己為人者重自為者輕景公自為而小國不與為人而諸侯為役則道在為人而行在反己矣故晏子知道矣景公問欲善齊國之政以干霸王晏子對以官未具景公問晏子曰吾欲善治齊國之政以干霸王之諸侯晏子對曰官未具也臣數以聞而君不肯聽也故臣聞仲尼居處惰倦廉隅不正則季次原憲侍氣鬱而疾志意不通則仲由卜商侍德不盛行不厚則顏回騫雍侍今君之朝臣萬人兵車千乘不善政之所失于下霣墜于民者衆矣未有能士敢以聞者臣故曰官未具也公曰寡人欲從夫子而善齊國之政可乎對曰嬰聞之國有具官然後其政可善公作色不說曰齊國雖小則可謂官不具對曰此非臣之所復也昔吾先君桓公身體惰懈辭令不給則隰朋昵侍左右多過獄讞不中則弦寧昵侍田野不修民氓不安則寧戚昵侍軍吏怠戎士偷則王子成甫昵侍居處佚怠左右懾畏繁乎樂省乎治則東郭牙昵侍德義不中信行衰微則管子昵侍先君能以人之長續其短以人之厚補其薄是以辭令窮遠而不逆兵加於有罪而不頓是故諸侯朝其德而天子致其胙今君之過失多矣未有一士以聞者也故曰官不具公曰善景公問欲如桓公用管仲以成霸業晏子對以不能景公問晏子曰昔吾先君桓公有管仲夷吾保乂齊國能遂武功而立文德糾合兄弟撫存冀州吳越受令荊楚惛憂莫不賓服勤于周室天子加德先君昭功管子之力也今寡人亦欲存齊國之政於夫子夫子以佐佑寡人彰先君之功烈而繼管子之業晏子對曰昔吾先君桓公能任用賢固有什五治遍細民貴不凌賤富不傲貧功不遺罷佞不吐愚舉事不私聽獄不阿內妾無羡食外臣無羡祿鰥寡無饑色不以飲食之辟害民之財不以宮室之侈勞人之力節取於民而普施之府無藏倉無粟上無驕行下無諂德是以管子能以齊國免於難而以吾先君參乎天子今君欲彰先君之功烈而繼管子之業則無以多辟傷百姓無以嗜欲玩好怨諸侯臣孰敢不承善盡力以順君意今君疏遠賢人而任讒諛使民若不勝藉斂若不得厚取於民而薄其施多求於諸侯而輕其禮府藏朽蠹而禮悖於諸侯菽粟藏深而怨積於百姓君臣交惡而政刑無常臣恐國之危失而公不得享也又惡能彰先君之功烈而繼管子之業乎景公問莒魯孰先亡晏子對以魯後莒先景公問晏子莒與魯孰先亡對曰以臣觀之也莒之細人變而不化貪而好假高勇而賤仁士武以疾忿急以速竭是以上不能養其下下不能事其上上下不能相收則政之大體失矣故以臣觀之也莒其先亡公曰魯何如對曰魯之君臣猶好為義下之妥妥也奄然寡聞是以上能養其下下能事其上上下相收政之大體存矣故魯猶可長守然其亦有一焉彼鄒滕雉奔而出其地猶稱公侯小之事大弱之事強久矣彼周者殷之樹國也魯近齊而親殷以變小國而不服於鄰以遠望魯滅國之道也齊其有魯與莒乎公曰魯與莒之事寡人既得而聞之矣寡人之德亦薄然後世孰踐有齊國者對曰田無宇之後為幾公曰何故也對曰公量小私量大以施於民其與士交也用財無筐篋之藏國人負攜其子而歸之若水之流下也夫先與人利而後辭其難不亦寡乎若苟勿辭也從而撫之不亦幾乎景公問治國何患晏子對以社鼠猛狗景公問於晏子曰治國何患晏子對曰患夫社鼠公曰何謂也對曰夫社束木而塗之鼠因往託焉熏之則恐燒其木灌之則恐敗其途此鼠所以不可得殺者以社故也夫國亦有焉人主左右是也內則蔽善惡于君上外則賣權重于百姓不誅之則為亂誅之則為人主所案據腹而有之此亦國之社鼠也人有酤酒者為器甚潔清置表甚長而酒酸不售問之里人其故里人云公之狗猛人挈器而入且酤公酒狗迎而噬之此酒所以酸而不售也夫國亦有猛狗用事者是也有道術之士欲干萬乘之主而用事者迎而齕之此亦國之猛狗也左右為社鼠用事者為猛狗國安得無患乎則道術之士不得用矣此治國之所患也景公問欲令祝史求福晏子病以常辭罪而無求景公問晏子曰寡人意氣衰身病甚今吾欲具圭璧犧牲令祝宗薦之乎上帝宗廟意者禮可以干福乎晏子對曰嬰聞之古者先君之干福也政必合乎民行必順乎神節宮室不敢大斬伐以無逼山林節飲食無多畋漁以無逼川澤祝宗用事辭罪而不敢有所求也是以神民俱順而山川納祿今君政反乎民而行悖乎神大宮室多斬伐以逼山林羡飲食多畋漁以逼川澤是以民神俱怨而山川收祿司過薦罪而祝宗祈福意者逆乎公曰寡人非夫子無所聞此請革心易行于是廢公阜之游止海食之獻斬伐者以時畋漁者有數居處飲食節之勿羡祝宗用事辭罪而不敢有所求也故鄰國忌之百姓親之晏子沒而後衰景公問古之盛君其行如何晏子對以問道者更正景公問晏子曰古之盛君其行如何晏子對曰薄于身而厚于民約于身而廣于世其處上也足以明政行教不以威天下其取財也權有無均貧富不以養嗜欲誅不避貴賞不遺賤不淫于樂不遁于哀盡智導民而不伐焉勞力事民而不責焉政尚相利故下不以相害為行教尚相愛故民不以相惡為名刑罰中於法廢罪順於民是以賢者處上而不華不肖者處下而不怨四海之內社稷之中粒食之民一意同欲若夫私家之政生有厚利死有遺教此盛君之行也臣聞問道者更正聞道者更容今君稅斂重故民心離市買悖故商旅絶玩好充故家貨殫積邪在於上蓄怨藏於民嗜欲備於側毀非滿於國而公不圖公曰善于是令玩好不御公市不豫宮室不飾業土不成止役輕稅上下行之而百姓相親景公問謀必得事必成何術晏子敓以度義因民景公問晏子曰謀必得事必成有術乎晏子對曰有公曰其術如何晏子曰謀度於義者必得事因于民者必成公曰奚謂也對曰其謀也左右無所繫上下無所靡其聲不悖其實不逆謀於上不違天謀於下不違民以此謨者必得矣事大則利厚事小則利薄稱事之大小權利之輕重國有義勞民有加利以此舉事者必成矣夫逃義而謨雖成不安傲民舉事雖成不榮故臣聞義謀之法也民事之本也故反義而謀倍民而動未聞存者也昔三代之興也謀必度於義事必因于民及其衰也建謀者反義興事者傷民故度義因民謀事之術也公曰寡人不敏聞善不行其危如何對曰上君全善其次出入焉其次結邪而羞問全善之君能制出入之君時問之君雖日危尚可以沒身羞問之君不能保其身今君雖危尚可沒其身也景公問善為國家者何如晏子對以舉賢官能景公問晏子曰蒞國治民善為國家者何如晏子對曰舉賢以臨國官能以敕民則其道也舉賢官能則民與若矣公曰雖有賢能吾庸知乎晏子對曰賢而隱庸為賢乎吾君亦不務乎是故不知也公曰請問求賢對曰觀之以其游說之以其行君無以靡曼辨辭定其行無以毀譽非議定其身如此則不為行以揚聲不掩欲以榮君故通則視其所舉窮則視其所不為富則視其所分貧則視其所不取夫上士難進而易退也其次易進易退也其下易進難退也以此數物者取人其可乎景公問君臣身尊而榮難乎晏子對以易景公問晏子曰為君身尊民安為臣事治身榮難乎易乎晏子對曰易公曰何若對曰為君節養其餘以顧民則身尊而民安為臣忠信而無踰職業則事治而身榮公又問為君何行則危為臣何行則廢晏子對曰為君厚藉斂而託之為民進讒諛而託之用賢遠公正而托之不順君行此三者則危為臣比周以求進踰職業防下隱利而求多從君不陳過而求親人臣行此三者則廢故明君不以邪觀民守則而不虧立法儀而不犯苟有所求于民不以身害之是故刑政安於下民心固於上故察士不比周而進不為苟而求言無陰陽行無內外順則進否則退不與上行邪是以進不失廉退不失行也景公問天下之所以存亡晏子對以六說景公問晏子曰寡人持不仁其無義耳也不然北面與夫子而義晏子對曰嬰人臣也公曷為出若言公曰請終問天下之所以存亡晏子曰縵密不能蔍苴不學者詘身無以用人而又不為人用者卑善人不能戚惡人不能踈者危交游朋友從無以說於人又不能說人者窮事君要利大者不得小者不為者餧修道立義大不能專小不能附者滅此足以觀存亡矣景公問君子常行曷若晏子對以三者景公問晏子曰君子常行曷若晏子對曰衣冠不中不敢以入朝所言不義不敢以要君身行不順治事不公不敢以蒞衆衣冠無不中故朝無奇辟之服所言無不義故下無僞上之報身行順治事公故國無阿黨之義三者君子之常行也景公問賢君治國若何晏子對以任賢愛民景公問晏子曰賢君之治國若何晏子對曰其政任賢其行愛民其取下節其自養儉在上不犯下在治不傲窮從邪害民者有罪進善舉過者有賞其政刻上而饒下赦過而救窮不因喜以加賞不因怒以加罰不從欲以勞民不修怒而危國上無驕行下無諂德上無私義下無竊權上無朽蠹之藏下無凍餒之民不事驕行而尚司其民安樂而尚親賢君之治國若此景公問明王之教民何若晏子對以先行義景公問晏子曰明王之教民何若晏子對曰明其教令而先之以行義養民不苛而防之以刑辟所求于下者必務於上所禁於民者不行于身守于民財無虧之以利立于儀法不犯之以邪苟所求于民不以身害之故下勸從其教也稱事以任民中聽以禁邪不窮之以勞不害之以罰苟所禁于民不以事逆之故下不敢犯其上也古者百里而異習千里而殊俗故明王修道一民同俗上以愛民為法下以相親為義是以天下不相遺此明王之教民也景公問忠臣之事君何若晏子對以不與君陷于難景公問於晏子曰忠臣之事君也何若晏子敓曰有難不死出亡不送公不悅曰君裂地而封之疏爵而貴之君有難不死出亡不送其說何也對曰言而見用終身無難臣奚死焉謀而見從終身不出臣奚送焉若言不見用有難而死之是妄死也謀而不見從出亡而送之是詐僞也故忠臣也者能納善於君而不能與君陷於難景公問忠臣之行何如晏子敓以不與君行邪景公問晏子曰忠臣之行何如對曰不掩君過諫乎前不華乎外選賢進能不私乎內稱身就位計能受祿睹賢不居其上受祿不過其量不權君以為行不稱位以為忠不掩賢以隱長不刻下以諛上君在不事太子國危不交諸侯順則進否則退不與君行邪也景公問佞人之事君何如晏子對以愚君所信也景公問佞人之事君如何晏子對曰意難難不至也明言行之以飾身僞言無欲以說人嚴其交以見其愛觀上之所欲而微為之偶求君逼爾而陰為之與內重爵祿而外輕之以誣行下事左右而面示正公以僞廉求上采聽而幸以求進傲祿以求多辭任以求重工乎取鄙乎豫歡乎新慢乎故吝乎財薄乎施覩貧窮若不識趨利若不及外交以自揚背親以自厚積豐義之養而聲矜恤之義非譽乎情而言不行身涉時所議而好論賢不肖有之己不難非之人無之己不難求之人其言彊梁而信其進敏遜而順此佞人之行也明君之所誅愚君之所信也景公問聖人之不得意何如晏子對以不與世陷乎邪景公問晏子曰聖人之不得意也何如晏子對曰上作事反天時從政逆鬼神籍斂殫百姓四時易序神祇並怨道忠者不聽薦善者不行諛過者有賚救失者有罪故聖人伏匿隱處不干長上潔身守道不與世陷乎邪是以卑而不失義瘁而不失廉此聖人之不得意也公曰聖人之得意何如對曰世治政平舉事調乎天藉斂和乎民百姓樂其政遠者懷其德四時不失序風雨不降虐天明象而致贊地長育而具物神降福而不靡民服教而不僞治無怨業居無廢民此聖人之得意也景公問古者君民用國不危弱晏子對以文王景公問晏子曰古者君民而危用國而弱惡乎失之晏子對曰嬰聞之以邪蒞國以暴和民者危修道以要利得求而返邪者弱古者文王修德不以要利滅暴不以順紂干崇侯之暴而禮梅伯之醢是以諸侯明乎其行百姓通乎其德故君民而不危用國而不弱也景公問古之蒞國者任人如何晏子對以人不同能景公問晏子曰古之蒞國治民者其任人何如晏子對曰地不同宜而任之以一種責其俱生不可得人不同能而任之以一事不可責遍成責焉無已智者有不能給求焉無饜天地有不能贍也故明王之任人諂諛不邇乎左右阿黨不治乎本朝任人之長不強其短任人之工不強其拙此任人之大略也景公問古者離散其民如何晏子對以今聞公令如寇讎景公問晏子曰古者離散其民而隕失其國者其常行何如晏子對曰國貧而好大智薄而好專貴賤無親焉大臣無禮焉尚讒諛而賤賢人樂簡慢而玩百姓國無常法民無經紀好辨以為智刻民以為忠流湎而忘國好兵而忘民肅于罪誅而慢於慶賞樂人之哀利人之難德不足以懷人政不足以惠民賞不足以勸善刑不足以防非亡國之行也今民聞公令如寇讎此古之離散其民隕失其國者之常行也景公問欲和臣親下晏子敓以信順儉節景公問晏子曰吾欲和臣親下奈何晏子對曰君得臣而任使之與言信必順其令赦其過任大無多責焉使邇臣無求嬖焉無以嗜欲貧其家無信讒人傷其心家不外求而足事君不因人而進則臣和矣儉於藉斂節于貨財作工不歷時使民不盡力百官節適關市省征山林陂澤不專其利領民治民勿使煩亂知其貧富勿使凍餒則民親矣公曰善寡人聞命矣故令諸子無外親謁辟梁丘據無使受報百官節適關市省征陂澤不禁冤報者過留獄者請焉景公問得賢之道晏子對以舉之以語考之以事景公問晏子曰取人得賢之道何如晏子對曰舉之以語考之以事能諭則尚而親之近而勿辱以取人則得賢之道也是以明君居上寡其官而多其行拙於文而工於事言不中不言行不法不為也景公問臣之報君何以晏子對以報以德景公問晏子曰臣之報其君何以晏子敓曰臣雖不知必務報君以德士逢有道之君則順其令逢無道之君則爭其不義故君者擇臣而使之臣雖賤亦得擇君而事之景公問臨國蒞民所患何也晏子對以患者三景公問晏子曰臨國蒞民所患何也晏子對曰所患者三忠臣不信一患也信臣不忠二患也君臣異心三患也是以明君居上無忠而不信無信而不忠者是故君臣同欲而百姓無怨也景公問為政何患晏子對以善惡不分景公問于晏子曰為政何患晏子對曰患善惡之不分公曰何以察之對曰審擇左右左右善則百僚各得其所宜而善惡分孔子聞之曰此言也信矣善進則不善無由入矣不善進則善無由入矣
