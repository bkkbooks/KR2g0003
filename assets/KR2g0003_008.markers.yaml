  - {type: variant, offset: 7, length: 0, content: '', SBCK: 第八凢十八章仲尼見景公景公欲封之晏子㠯爲不可第一景公上路􅃦聞哭聲問梁丘㩀晏子對第二仲尼見景公景公曰先生奚不見寡人宰乎第三仲尼之齊見景公而不見晏子子貢致問第四景公出田顧問晏子若人之衆有孔子乎第五仲尼相魯景公患之晏子對以勿憂第六景公問有臣有兄弟而强足恃乎晏子對不足恃第七景公游牛山少樂請晏子一顧第八景公爲大鐘晏子與仲尼栢常騫知將毀第九田無宇非晏子有老妻晏子對以去老謂之亂第十工女欲入身于晏子晏子辭不受第十一景公欲誅羽人晏子以爲灋不宜法第十二景公謂晏子東海之中有水而赤晏子詳對第十三景公問天下有極大極細晏子對第十四莊公圖莒國人擾紹㠯晏子在廼止第十五晏子死景公馳往哭哀畢而去第十六晏子死景公哭之稱莫復陳吾過第十七晏子殁左右䛕弦章諌景公賜之魚第十八}
