  - {type: variant, offset: 2650, length: 357, content: 沒左右諛弦章諫景公賜之魚晏子沒十有七年景公飲諸大夫酒公射出質堂上唱善若出一口公作色太息播弓矢弦章入公曰章未吾失晏子嘗聞吾不善章曰臣聞君好臣服君嗜臣食尺蠖食黃身黃食蒼身蒼君其食諂人言乎公曰善賜弦章魚五十乘弦章歸魚車塞途章撫其僕曰曩之唱善者皆欲此魚也固辭不受群書治要引晏子沒左右諛弦章諫景公賜之魚公曰章自吾失晏子於今十有七年矣未嘗聞吾不善今射出質唱善者如出一口弦章對曰此諸臣之不肖也智不足以知君之不善勇不足以犯君之顏然而有一焉臣聞君好之則臣服之君嗜之則臣食之尺蠖食黃其身黃食蒼其身蒼君其猶有食諂人之言乎公曰善太平御覽人事部六十七引晏子沒左右諛弦章諫景公賜之魚公以五十乘魚賜弦章弦章歸魚車塞塗章撫其御之手曰昔者晏子辭賞以正君故過失不掩今諸臣諂諛以干利吾若受魚是反晏子之義而順諂諛之欲也固辭魚不受君子曰弦章之廉晏子之遺行也, WYG: 春秋巻八}
