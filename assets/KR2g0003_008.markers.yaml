  - {type: variant, offset: 3, length: 0, content: '', WYG: 顧於行義勇力之士無忌於國貴戚不薦善逼邇不引過故晏子見公公曰古者亦有徒以勇力立於世者乎晏子對曰嬰聞之輕死以行禮謂之勇誅暴不避彊謂之力故勇力之立也以行其禮義也湯武用兵而不為逆并國而不為貪仁義之理也誅暴不避彊替罪不避衆勇力之行也古之為勇力者行禮義也今上無仁義之理下無替罪誅暴之行而徒以勇力立於世則諸侯行之以國危匹夫行之以家殘昔夏之衰也有推侈大戲殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天下威戮無罪崇尚勇力不顧義理是以桀紂以滅殷夏以衰今公自奮乎勇力不顧乎行義勇力之士無忌於國身立威彊行本淫暴貴戚不薦善逼邇不引過反聖王之德而循滅君之行用此者嬰未聞有也景公飲酒酣曰今日願與諸大夫為樂飲請無為禮晏子蹴然改容曰君之言過矣羣臣固欲君之無禮也力多足以勝其長勇多足以弑君而禮不使也禽獸矣力為政彊者犯弱故曰易主今君去禮則是禽獸也羣臣以力為政彊者犯弱而日易主君將安立矣凡人之所以貴於禽獸者以有禮也故詩曰人而無禮胡不遄死禮不可無也公湎而不聽少間公出晏子不起公入不起交舉則先飲公怒色變抑手疾視曰嚮者夫子之敎寡人無禮之不可也寡人出入不起交舉則先飲禮也晏子避席再拜稽首而請曰嬰敢與君言而忘之乎臣以致無禮之實也君若欲無禮此是巳公曰若是孤之罪也夫子就席寡人聞命矣觴三行遂罷酒葢是後也飭法修禮以治國政而百姓肅也景公飲酒酲三日而後發晏子見曰君病酒乎公曰然晏子曰古之飲酒也足以通氣}
