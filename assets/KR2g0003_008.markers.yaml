  - {type: variant, offset: 2824, length: 183, content: 如出一口弦章對曰此諸臣之不肖也智不足以知君之不善勇不足以犯君之顏然而有一焉臣聞君好之則臣服之君嗜之則臣食之尺蠖食黃其身黃食蒼其身蒼君其猶有食諂人之言乎公曰善太平御覽人事部六十七引晏子沒左右諛弦章諫景公賜之魚公以五十乘魚賜弦章弦章歸魚車塞塗章撫其御之手曰昔者晏子辭賞以正君故過失不掩今諸臣諂諛以干利吾若受魚是反晏子之義而順諂諛之欲也固辭魚不受君子曰弦章之廉晏子之遺行也, SBCK: 第八終}
