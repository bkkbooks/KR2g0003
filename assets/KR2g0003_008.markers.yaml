  - {type: variant, offset: 7, length: 0, content: '', krp: 第八凢十八章仲尼見景公景公欲封之晏子㠯爲不可第一景公上路寢聞哭聲問梁丘㩀晏子對第二仲尼見景公景公曰先生奚不見寡人宰乎第三仲尼之齊見景公而不見晏子子貢致問第四景公出田顧問晏子若人之衆有孔子乎第五仲尼相魯景公患之晏子對以勿憂第六景公問有臣有兄弟而强足恃乎晏子對不足恃第七景公游牛山少樂請晏子一顧第八景公爲大鐘晏子與仲尼栢常騫知將毀第九田無宇非晏子有老妻晏子對以去老謂之亂第十工女欲入身于晏子晏子辭不受第十一景公欲誅羽人晏子以爲灋不宜法第十二景公謂晏子東海之中有水而赤晏子詳對第十三景公問天下有極大極細晏子對第十四莊公圖莒國人擾紹㠯晏子在廼止第十五晏子死景公馳往哭哀畢而去第十六晏子死景公哭之稱莫復陳吾過第十七晏子殁左右䛕弦章諌景公賜之魚第十八}
  - {type: variant, offset: 12, length: 0, content: '', WYG: 侍坐三日}
  - {type: variant, offset: 14, length: 0, content: '', WYG: 説之楚巫曰公明神主之帝王之君也公即位有七年矣事未大濟者明神未至也請致五帝以明君德景公再拜稽首楚巫曰請廵國郊以觀帝位至於牛山而不敢登曰五帝之位在於國南請齋而後登之公命百官供齋具於楚巫之所裔款視事晏子聞之而見於公曰公令楚巫齋牛山乎公曰然致五帝以明寡人之德神將降福於寡人其有所濟乎晏子曰君之言過矣古之王者德厚足以安世行廣足以容衆諸侯戴之以為君長百姓歸之以為父母是故天地四時和而不失星辰日月順而不亂德厚行廣配天象時然後為帝王之君神明之主古者不慢行而繁祭不輕身而恃巫今政亂而行僻而求五帝之明德也棄賢而用巫而求帝王之在身也夫民不茍德福不苟降君之帝王不亦難乎惜夫君位之髙所論之卑也公曰裔欵以楚巫命寡人曰試嘗見而觀焉寡人見而説之信其道行其言今夫子譏之請逐楚巫而拘裔欵晏子曰楚巫不可出公曰何故對曰楚巫出諸侯必或受之公信之以過於内不知出以易諸侯於外不仁請東楚巫而拘裔欵公曰諾故曰送楚巫於東而拘裔欵於國也齊大旱逾時景公召羣臣問曰天不雨久矣民且有饑色吾使人卜云祟在髙山廣水寡人}
