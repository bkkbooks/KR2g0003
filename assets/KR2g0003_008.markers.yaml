  - {type: variant, offset: 15, length: 0, content: '', WYG: 少賦斂以祠靈山可乎羣臣莫對晏子進曰不可祠此無益也夫靈山固以石為身以草木為髮天久不雨髮將焦身將熱彼獨不欲雨乎祠之無益公曰不然吾欲祠河伯可乎晏子曰不可河伯以水為國以魚鱉為民天久不雨泉將下百川竭國將亡民將滅矣彼獨不欲雨乎祠之何益景公曰今為之奈何晏子曰君誠避宫殿暴露與靈山河伯共憂其幸而雨乎于是景公出野居暴露三日天果大雨民盡得種蒔景公曰善哉晏子之言可無用乎其維有德景公將觀於淄上與晏子閒立公喟然嘆曰嗚呼使國可長保而傳於子孫豈不樂哉晏子對曰嬰聞明王不徒立百姓不虚至今君以政亂國以行棄民久矣而聲欲保之不亦難乎嬰聞之能長保國者能終善者也諸侯並立能終善者為長列士並學能終善者為師昔先君桓公其方任賢而贊德之時亡國恃以存危國仰以安是以民樂其政而世高其德行逺征暴勞者不疾驅海内使朝天子而諸侯不怨當是時盛君之行不能進焉及其卒而衰怠於德而并於樂身溺於婦侍而謀因竪刁是以民苦其政而世非其行故身死乎胡宫而不舉蟲出而不收當是時也桀紂之卒不能惡焉詩曰靡不有初鮮克有終不能終善者不遂其君今君臨民若冦讎見善若避熱亂政而危賢必逆於衆肆欲於民而誅虐於下恐及於身嬰之年老不能待於君使矣行不能革則持節以沒世耳景公遊於牛山北臨其國城而流涕曰若何滂滂去此而死乎艾孔梁丘據皆從而泣晏子獨笑於旁公刷涕而顧晏子曰寡人今日游悲孔與據皆従寡人而涕泣子之獨笑何也晏子對曰使賢者常守之則太公桓公將常守之矣使勇者常守之則莊公靈公將常守之矣數君者將守之則吾君安得此位而立焉以其迭處之迭去之至於君也而獨為之流涕是不仁也不仁之君見一謟䛕之臣見二此臣之所以獨竊笑也景公出遊於公阜北靣望睹齊國曰嗚呼使古而無死何如晏子曰昔者上帝以人之沒為善仁者息焉不仁者伏焉若使古而無死丁公太公將有齊國桓襄文武將皆相之君將戴笠衣褐執銚耨以蹲行􅅵畆之中孰暇患死公忿然作色不説無幾何而梁丘據御六馬而來公曰是誰也晏子曰據也公曰何如曰大暑而疾馳甚者馬死薄者馬傷非據孰敢為之公曰據與我和者夫晏子曰此所謂同也所謂和者君丼則臣酸君淡則臣鹹今據也甘君亦甘所謂同也安得為和公忿然作色不悦無幾何日暮公西靣望睹彗星召伯常騫使禳去之晏子曰不可此天敎也日月之氣風雨不時彗星之出天為民之亂見之故詔之妖祥以戒不敬今君若設文而受諌謁聖賢人雖不去彗星將自亡今君嗜酒而并於樂政不飾而寛於小人近讒好優惡文而䟽聖賢人何暇在彗茀又將見矣公忿然作色不悦及晏子卒公出背而立曰嗚呼昔者從夫子而游公阜夫子一日而三責我今誰責寡人哉景公出遊於寒塗睹死胔黙然不問晏子諌曰昔吾先君桓公出遊睹饑者與之食睹疾者與之財使令不勞力籍斂不費民先君將遊百姓皆悦曰君當幸遊吾鄕乎今君遊於寒塗據四十里之氓殫財不足以奉斂盡力不能周役民氓饑寒凍餒死胔相望而君不問失君道矣財屈力竭下無以親上驕泰奢侈上無以親下上下交離君臣無親此三代之所以衰也今君行之嬰懼公族之危以為異姓之福也公曰然為上而忘下厚藉斂而忘民吾罪大矣于是斂死胔發粟於民據四十里之氓不服政其年公三月不出游景公之時雨雪三日而不霽公被狐白之裘坐堂側陛晏子入見立有閒公曰怪哉雨雪三日而天不寒晏子對曰天不寒乎公笑晏子曰嬰聞古之賢君飽而知人之饑温而知人之寒逸而知人之勞今君不知也公曰善寡人聞命矣乃令出裘發粟與饑寒令所睹於塗者無問其鄕所睹於里者無問其家循國計數無言其名士既事者兼月疾者兼歳孔子聞之曰晏子能明其所欲景公能行其所善也景公之時熒惑守於虚期年不去公異之召晏子而問曰吾聞之人行善者天賞之行不善者天殃之熒惑天罰也今留虚其孰當之晏子曰齊當之公不悦曰天下大國十二皆曰諸侯齊獨何以當晏子曰虚齊野也且天之下殃固於富彊為善不用出政不行賢人使逺讒人反昌百姓疾怨自為祈祥錄錄彊食進死何傷是以列舎無次變星有芒熒惑回逆孽星在旁有賢不用安得不亡公曰可去乎對曰可致者可去不可致者不可去公曰寡人為之若何對曰盍去寃聚之獄使反田矣散百官之財施之民矣振孤寡而敬老人矣夫若是者百惡可去何獨是孽乎公曰善行之二月而熒惑遷景公舉兵將伐宋師過泰山公夢見二丈夫立而怒其怒甚盛公恐覺辟門召占夢者至公曰今夕吾夢二丈夫立而怒不知其所言其怒甚盛吾猶識其狀識其聲占夢者曰師過泰山而不用事故泰山之神怒也請趣召祝史祠乎泰山則可公曰諾明日晏子朝見公告之如占夢之言也公曰占夢者之言曰師過泰山而不用事故泰山之神怒也今使人召祝史祠之晏子俯有閒對曰占夢者不識也此非泰山之神是宋之先湯與伊尹也公疑以為泰山神晏子曰公疑之則嬰請言湯伊尹之狀也湯質晳而長顔以髯兊上豐下倨身而揚聲公曰然是巳伊尹黑而短蓬而髯豐上兊下僂身而下聲公曰然是巳今若何晏子曰夫湯太甲武丁祖乙天下之盛君也不宜無後今惟宋耳而公伐之故湯伊尹怒請散師以平宋景公不用終伐宋晏子曰伐無罪之國以怒明神不易行以續蓄進師以近過非嬰所知也師若果進軍必有殃軍進再舎鼔毁將殪公乃辭乎晏子散師不果伐宋景公畋於署梁十有八日而不返晏子自國往見公比至衣冠不正不革衣冠望游而馳公望見晏子下而急帶曰夫子何為遽國家無有故乎晏子對曰不亦急也雖然嬰願有復也國人皆以君為安野而不安國好獸而惡民毋乃不可乎公曰何哉吾為夫婦獄訟之不正乎則泰士子牛存矣為社稷宗廟之不享乎則泰祝子游存矣為諸侯賔客莫之應乎則行人子羽存矣為田野之不辟倉庫之不實則申田存焉為國家之有餘不足聘乎則吾子存矣寡人之有五子猶心之有四支心有四支故心得佚焉今寡人有五子故寡人得佚焉豈不可哉晏子對曰嬰聞之與君言異若乃心之有四支而心得佚焉可得令四支無心十有八日不亦久乎公于是罷畋而歸景公射鳥野人駭之公怒令吏誅之晏子曰野人不知也臣聞賞無功謂之亂罪不知謂之虐兩者先王之禁也以飛鳥犯先王之禁不可今君不明先王之制而無仁義之心是以從欲而輕誅夫鳥獸固人之所飬也野人駭之不亦宜乎公曰善自今巳後弛鳥獸之禁無以苛民也景公使圉人飬所愛馬暴死公怒令人操刀解飬馬者是時晏子侍前左右執刀而進晏子止而問於公曰堯舜支解人從何軀始公矍然曰従寡人始遂不支解公曰以屬獄晏子曰此不知其罪而死臣為君數之使知其罪然後致之獄公曰可晏子數之曰爾罪有三公使汝飬馬而殺之當死罪一也又殺公之所最善馬當死罪二也使公以一馬之故而殺人百姓聞之必怨吾君諸侯聞之必輕吾國汝殺公馬使怨積於百姓兵弱於隣國汝當死罪三也今以屬獄公喟然嘆曰夫子釋之夫子釋之勿傷吾仁也晏子春秋巻一欽定四庫全書晏子春秋巻二内篇諫下第二景公藉重而獄多拘者滿圄怨者滿朝晏子諫公不聼公謂晏子曰夫獄國之重官也願託之夫子晏子對曰君將使嬰勑其功乎則嬰有壹妄能書足以治之矣君將使嬰勑其意乎夫民無欲殘其家室之生以奉暴上之僻者則君使吏比而焚之而已矣景公不悅曰勑其功則使一妄勑其意則比焚如是夫子無所謂能治國乎晏子曰嬰聞與君異今夫胡貉戎狄之蓄狗也多者十有餘寡者五六然不相害傷今束鷄豚妄投之其折骨决皮可立得也且夫上正其治下審其論則貴賤不相踰越今君舉千鍾爵禄而妄投之于左右左右争之甚于胡狗而公不知也寸之管無當天下不能足之以粟今齊國丈夫畊女子織夜以接日不足以奉上而君側皆彫文刻鏤之觀此無當之管也而君終不知五尺童子操寸之煙天下不能足以薪今君之左右皆操煙之徒而君終不知鍾鼓成肆干戚成舞雖禹不能禁民之觀且夫飾民之欲而嚴其聼禁其心聖人所難也而况奪其財而饑之勞其力而疲之常致其苦而嚴聼其獄痛誅其罪非嬰所知也景公有所愛槐令吏謹守之植木縣之下令曰犯槐者刑傷之者死有不聞令醉而犯之者公聞之曰是先犯我令使吏拘之且加罪焉其子徃辭晏子之家託曰負廓之民賤妾請有道于相國不勝其欲願得充數乎下陳晏子聞之笑曰嬰其滛于色乎何為老而見犇雖然是必有故令内之女子入門晏子望見之曰恠哉有深憂進而問焉曰所憂何也對曰君樹槐縣令犯之者刑傷之者死妾父不仁不聞令醉而犯之吏將加罪焉妾聞之明君莅國立政不損禄不益刑又不以私恚害公法不為禽獸傷人民不為草木傷禽獸不為野草傷禾苖吾君欲以樹木之故殺妾父孤妾身此令行于民而法于國矣雖然妾聞之勇士不以衆彊凌孤獨明惠之君不拂是以行其所欲此譬之猶自治魚鱉者也去其腥臊者而巳昧墨與人比居庾肆而教人危坐今君出令于民茍可法于國而善益于後世則父死亦當矣妾為之收亦宜矣甚乎今之令不然以樹木之故罪法妾父妾恐其傷察吏之法而害明君之義也隣國聞之皆謂吾君愛樹而賤人其可乎願相國察妾言以裁犯禁者晏子曰甚矣吾將為子言之于君使人送之歸明日蚤朝而復于公曰嬰聞之窮民財力以供嗜欲謂之暴崇玩好威嚴擬乎君謂之逆刑殺不辜謂之賊此三者守國之大殃今君窮民財力以羡餒食之具繁鍾鼓之樂極宫室之觀行暴之大者崇玩好縣愛槐之令載過者馳歩過者趨威嚴擬乎君逆之明者也犯槐者刑傷槐者死殺不稱賊民之深者君享國德行未見于衆而三辟著于國嬰恐其不可以莅國子民也公曰㣲大夫寡人㡬有大罪以累社稷今子大夫教之社稷之福寡人受命矣晏子出公令趣罷守槐之役㧞置縣之木廢傷槐之法出犯槐之囚景公樹竹令吏謹守之公出過之有斬竹者焉公以車逐得而拘之將加罪焉晏子入見曰公亦聞吾先君丁公乎公曰何如晏子曰丁公伐曲沃勝之止其財出其民公曰自莅之有輿死人以出者公恠之令吏視之則其中金與玉焉吏請殺其人收其金玉公曰以兵降城以衆圍財不仁且吾聞之人君者寛惠慈衆不身傳誅令捨之公曰善晏子退公令出斬竹之囚景公令兵搏治當臈氷月之間而寒民多凍餒而功不成公怒曰為我殺兵二人晏子曰諾少為間晏子曰昔者先君荘公之伐于晉也其役殺兵四人今令而殺兵二人是殺師之半也公曰諾是寡人之過也令止之晏子使于魯比其返也景公使國人起大臺之役嵗寒不巳凍餒之者鄉有焉國人望晏子晏子至巳復事公廼坐飲酒樂晏子曰君若賜臣臣請歌之歌曰庶民之言曰凍水洗我若之何太上靡散我若之何歌終喟然歎而流涕公就止之曰夫子曷為至此殆為大臺之役夫寡人將速罷之晏子再拜出而不言遂如大臺執扑鞭其不務者曰吾細人也皆有蓋廬以避燥濕君為壹臺而不速成何為國人皆曰晏子􅂇天為虐晏子歸未至而君出令趣罷役車馳而人趨仲尼聞之喟然嘆曰古之善為人臣者聲名歸之君禍災歸之身入則切磋其君之不善出則高譽其君之德義是以雖事惰君能使垂衣裳朝諸侯不敢伐其功當此道者其晏子是耶景公為長庲將欲美之有風雨作公與晏子入坐飲酒致堂上之樂酒酣晏子作歌曰穗乎不得穫秋風至兮殫零落風雨之弗殺也太上之靡弊也歌終顧而流涕張躬而舞公就晏子而止之曰今日夫子為賜而誡于寡人是寡人之罪遂廢酒罷役不果成長庲景公築路􅃦之臺三年未息又為長庲之役二年未息又為鄒之長塗晏子諫曰百姓之力勤矣公不息乎公曰塗將成矣請成而息之對曰明君不屈民財者不得其利不窮民力者不得其樂昔者楚靈王作傾宫三年未息也又為章華之臺五年又不息也乾溪之役八年百姓之力不足而息也靈王死于乾溪而民不與君歸今君不遵明君之義而循靈王之跡嬰懼君有暴民之行而不睹長庲之樂也不若息之公曰善非夫子者寡人不知得罪于百姓深也于是令勿委壞餘財勿收斬板而去之景公春夏游獵又起大臺之役晏子諫曰春夏起役且游獵奪民農旹國家空虗不可景公曰吾聞相賢者國治臣忠者主逸吾年無㡬矣欲遂吾所樂卒吾所好子其息矣晏子曰昔文王不敢盤游于田故國昌而民安楚靈王不廢乾溪之役起章華之臺而民叛之今君不革將危社稷而為諸侯笑臣聞忠不避死諫不違罪君不聼臣臣將遊矣景公曰唯唯將弛罷之未㡬朝韋冏解役而歸景公獵休坐地而食晏子後至左右滅葭而席公不說曰寡人不席而坐地二三子莫席而子獨搴草而坐之何也晏子對曰吾聞介冑坐陣不席獄訟不席尸坐堂上不席三者皆憂也故不敢以憂侍坐公曰諾令人下席曰大夫皆席寡人亦席矣景公出獵上山見虎下澤見蛇歸召晏子而問之曰今日寡人出獵上山則見虎下澤則見蛇殆所謂不祥也晏子對曰國有三不祥是不與焉夫有賢而不知一不祥知而不用二不祥用而不任三不祥也所謂不祥乃若此者今上山見虎虎之室也下澤見蛇蛇之穴也如虎之室如蛇之穴而見之曷為不祥也景公為臺臺成又欲為鐘晏子諫曰君國者不樂民之哀君不勝欲既築臺矣今復為鐘是重斂于民民必哀矣夫斂民之哀而以為樂不祥非所以君國者公乃止景公臺已成謂晏子曰吾欲與夫子燕對曰未祀先君而以燕非禮也公曰何以禮為對曰夫禮者民之紀紀亂則民失亂紀失民危道也公曰善乃以祀焉景公為履黄金之綦飾以銀連以珠良玉之絇其長尺冰月服之以聽朝晏子朝公迎之履重僅能舉足問曰天寒乎晏子曰君奚問天之寒也古聖人製衣服也冬輕而暖夏輕而清今君之履冰月服之是重寒也履重不節是過任也失生之情矣故魯工不知寒温之節輕重之量以害正生其罪一也作服不常以笑諸侯其罪二也用財無功以怨百姓其罪三也請拘而使吏度之公苦請釋之晏子曰不可嬰聞之苦身為善者其賞厚苦身為非者其罪重公不對晏子出令吏拘魯工令人送之境吏不得入公撤履不復服也景公問晏子曰吾欲服聖王之服居聖王之室如此則諸侯其至乎晏子對曰法其節儉則可法其服居其室無益也三王不同服而王非以服致諸侯也誠于愛民果于行善天下懷其德而歸其義若其衣服節儉而衆悅也夫冠足以修敬不務其飾衣足以掩形禦寒不務其美衣不務于隅肶之削冠無觚羸之理身服不雜綵首服不鏤刻且古者甞有紩衣攣領而王天下者其義好生而惡殺節上而羡下天下不朝其服而共歸其義古者甞有處櫓巢窟穴而不惡予而不取天下不朝其室而共歸其仁及三代作服為益敬也首服足以修敬而不重也身服足以行潔而不害于動作服之輕重便于身用財之費順于民其不為櫓巢者以避風也其不為穴者以避濕也是故明堂之制下之潤濕不能及也上之寒暑不能入也土事不文木事不鏤示民之節也及其衰也衣服之侈過足以敬宫室之美過避潤濕用力甚多用財甚費與民為讐今君欲法聖王之服不法其制法其節儉也則雖未成治庶其有益也今君窮臺榭之髙極汙池之深而不止務于刻鏤之巧文章之觀而不厭則亦與民而讐矣若臣之慮恐國之危而公不平也公乃願致諸侯不亦難乎公之言過矣景公為西曲潢其深滅軌髙三仞横木龍蛇立木鳥獸公衣黼黻之衣素繡之裳一衣而五彩具焉帶球玉而冠且被髪亂首南面而立傲然晏子見公曰昔仲父之覇何如晏子抑首而不對公又曰昔管文仲之覇何如晏子對曰臣聞之維翟人與龍蛇比今君横木龍蛇立木鳥獸亦室一就矣何暇在覇哉且公伐宫室之美矜衣服之麗一衣而五彩具焉帶球玉而亂首被髪亦室一容矣萬乗之君而一心于邪君之魂魄亡矣以誰與圖覇哉公下堂就晏子曰梁丘據裔欵以室之成吿寡人是以竊襲此服與據為笑又使夫子及寡人請改室易服而敬聽命其可乎晏子曰夫二子營君以邪公安得知道哉且伐木不自其根則蘖又生也公何不去二子者毋使耳目淫焉景公為巨冠長衣以聽朝疾視矜立日晏不罷晏子進曰聖人之服中侻而不駔可以導衆其動作侻順而不逆可以奉生是以下皆法其服而民争學其容今君之服駔華不可以導衆民疾視矜立不可以奉生日晏矣君不若脫服就燕公曰寡人受命退朝遂去衣冠不復晏子朝復於景公曰朝居嚴乎公曰嚴居朝則曷害於治國家哉晏子對曰朝居嚴則下無言下無言則上無聞矣下無言則吾謂之瘖上無聞則吾謂之聾聾瘖非害國家而如何也且合升鼓之㣲以滿倉廪合䟽縷之綈以成帷幕太山之高非一石也累卑然後髙天下者非用一士之言也固有受而不用惡有拒而不受者哉景公登路寢之臺不能終而息乎陛忿然而作色不悅曰孰為髙臺病人之甚也晏子曰君欲節於身而勿髙使人髙之而勿罪也今髙從之以罪卑亦從以罪敢問使人如此可乎古者之為宫室也足以便生不以為奢侈也故節於身謂於民及夏之衰也其王桀背棄德行為璿室玉門殷之衰也其王紂作為傾宫靈臺卑狹者有罪髙大者有賞是以身及焉今君髙亦有罪卑亦有罪甚於夏殷之王民力殫乏矣而不免於罪嬰恐國之流失而公不得享也公曰善寡人自知誠費財勞民以為無功又從而怨之是寡人之罪也非夫子之教豈得守社稷哉遂下再拜不果登臺景公與晏子登寢而望國公愀然而歎曰使後嗣世世有此豈不可哉晏子曰臣聞明君必務正其治以事利民然後子孫享之詩云武王豈不事貽厥孫謀以燕翼子今君處佚怠逆政害民有日矣而猶出若言不亦甚乎公曰然則後世孰將把齊國對曰服牛死夫婦笑非骨肉之親也為其利之大也欲知把齊國者則其利之者耶公曰然何以易對曰移之以善政今公之牛馬老於欄牢不勝服也車蠧於巨户不勝乗也衣裘襦袴朽弊於蔵不勝衣也醯醢腐不勝沽也酒醴酸不勝飲也府粟鬱而不勝食又厚藉斂於百姓而不以分餒民夫蔵財而不用凶也財茍失守下其報環至其次昧財之失守委而不以分人者百姓必進自分也故君人者與其請於人不如請於已也景公成路寢之臺逢於何遭䘮遇晏子於途再拜乎馬前晏子下車挹之曰子何以命嬰也對曰於何之母死兆在路寢之臺牖下願請命合骨晏子曰嘻難哉雖然嬰將為子復之適為不得子將若何對曰夫君子則有以如我者儕小人吾將左手擁格右手梱心立餓枯槁而死以吿四方之士曰於何不能葬其母者也晏子曰諾遂入見公曰有逢於何者母死兆在路寢當如之何願請合骨公作色不悅曰古之及今子亦甞聞請葬人主之宫者乎晏子對曰古之人君其室宫節不侵生民之居臺榭儉不殘死人之墓故未甞聞諸請葬人主之宫者也今君侈為宫室奪人之居廣為臺榭殘人之墓是生者愁憂不得安處死者離易不得合骨豐樂侈逰兼傲生死非人君之行也遂欲滿求不顧細民非存之道且嬰聞之生者不得安命之曰蓄憂死者不得葬命之曰蓄哀蓄憂者怨蓄哀者危君不如許之公曰諾晏子出梁丘據曰自昔及今未甞聞求葬公宫者也若何許之公曰削人之居殘人之墓凌人之䘮而禁其葬是於生者無施於死者無禮詩云榖則異室死則同穴吾敢不許乎逢於何遂塟其母路寢之牖下解衰去絰布衣縢履𤣥冠紕武踊而不哭躃而不拜已乃涕洟而去景公之嬖妾嬰子死公守之三日不食膚著于席不去左右以復而君無聽焉晏子入復曰有術客與醫俱言曰聞嬰子病死願請治之公喜遽起曰病猶可為乎晏子曰客之道也以為良醫也請甞試之君請屏潔沐浴飲食間病者之宫彼亦將有鬼神之事焉公曰諾屏而沐浴晏子令棺人入斂已斂而復曰醫不能治病已斂矣不敢不以聞公作色不說曰夫子以醫命寡人而不使視將斂而不以聞吾之為君名而已矣晏子曰君獨不知死者之不可以生耶嬰聞之君正臣從謂之順君僻臣從謂之逆今君不道順而行僻從邪者邇導害者逺䜛諛萌通而賢良廢滅是以謟諛繁於間邪行交於國也昔吾先君桓公用管仲而覇嬖乎竪刁而滅今君薄於賢人之禮而厚嬖妾之哀且古聖王畜私不傷行斂死不失愛送死不失哀行傷則溺巳愛失則傷生哀失則害性是故聖王節之也即畢殮不留生事棺槨衣衾不以害生飬哭泣處哀不以害生道今朽尸以留生廣愛以傷行修哀以害性君之失矣故諸侯之賔客慙入吾國本朝之臣慙守其職崇君之行不可以導民從君之欲不可以持國且嬰聞之朽而不斂謂之僇尸臭而不收謂之陳胔反明王之性行百姓之誹而内嬖妾於僇胔此之為不可公曰寡人不識請因夫子而為之晏子復曰國之士大夫諸侯四隣賔客皆在外君其哭而節之仲尼聞之曰星之昭昭不若月之曀曀小事之成不若大事之廢君子之非賢於小人之是也其晏子之謂歟梁丘據死景公召晏子而吿之曰據忠且愛我我欲豐厚其葬高大其壟晏子曰敢問據之忠與愛於君者可得聞乎公曰吾有喜於玩好有司未能我具也則據以其所有共我是以知其忠也每有風雨暮夜求必存吾是以知其愛也晏子曰嬰對則為罪不對則無以事君敢不對乎嬰聞之臣專其君謂之不忠子專其父謂之不孝妻專其夫謂之嫉事君之道導親於父兄有禮於羣臣有惠於百姓有信於諸侯謂之忠為子之道以鍾愛其兄弟施行於諸父慈惠於衆子誠信於朋友謂之孝為妻之道使其衆妾皆得歡忻於其夫謂之不嫉今四}
