  - {type: variant, offset: 7, length: 2, content: 仲尼, WYG: 周觴五獻過之者誅君身服之故外無怨治内無亂行今一日飲酒而三日寢之國治怒乎外左右亂乎内以刑罰自防者勸乎為非以賞譽自勸者惰乎為善上離德行民輕賞罰失所以為國矣願君節之也景公飲酒七日七夜不止弦章諫曰君欲飲酒七日七夜章願君廢酒也不然章賜死晏子入見公曰章諫吾曰願君之廢酒也不然章賜死如是而聽之則臣為制也不聽又愛其死晏子曰幸矣章遇君也令章遇桀紂者章死久矣于是公遂廢酒景公之時霖雨十有七日公飲酒日夜相繼晏子請發粟於民三請不見許公命栢遽廵國致能歌者晏子聞之不説遂分家粟於氓致任器於陌徒行見公曰十有七日矣懷寶鄕有數十飢氓里有數家百姓老弱凍寒不得裋褐飢餓不得糟糠敝撤無走四顧無告而君不䘏日夜飲酒令國致樂不巳馬食府粟狗饜芻豢三保之妾俱足梁肉狗馬保妾不巳厚乎民氓百姓不亦薄乎故里窮而無告無樂有上矣飢餓而無告無樂有君矣嬰奉數之筴以隨百官之吏民飢餓窮約而無告使上淫湎失本而不䘏嬰之罪大矣再拜稽首請身而去遂走而出公從之兼於塗而不能逮令趣駕追晏子其家不及粟米盡於氓任器存於陌公驅及之康内公下車從晏子曰寡人有罪夫子倍棄不援寡人不足以有約也夫子不顧社稷百姓乎願夫子之幸存寡人寡人請奉齊國之粟米財貨委之百姓多寡輕重惟夫子之令遂拜於途晏子乃返命稟廵氓家有布縷之本而絶食者使有終月之委絶本之家使有期年之食無委積之氓與之薪橑使足以畢霖雨令栢廵氓家室不能禦者予之金廵求氓寡用財乏者死三日而畢後者若不用令之罪公出舎損肉撤酒馬不食府粟狗不食飦肉辟拂嗛齊酒徒減賜三日吏告畢工貧氓萬七千家用粟九十七萬鍾薪橑萬三千乗懷寶二千七百家用金三千公然後就内寢食琴瑟不張鐘鼓不陳晏子請左右與可令歌舞足以留思虞者退之辟拂三千謝於下陳人待三士待四出之關外也晏子朝杜扄望羊待於朝晏子曰君奚故不朝對曰君夜發不可以晏子曰何故對曰梁丘據扄入歌人虞變齊音晏子退朝命宗祝修禮而拘虞公聞之而怒曰何故而拘虞晏子曰以新樂淫君公曰諸侯之事百官之政寡人願以請子酒醴之味金石之聲願夫子無與焉夫樂何失必攻哉對曰夫樂亡而禮從之禮亡而政從之政亡而國従之國衰臣懼君之逆政之行有歌紂作北里幽厲之聲顧夫淫以鄙而偕亡君奚輕變夫故哉公曰不幸有社稷之業不擇言而出之請受命矣景公燕賞於國内萬鍾者三千鍾者五令三出而軄計莫之從公怒令免職計令三出而士師莫之從公不説晏子見公謂晏子曰寡人聞君國者愛人則能利之惡人則能䟽之今寡人愛人不能利惡人不能䟽失君道矣晏子曰嬰聞之君正臣從謂之順君僻臣從謂之逆今君賞讒䛕之民而令吏必從則是使君失其道臣失其守也先王之立愛以勸善也其立惡以禁暴也昔者三代之興也利於國者愛之害於國者惡之故明所愛而賢良衆明所惡而邪僻滅是以天下治平百姓和集及其衰也行安簡易身安逸樂順於己者愛之逆於已者惡之故明所愛而邪僻繁明所惡而賢良滅離散百姓危覆社稷君上不度聖王之興而下不觀惰君之衰臣懼君之逆政之行有司不敢爭以覆社稷危宗廟公曰寡人不知也請從士師之策國内之祿所收者三也景公信用讒佞賞無功罰不辜晏子諫曰臣聞明君望聖人而信其敎不聞聽讒佞以誅賞今與左右相恱頌也曰比死者勉為樂乎吾安能為仁而愈黥民耳矣故内寵之妾廹奪於國外寵之臣矯奪於鄙執灋之吏並荷百姓民愁苦約病而姦驅尤佚隠情奄惡蔽謟其上故雖有至聖大賢豈能勝若讒哉是以忠臣之常有災傷也臣聞古者之士可與得之不可與失之可與進之不可與退之臣請逃之矣遂鞭馬而出公使韓子休追之曰孤不仁不能順敎以至此極夫子休國焉而往寡人將從而後晏子遂鞭馬而返其僕曰嚮之去何速今之返又何速晏子曰非子之所知也公之言至矣翟王子羨臣干景公以重駕公觀之而不説也嬖人嬰子欲觀之公曰及晏子寢病也居囿中臺上以觀之嬰子説之因為之請曰厚祿之公許諾晏子起病而見公公曰翟王子羨之駕寡人甚説之請使之示乎晏子曰駕御之事臣無職焉公曰寡人一樂之是欲禄之以萬鍾其足乎對曰昔衛士東野之駕也公説之嬰子不説公曰不説遂不觀今翟王子羨之駕也公不説嬰子説公因説之為請公許之則是婦人為制也且不樂治人而樂治馬不厚禄賢人而厚祿御夫昔者先君桓公之地狹於今修法治廣政敎以霸諸侯今君一諸侯無能親也歳凶年饑道途死者相望也君不此憂耻而惟圖耳目之樂不修先君之功烈而惟飾駕御之伎則公不顧民而忘國甚矣且詩曰載驂載駟君子所誡夫駕八固非制也今又重此其為非制也不滋甚乎且君茍美樂之國必衆為之田獵則不便道行致逺則不可然而用馬數倍此非御下之道也淫於耳目不當民務此聖王之所禁也君茍美樂之諸侯必或效我君無厚德善政以被諸侯而易之以僻此非所以子民彰名致逺親隣國之道也且賢良廢滅孤寡不振而聽嬖妾以祿御夫以蓄怨與民為讎之道也詩曰哲夫成城哲婦傾城今君不思成城之求而惟傾城之務國之亡日至矣君其圖之公曰善遂不復觀乃罷歸翟王子羨而疏嬖人嬰子景公有男子五人所使傅之者皆有車百乗者也晏子為一焉公召其傅曰勉之將以而所傅為子及晏子晏子辭曰君命其臣據其肩以盡其力臣敢不勉乎今有車之家此一國之權臣也人人以君命命之曰將以而所博為子此離樹别黨傾國之道也嬰不敢受命顧君圖之淳于人納女於景公生孺子荼景公愛之諸臣謀欲廢公子陽生而立荼公以告晏子晏子曰不可夫以賤匹貴國之害也置大立少亂之本也夫陽生而長國人戴之君其勿易夫服位有等故賤不陵貴立子有禮故孽不亂宗願君敎荼以禮而勿䧟於邪導之以義而勿湛於利長少行其道宗孽得其倫夫陽生敢毋使荼饜􅆝肉之味玩金石之聲而有患乎廢長立少不可以敎下尊孽卑宗不可以利所愛長少無等宗孽無别是設賊樹姦之本也君其圖之古之明君非不知繁樂也以為樂淫則哀非不知立愛也以為義失則憂是故制樂以節立子以道若夫恃讒䛕以事君者不足以責信今君用讒人之謀聽亂夫之言也廢長立少臣恐後人之有因君之過以資其邪廢少而立長以成其利者君其圖之公不聽景公沒田氏殺君荼立陽生殺陽生立簡公殺簡公而取齊國景公疥且瘧期年不巳召會譴梁丘據晏子而問焉曰寡人之病病矣使史固與祝佗廵山川宗廟犧牲珪璧莫不備具數其常多先君桓公桓公一則寡人再病不已滋甚予欲殺二子者以説於上帝其可乎會譴梁丘據曰可晏子不對公曰晏子何如晏子曰君以祝為有益乎公曰然若以為有益則詛亦有損也君疏輔而遠拂忠臣擁塞諫言不出臣聞之近臣嘿逺臣瘖衆口鑠金今自聊攝以東姑尤以西者此其人民衆矣百姓之咎怨誹謗詛君於上帝者多矣一國詛兩人祝雖善祝者不能勝也且夫祝直言情則謗吾君也隠匿過則欺上帝也上帝神則不可欺上帝不神祝亦無益願君察之也不然刑無罪夏商所以滅也公曰善解予惑加冠命會譴毋治齊國之政梁丘據毋治賔旅之事兼屬之乎晏子晏子辭不得命受相退把政改月而君病悛公曰昔吾先君桓公以管子為有力邑狐與穀以共宗廟之鮮賜其忠臣則是多忠臣者子今忠臣也寡人請賜子州欵辭曰管子有一美嬰不如也有一惡嬰不忍為也其宗廟之養鮮也終辭而不受景公遊於麥丘問其封人曰年幾何矣對曰鄙人之年八十五矣公曰壽哉子其祝我封人曰使君之年長於胡宜國家公曰善哉子其復之曰使君之嗣壽皆若鄙臣之年公曰善哉子其復之封人曰使君無得罪於民公曰誠有鄙民得罪於君則可安有君得罪於民者乎晏子諫曰君過矣彼䟽者有罪戚者治之賤者有罪貴者治之君得罪於民誰將治之敢問桀紂君誅乎民誅乎公曰寡人固也於是賜封人麥丘以為邑楚巫微導裔款以}
