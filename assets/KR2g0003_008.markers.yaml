  - {type: variant, offset: 1288, length: 883, content: 景公問有臣有兄弟而強足恃乎晏子對不足恃景公問晏子曰有臣而強足恃乎晏子對曰不足恃有兄弟而強足恃乎晏子對曰不足恃公忿然作色曰吾今有恃乎晏子對曰有臣而強無甚如湯有兄弟而強無甚如桀湯有弒其君桀有亡其兄豈以人為足恃哉可以無亡也景公遊牛山少樂請晏子一願景公遊于牛山少樂公曰請晏子一願晏子對曰不嬰何願公曰晏子一願對曰臣願有君而見畏有妻而見歸有子而可遺公曰善乎晏子之願載一願晏子對曰臣願有君而明有妻而材家不貧有良鄰有君而明日順嬰之行有妻而材則使嬰不忘家不貧則不慍朋友所識有良鄰則日見君子嬰之願也公曰善乎晏子之願也晏子對曰臣願有君而可輔有妻而可去有子而可怒公曰善乎晏子之願也景公為大鐘晏子與仲尼柏常騫知將毀景公為大鐘將懸之晏子仲尼柏常騫三人朝俱曰鐘將毀衝之果毀公召三子者而問之晏子對曰鍾大不祀先君而以燕非禮是以曰鍾將毀仲尼曰鍾大而懸下衝之其氣下回而上薄是以曰鍾將毀柏常騫曰今庚申雷日也音莫勝於雷是以曰鍾將毀也田無宇非晏子有老妻晏子對以去老謂之亂田無宇見晏子獨立於閨內有婦人出於室者髮班白衣緇布之衣而無裏裘田無宇譏之曰出於室何為者也晏子曰嬰之家也無宇曰位為中卿食田七十萬何以老妻為對曰嬰聞之去老者謂之亂納少者謂之淫且夫見色而忘義處富貴而失倫謂之逆道嬰可以有淫亂之行不顧于倫逆古之道乎工女欲入身於晏子晏子辭不受有工女託於晏子之家焉者曰婢妾東廓之野人也願得入身比數於下陳焉晏子曰乃今而後自知吾不肖也古之為政者士農工商異居男女有別而不通故士無邪行女無淫事今僕託國主民而女欲犇僕僕必色見而行無廉也遂不見景公欲誅羽人晏子以為法不宜殺景公蓋姣有羽人視景公僭者公謂左右曰問之何視寡人之僭也羽人對曰言亦死而不言亦死竊姣公也公曰合色寡人也殺之晏子不時而入見曰蓋聞君有所怒羽人公曰然色寡人故將殺之晏子對曰嬰聞拒欲不道惡愛不祥雖使色君於法不宜殺也公曰惡然乎若使沐浴寡人將使抱背景公謂晏子東海之中有水而赤晏子詳對景公謂晏子曰東海之中有水而赤其中有棗華而不實何也晏子對曰昔者秦繆公乘龍而理天下以黃布裹烝棗至東海而捐其布彼黃布故水赤烝棗故華而不實公曰吾詳問子何為對曰嬰聞之詳問者亦詳對之也景公問天下有極大極細晏子對, WYG: ''}
