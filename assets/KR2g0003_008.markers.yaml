  - {type: variant, offset: 23, length: 0, content: '', WYG: 為重名也公逰于紀得金壺發視之中有月書曰食魚無反勿乘駑馬公曰善哉知苦言食魚無反則惡其鱢也勿乘駑馬惡其取道不逺也晏子對曰不然食魚無反毋盡民力乎勿乘駑馬則無置不肖于側乎公曰紀有書何以亡也晏子對曰有以亡也嬰聞之君子有道懸之閭紀有此言注之壺不亡何待乎魯昭公棄國走齊齊公問焉曰君何年之少而棄國之蚤奚道至于此乎昭公對曰吾少之時人多愛我者吾體不能親人多諫我者吾志不能用是則内無拂而外無輔輔拂無一人諂䛕我者甚衆譬之猶秋蓬也孤其根而美枝葉秋風一至根且拔矣景公辯其言以語晏子曰使是人反其國豈不為古之賢君乎晏子對曰不然夫愚者多悔不肖者自賢溺者不問墜迷者不問路溺而後問墜迷而後問路譬之猶臨難而遽鑄兵噎而遽掘井雖速亦無及已晏子使魯仲尼命門弟子往觀子貢反報曰孰謂晏子習于禮乎夫禮曰登階不歴堂上不趨授玉不跪今晏子皆反此孰謂晏子習於禮者晏子既巳有事于魯君退見仲尼仲尼曰夫禮登階不歴堂上不趨授玉不跪夫子反此乎晏子曰嬰聞兩楹之間君臣有位焉君行其一臣行其二君之來遫是以登階歴堂上趨以反位也君授玉卑故跪以下之且吾聞之大者不踰閑小者出入可也晏子出仲尼送之以賔客之禮不計之義維晏子為能行之晏子之魯朝食進餽饍有豚焉晏子曰去其二肩晝者進膳則豚肩不具侍者曰膳豚肩亡晏子曰釋之矣侍者曰我能得其人晏子曰止吾聞之量功而不量力則民盡藏餘不分則民盜子敎我所以改之無敎我求其人也曾子將行晏子送之曰君子贈人以軒不者以言吾請以言乎以軒乎曾子曰請以言晏子曰今夫車輪山之直木也良匠揉之其圓中規雖有槁暴不復嬴矣故君子慎櫽揉和氏之璧井里之困也良工修之則為存國之寶故君子慎所修今夫蘭本三年而成湛之苦酒則君子不近庶人不佩湛之糜醢而賈匹馬矣非蘭本美也所蕩然也願子之必求所湛嬰聞之君子居必擇居㳺必就士擇居所以求士求士所以辟患也嬰聞汨常移質習俗移性不可不慎也晏子之晉至中牟睹敝冠反裘負芻息于塗側者以為君子也使人問焉曰子何為者也對曰我越石父者也晏子曰何為至此曰吾為人臣僕于中牟見使將歸晏子曰何為之僕對曰不免凍餓之切吾身是以為僕也晏子曰為僕幾何對曰三年矣晏子曰可得贖乎對曰可遂解左驂以贈之因載而與之俱歸至舍不辭而入越石父怒而請絶晏子使人應之曰吾未嘗得交夫子也子為僕三年吾迺今日睹而贖之吾于子尚未可乎子何絶我之暴也越石父對之曰臣聞之士者詘乎不知已而伸乎知巳故君子不以功輕人之身不為彼功詘身之理吾三年為人臣僕而莫吾知也今子贖我吾以子為知我矣嚮者子乘不我辭也吾以子為忘今又不辭而入是與臣我者同矣我猶且為臣請鬻于世晏子出見之曰嚮者見客之容而今也見客之意嬰聞之省行者不引其過察實者不譏其辭嬰可以辭而無棄乎嬰誠革之迺今糞灑改席尊醮而禮之越石父曰吾聞之至恭不修途尊禮不受擯夫子禮之僕不敢當也晏子遂以為上客君子曰俗人之有功則徳徳則驕晏子有功免人于厄而反詘下之其去俗亦逺矣此全功之道也晏子為齊相出其御之妻從門間而闚其夫為相御擁大盖策駟門意氣揚揚甚自得也既而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺迺為人僕御然子之意自以為足妾是以求去也其後夫自抑損晏子恠而問之御以實對晏子薦以為大夫燕之㳺士有泯子午者南見晏子于齊言有文章術有條理巨可以補國細可以益晏子者三百篇睹晏子恐慎而不能言晏子假之以悲色開之以禮顔然後能盡其復也客退晏子直席而坐廢朝移旹在側者曰嚮者燕客侍夫子胡為憂也晏子曰燕萬乘之國也齊千里之塗也泯子午以萬乘之國為不足説以千里之塗為不足逺則是千萬人之上也且猶不能殫其言于我況乎齊人之懷善而死者乎吾所以不得睹者豈不多矣然吾失此何之有也齊有北郭騷者結罘罔捆蒲葦織履以養其母猶不足踵門見晏子曰竊説先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金受粟有間晏子見疑于景公出犇過北郭騷之門而辭北郭騷沐浴而見晏子曰夫子將焉適晏子曰見疑于齊君將出犇北郭騷曰夫子勉之矣晏子上車太息而歎曰嬰之亡豈不宜哉亦不知士甚矣晏子行北郭子召其友而告之曰吾説晏子之義而嘗乞所以養母者焉吾聞之養其親者身伉其難今晏子見疑吾將以身死白之著衣冠令其友操劍奉笥而從造于君庭求復者曰晏子天下之賢者也今去齊國齊必侵矣方見國之必侵不若死請以頭託白晏子也因謂其友曰盛吾頭于笥中奉以託退而自刎其友因奉以託其友而謂觀者曰此北郭子為國故死吾將為北郭子死又退而自刎景公聞之大駭乘馹而自追晏子及之國郊請而反之晏子不得巳而反聞北郭子之以死白巳也太息而歎曰嬰之亡豈不宜哉亦愈不知士甚矣景公謂晏子曰吾聞髙糺與夫子逰寡人請見之晏子對曰臣聞之為地戰者不能成其王為禄仕者不能正其君髙糺與嬰為兄弟久矣未嘗干嬰之行特禄仕之臣也何足以補君乎髙糺事晏子而見逐髙糾曰臣事夫子三年無得而卒見逐其説何也晏子曰嬰之家俗有三而子無一焉糾曰可得聞乎晏子曰嬰之家俗閒處從容不談議則疏出不相揚美入不相削行則不與通國事無論驕士慢知者則不朝也此三者嬰之家俗今子是無一馬故嬰非特食餽之長也是以辭晏子春秋巻五欽定四庫全書晏子春秋巻六内篇雜下第六靈公好婦人而丈夫飾者國人盡服之公使吏禁之曰女子而男子飾者裂其衣斷其帶裂衣斷帶相望而不止晏子見公問曰寡人使吏禁女子而男子飾裂斷其衣帶相望而不止者何也晏子對曰君使服之于内而禁之於外猶懸牛首于門而賣馬肉于内也公何以不使内勿服則外莫敢為也公曰善使内勿服踰月而國莫之服齊人甚好轂擊相犯以為樂禁之不止晏子患之廼為新車良馬出與人相犯也曰轂擊者不祥臣其祭祀不順居處不敬乎下車而棄去之然後國人乃不為故曰禁之以制而身不先行民不能止故化其心莫若教也景公畋于梧丘夜猶早公姑坐睡而夢有五丈夫北面常廬稱無罪焉公覺召晏子而告其所夢公曰我其嘗殺不辜誅無罪耶晏子對曰昔者先君靈公畋五丈夫罟而駭獸故殺之斷其頭而葬之命曰五丈夫之丘此其地耶公令人掘而求之則五頭同穴而存焉公曰嘻令吏葬之國人不知其夢也曰君憫白骨而况于生者乎不遺餘力矣不釋餘知矣故曰君子之為善易矣景公為路寢之臺成而不通焉栢常騫曰君為臺甚急臺成君何為而不通焉公曰然有鴞昔者鳴聲無不為也吾惡之甚是以不通焉栢常騫曰臣請禳而去公曰何具對曰築新室為置白茅公使為室成置白茅焉栢常騫夜用事明日問公曰今昔聞鴞聲乎公曰一鳴而不復聞使人徃視之鴞當陛布翌伏地而死公曰子之道若此其明亦能益寡人之夀乎對曰能公曰能益幾何對曰天子九諸侯七大夫五公曰子亦有徴兆之見乎對曰得夀地且動公喜令百官趣具騫之所求栢常騫出遭晏子于塗拜馬前騫辭曰為君禳鴞而殺之君謂騫曰子之道若此其明也亦能益寡人夀乎騫曰能今且大祭為君請夀故將徃以聞晏子曰嘻亦善能為君請夀也雖然吾聞之維以政與徳而順乎神為可以益夀今徒祭可以益夀乎然則福兆有見乎對曰得夀地將動晏子曰騫昔吾見維星絶樞星散地其動汝以是乎栢常騫俯有間仰而對曰然晏子曰為之無益不為無損也汝薄斂毋費民且令君知之景公新成栢寢之室使師開鼔琴師開左撫宮右彈商曰室夕公曰何以知之師開對曰東方之聲薄西方之聲揚公召大匠曰室何為夕大匠曰立室以宮矩為之于是召司空曰立宮何為夕司空曰立宮以城矩為之明日晏子朝公公曰先君太公以營丘之封立城曷為夕晏子對曰古之立國者南望南斗北戴樞星彼安有朝夕哉然而以今之夕者周之建國國之西方以尊周也公蹵然曰古之臣乎景公病水卧十数日夜夢與二日鬭不勝晏子朝公曰夕者夢與二日鬬而寡人不勝我其死乎晏子對曰請召占夢者出于閨使人以車迎占夢者至曰曷為見召晏子曰夜者公夢二日與公鬬不勝公曰寡人死乎故請君占夢是所為也占夢者曰請反其書晏子曰毋反書公所病者隂也日者陽也一隂不勝二陽故病將巳以是對占夢者入公曰寡人夢與二日鬬而不勝寡人死乎占夢者對曰公之所病隂也日者陽也一隂不勝二陽公病將巳居三日公病大愈公且賜占夢者占夢者曰此非臣之力晏子教臣也公召晏子且賜之晏子曰占夢以占之言對故有益也使臣言之則不信矣此占夢之力也臣無功焉公兩賜之曰以晏子不奪人之功以占夢者不蔽人之能景公病疽在背髙子國子請公曰職當撫瘍高子進而撫瘍公曰熱乎曰熱熱何如曰如火其色何如曰如未熟李大小何如曰如豆墮者何如曰如屨辦二子者出晏子請見公曰寡人有病不能勝衣冠以出見夫子夫子其辱視寡人乎晏子入呼宰人具盥御者具巾刷手温之發席傅薦跪請撫瘍公曰其熱何如曰如日其色何如曰如蒼玉大小何如曰如璧其墮者何如曰如珪晏子出公曰吾不見君子不知野人之拙也晏子使吳吳王謂行人曰吾聞晏嬰盖北方辯于辭習于禮者也命儐者曰客見則稱天子請見明日晏子有事行人曰天子請見晏子蹵然行人又曰天子請見晏子蹵然又曰天子請見晏子蹵然者三曰臣受命敝邑之君將使于吳王之所以不敏而迷惑入于天子之朝敢問吳王惡乎存然後吳王曰夫差請見見之以諸侯之禮晏子使楚以晏子短楚人為小門于大門之側而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當從此門入儐者更道從大門入見楚王王曰齊無人耶晏子對曰臨淄三百閭張袂成隂揮汗成雨比肩繼踵而在何為無人王曰然則子何為使乎晏子對曰齊命使各有所主其賢者使使賢王不肖者使使不肖王嬰最不肖故直使楚矣晏子將至楚楚聞之謂左右曰晏嬰齊之習辭者也今方來吾欲辱之何以也左右對曰為其來也臣請縛一人過王而行王曰何為者也對曰齊人也王曰何坐曰坐盗晏子至楚王賜晏子酒酒酣吏二縛一人詣王王曰縛者曷為者也對曰齊人也坐盗王視晏子曰齊人固善盗乎晏子避席對曰嬰聞之橘生淮南則為橘生于淮北則為枳葉徒相似其實味不同所以然者何水土異也今民生長于齊不盗入楚則盗得無楚之水土使民善盗耶王笑曰聖人非所與嬉也寡人反取病焉景公使晏子于楚楚王進橘置削晏子不剖而並食之楚王曰當剖晏子對曰臣聞之賜人主前者𤓰桃不削橘柚不剖今者萬乗無教令臣故不敢剖不然臣非不知也景公飲酒田桓子侍望見晏子而復于公曰請浮晏子公曰何故也無宇對曰晏子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是隠君之賜也公曰諾晏子坐酌者奉觴進之曰君命浮子晏子曰何故也田桓子曰君賜之卿位以尊其身寵之百萬以富其家羣臣其爵莫尊于子祿莫重于子今子衣緇布之衣麋鹿之裘棧軫之車而駕駑馬以朝是則隠君之賜也故浮子晏子避席曰請飲而後辭乎其辭而後飲乎公曰辭然後飲晏子曰君之賜卿位以尊其身嬰非敢為顯受也為行君令也寵以百萬以富其家嬰非敢為富受也為通君賜也臣聞古之賢君有受厚賜而不顧其困族則過之臨事守職不勝其任則過之君之内𨽻臣之父兄若有離散在于野鄙此臣之罪也君之内𨽻臣之所職若有播之在于四方此臣之罪也兵革之不完戰車之不修此臣之罪也若夫敝車駑馬以朝意者非臣之罪乎且臣以君之賜父之黨無不乗車者母之黨無不足于衣食者妻之黨無凍餒者國之閒士待臣而後舉火者数百家如此者為彰君賜乎為隠君賜乎公曰善為我浮無宇也田桓子見晏子獨立于墻隂曰子何為獨立而不憂何不求四鄉之學士可者而與坐晏子曰共立似君子出言而非也嬰惡得學士之可者而與之坐且君子之難得也若美山然名山既多矣松栢既茂矣望之相相然盡目力不知厭而世有所美焉固欲登彼相相之上仡仡然不知厭小人者與此異若部婁之未登善登之無蹊維有楚棘而巳逺望無見也俛就則傷嬰惡能無獨立焉且人何憂静處逺慮見嵗若月學問不厭不知老之將至安用從酒田桓子曰何謂從酒晏子曰無客而飲謂之從酒今若子者晝夜守尊謂之從酒也欒氏髙氏欲逐田氏鮑氏田氏鮑氏先知而遂攻之髙彊曰先得君田鮑安徃遂攻虎門二家召晏子晏子無所從也從者曰何為不助田鮑晏子曰何善焉其助之也何為不助欒髙曰庸愈于彼乎門開公召而入欒髙不勝而出田桓子欲分其家以告晏子晏子曰不可君不能飭法而羣臣専制亂之本也今又欲分其家利其貨是非制也子必致之公且嬰聞之禁者政之本也讓者徳之主也欒髙不讓以至此禍可毋慎乎㢘之謂公正讓之謂保徳凡有血氣者皆有争心蕰利生孽維義可以為長存且分争者不勝其禍辭讓者不失其福子必勿取桓子曰善盡致之公而請老于劇慶氏亡分其邑與晏子􅆁殿其鄙六十晏子弗受子尾曰富者人之所欲也何獨弗欲晏子對曰慶氏之邑足欲故亡吾邑不足欲也益之以􅆁殿廼足欲足欲亡無日矣在外不得宰吾一邑不受􅆁殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫生厚而用利于是乎正徳以幅之使無黜慢謂之幅利利過則為敗吾不敢貪多所謂幅也景公祿晏子以平隂與棠邑反市者十一社晏子辭曰吾君好治宫室民之力弊矣又好盤游翫好以飭女子民之財竭矣又好興師民之死近矣弊其力竭其財近其死下之疾其上甚矣此嬰之所為不敢受也公曰是則可矣雖然君子獨不欲富與貴乎晏子曰嬰聞為人臣者先君後身安國而度家宗君而處身曷為獨不欲富與貴也公曰然則曷以禄夫子晏子對曰君商漁鹽闗市譏而不征耕者十取一焉弛刑罰若死者刑若刑者罰若罰者免若此三言者嬰之禄君之利也公曰此三言者寡人無事焉請以從夫子公既行若三言使人問大國大國之君曰齊安矣使人問小國小國之君曰齊不我加矣晏子相齊三年政平民説梁丘據見晏子中食而肉不足以告景公旦日割地將封晏子晏子辭不受曰富而不驕者未嘗聞之貧而不恨者嬰是也所以貧而不恨者以善為師也今封易嬰之師師巳輕封巳重矣請辭晏子方食景公使使者至分食食之使者不飽晏子亦不飽使者反言之公公曰嘻晏子之家若是其貧也寡人不知是寡人之過也使吏致千金與市租請以奉賔客晏子辭三致之終再拜而辭曰嬰之家不貧以君之賜澤覆三族延及交遊以振百姓君之賜也厚矣嬰之家不貧也嬰聞之夫厚取之君而施之民是臣代君君民也忠臣不為也厚取之君而不施于民是為筐篋之藏也仁人不為也進取于君退得罪于士身死而財遷于它人是為宰藏也智者不為也夫十緫之布一豆之食足于中免矣景公謂晏子曰昔吾先君桓公以書社五百封管仲不辭而受子辭之何也晏子曰嬰聞之聖人千慮必有一失愚人千慮必有一得意者管仲之失而嬰之得者耶故再拜而不敢受命晏子相齊衣十升之布脱粟之食五卵苔菜而巳左右以告公公為之封邑使田無宇致臺與無鹽晏子對曰昔吾先君太公受之營丘為地五百里為世國長自太公至于公之身有数十公矣茍能説其君以取邑不至公之身趣齊搏以求升土不得容足而寓焉嬰聞之臣有徳益禄無徳退禄惡有不肖父為不肖子為封邑以敗其君之政者乎遂不受景公賜晏子邑晏子辭田桓子謂晏子曰君歡然與子邑必不受以恨君何也晏子對曰嬰聞之節受于上者寵長于君儉居處者名廣于外夫長寵廣名君子之事也嬰獨庸能已乎景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者晏子辭曰君之先臣容焉臣不足以嗣之于臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅公笑曰子近市識貴賤乎對曰既竊利之敢不識乎公曰何貴何賤是時也公繁于刑有鬻踊者故對曰踊貴而屨賤公愀然改容公為是省于刑君子曰仁人之言其利博哉晏子一言而齊侯省刑詩曰君子如祉亂庶遄巳其是之謂乎晏子使晉景公更其宅反則成矣既拜廼毁之而為里室皆如其􅁬則使宅人反之且諺曰非宅是卜維隣是卜二三子先卜隣矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其􅃇宅公弗許因陳桓子以請廼許之景公謂晏子曰寡人欲朝夕見為夫子築室于閨内可乎晏子對曰臣聞之隠而顯近而結維至賢耳如臣者飾其容止以待承令猶恐罪戾也今君近之是逺之也請辭景公有愛女請嫁于晏子公廼徃燕晏子之家飲酒酣公見其妻曰此子之内子耶晏子對曰然是也公曰嘻亦老且惡矣寡人有女少且姣請以滿夫子之宮晏子違席而對曰乃此則老且惡嬰與之居故矣故及其少而姣也且人固以壯託乎老姣託乎惡彼嘗託而嬰受之矣君雖有賜可以使嬰倍其託乎再拜而辭晏子朝乗敝車駕駑馬景公見之曰嘻夫子之禄寡耶何乗不任之甚也晏子對曰賴君之賜得以夀三族及國游士皆得生焉臣得暖衣飽食敝車駑馬以奉其身于臣足矣晏子出公使梁丘據遺之輅車乗馬三返不受公不悦趣召晏子晏子至公曰夫子不受寡人亦不乗晏子對曰君使臣臨百官之吏臣節其衣服飲食之養以先國之民然猶恐其侈靡而不顧其行也今輅車乗馬君乗之上而臣亦乗之下民之無義侈其衣服飲食而不顧其行者臣無以禁之遂讓不受晏子相景公食脱粟之食炙三弋五卵苔菜耳矣公聞之徃燕焉睹晏子之食也公曰嘻夫子之家如此其貧乎而寡人不知寡人之罪也晏子對曰以世之不足也免粟之食飽士之一餼也炙三弋士之二餼也五卵士之三餼也嬰無倍人之行而有參士之食君之賜厚矣嬰之家不貧再拜而謝梁丘據謂晏子曰吾至死不及夫子矣晏子曰嬰聞之為者常成行者常至嬰非有異于人也常為而不置常行而不休者故難及也晏子相景公老辭邑公曰自吾先君定公至今用世多矣齊大夫未有老辭邑者矣今夫子獨辭之是毁國之故棄寡人也不可晏子對曰嬰聞古之事君者稱身而食徳厚而受禄徳薄則辭禄徳厚受禄所以明上也徳薄辭禄所以潔下也嬰老薄無能而厚受禄是掩上之明汚下之行不可公不許曰昔吾先君桓公有管仲恤勞齊國身老賞之以三歸澤及子孫今夫子亦相寡人欲為夫子三歸澤至子孫豈不可哉對曰昔者管子事桓公桓公義髙諸侯徳備百姓今嬰事君也國僅齊于諸侯怨積乎百姓嬰之罪多矣而君欲賞之豈以其不肖父其不肖子厚受賞以傷國民義哉且夫徳薄而禄厚智惛而家富是彰汚而逆教也不可公不許晏子出異日朝得間而入邑致車一乗而後止晏子病將死其妻曰夫子無欲言乎子曰吾恐死而俗變謹視爾家毋變爾俗也晏子病將死鑿楹納書焉謂其妻曰楹語也子壮而示之及壮發書之言曰布帛不可窮窮不可飾牛馬不可窮窮不可服士不可窮窮不可任國不可窮窮不可竊也晏子春秋巻六欽定四庫全書晏子春秋巻七外篇上景公飲酒數日而樂釋衣冠自鼔缶謂左右曰仁人亦樂是夫梁丘據對曰仁人之耳目亦猶人也夫奚為獨不樂此也公曰趣駕迎晏子晏子朝以至受觴再拜公曰寡人甚樂此樂欲與夫子共之請去禮晏子對曰君之言過矣羣臣皆欲去禮以事君嬰恐君子之不欲也今齊國五尺之童子力皆過嬰又能勝君然而不敢亂者畏禮義也上若無禮無以使其下下若無禮無以事其上夫麋鹿維無禮故父子同麀人之所以貴于禽獸者以有禮也嬰聞之人君無禮無以臨其邦大夫無禮官吏不恭父子無禮其家必㓙兄弟無禮不能乆同詩曰人而無禮胡不遄死故禮不可去也公曰寡人不敏無良左右淫蠱寡人以至于此請殺之晏子曰左右何罪君若無禮則好禮者去無禮者至君若好禮則有禮者至無禮者去公曰善請易衣革冠更受命晏子避走立乎門外公令人糞灑改席召衣冠以迎晏子晏子入門三讓升階用三獻焉嗛酒嘗膳再拜告饜而出公下拜送之門反命撤酒去樂曰吾以彰晏子之教也景公疥逐痁期而不瘳諸侯之賔問疾者多在梁丘據裔欵言于公曰吾事鬼神豐于先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅于祝固史囂以辭賔公説告晏子晏子對曰日宋之盟屈建問范會之悳于趙武趙武曰夫子家事治言于晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸夏主也公曰據與欵謂寡人能事鬼神故欲誅于祝史子稱是語何故對曰若有徳之君外内不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老夀者為信君使也其言忠信于鬼神其適遇淫君外内頗邪上下怨疾動作辟違從欲厭私髙臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫縱肆行非度無所還忌不思謗讟不憚鬼神神怒民痛無悛于心其祝史薦信是言罪也其盖失數美是矯誣也進退無辭則虚以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚于鬼神公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政偪介之闗暴征其私承嗣大夫彊易其賄布常無藝徴斂無度宫室日更淫樂不違内寵之妾肆奪于市外寵之臣僭令于鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛君若欲誅于祝史修徳而後可公説使有司寛政毁闗去禁薄斂巳責公疾愈景公飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逄伯陵因之蒲姑氏因之而後太公因之古若無死爽鳩氏之樂非君所願也景公至自畋晏子侍于遄臺梁丘據造焉公曰維據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羮焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無争心故詩曰亦有和羮既戒且平奏鬷無言時靡有争先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速髙下出入周流以相濟也君子聴之以平其心心平徳和故詩曰悳音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之専一誰能聴之同之不可也如是公曰善齊有彗星景公使祝禳之晏子諫曰無益也祇取誣焉天道不謟不貳其命若之何禳之也且天之有彗以除穢也君無穢徳又何禳焉若悳之穢禳之何損詩云維此文王小心翼翼昭事上帝聿懐多福厥徳不囘以受方國君無違徳方國將至何患于彗詩曰我無所監夏后及商用亂之故民卒㳅亡若徳之囘亂民將㳅亡祝史之為無能補也公説乃止景公賞賜及後宫文繡被臺榭菽粟食鳬鴈出而見殣謂晏子曰此何為而死晏子對曰此餒而死公曰嘻寡人之無徳也甚矣對曰君之徳著而彰何為無徳也景公曰何謂也對曰君之徳及後宫與臺榭君之玩物衣以文繡君之鳬鴈食以菽粟君之營内自樂延及後宫之族何為其無徳顧臣願有請于君由君之意自樂之心推而與百姓同之則何殣之有君不推此而茍營内好私使財貨衝有所聚菽粟幣帛腐于囷府恵不遍加于百姓公心不周乎萬國則桀紂之所以亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛徳公布之于天下則湯武可為也一殣何足恤哉景公好弋使燭鄒主鳥而亡之公怒詔吏殺之晏子曰燭鄒有罪三請數之以其罪而殺之公曰可于是召而數之公前曰燭鄒汝為吾君主鳥而亡之是罪一也使吾君以鳥之故殺人是罪二也使諸侯聞之以吾君重鳥以輕士是罪三也數燭鄒罪巳畢請殺之公曰勿殺寡人聞命矣景公登箐室而望見人有斷雍門之橚者公令吏拘之顧謂晏子趣誅之晏子黙然不對公曰雍門之橚寡人所甚愛也此見斷之故使夫子誅之黙然而不應何也晏子對曰嬰聞之古者人君出則闢道十里非畏也冕前有旒惡多所見也纊紘充耳惡多所聞也大帶重半鈞舄履倍重不欲輕也刑死之罪日中之朝君過之則赦之嬰未嘗聞為人君而自坐其民者也公曰赦之無使夫子復言景公築長庲之臺晏子侍坐觴三行晏子起舞曰嵗巳暮矣而禾不穫忽忽矣若之何嵗巳寒矣而役不罷惙惙矣如之何舞三而涕下沾襟景公慙焉為之罷長庲之役景公與晏子立曲潢之上望見齊國問晏子曰後世孰將踐有齊國者乎晏子對曰非賤臣之所敢議也公曰胡必然也得者無失則虞夏常存矣晏子對曰臣聞不見足以知之者智也先言而後當者惠也夫智與惠君子之事臣奚足以知之乎雖然臣請陳其為政君彊臣弱政之本也君唱臣和教之隆也刑罰在君民之紀也今夫田無宇二世有功于國而利取分寡公室兼之國權専之君臣易施能無衰乎嬰聞之臣富主亡由是觀之其無宇之後無幾齊國田氏之國也嬰老不能待公之事公若即世政不在公室公曰然則柰何晏子對曰維禮可以巳之其在禮也家施不及國民不懈貨不移工賈不變士不濫官不謟大夫不収公利公曰善今知禮之可以為國也對曰禮之可以為國也乆矣與天地並立君令臣忠父慈子孝兄愛弟敬夫和妻柔姑慈婦聴禮之經也君令而不違臣忠而不二父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而貞姑慈而從婦聴而婉禮之質也公曰善哉寡人廼今知禮之尚也晏子曰夫禮先王之所以臨天下也以為其民是故尚之景公宿于路寢之宫夜分聞西方有男子哭者公悲之明日朝問于晏子曰寡人夜者聞西方有男子哭者聲甚哀氣甚悲是奚為者也寡人哀之晏子對曰西郭徒居布衣之士盆成适也父之孝子兄之順弟也又嘗為孔子門人今其母不幸而死祔柩未葬家貧身老子􅳼恐力不能合祔是以悲也公曰子為寡人弔之因問其偏祔何所在晏子奉命徃弔而問偏之所在盆成适再拜稽首而不起曰偏祔寄于路寢得為地下之臣擁札摻筆給事宫殿中右陛之下願以某日送未得君之意也窮困無以圗之布唇枯舌焦心熱中今君不辱而臨之願君圗之晏子曰然此人之甚重者也而恐君不許也盆成适蹷然曰凡在君耳且臣聞之越王好勇其民輕死楚靈王好細腰其朝多餓死人子胥忠其君故天下皆願得以為子今為人子臣而離散其親戚孝乎哉足以為臣乎若此而得祔是生臣而安死母也若此而不得則臣請輓尸車而寄之于國門外宇溜之下身不敢飲食擁轅執輅木乾鳥栖袒肉暴骸以望君愍之賤臣雖愚竊意明君哀而不忍也晏子入復乎公公忿然作色而怒曰子何必患若言而教寡人乎晏子對曰嬰聞之忠不避危愛無惡言且嬰固以難之矣今君營處為游觀既奪人有又禁其葬非仁也肆心傲聴不恤民憂非義也若何勿聴因道盆成适之辭公喟然太息曰悲乎哉子勿復言廼使男子袒免女子髮笄者以百數為開㐫門以迎盆成适适脱衰絰冠條纓墨縁以見乎公公曰吾聞之五子不滿隅一子可滿朝非廼子耶盆成适于是臨事不敢哭奉事以禮畢出門然後舉聲焉景公問晏子曰治國之患亦有常乎對曰佞人䜛夫之在君側者好惡良臣而行與小人此國之長患也公曰䜛佞之人則誠不善矣雖然則奚曾為國常患乎晏子曰君以為耳目而好繆事則是君之耳目繆也夫上亂君之耳目下使羣臣皆失其職豈不誠足患哉公曰如是乎寡人将去之晏子曰公不能去也公忿然作色不説曰夫子何小寡人甚也對曰臣何敢小也夫能自周于君者才能皆非常也夫藏大不誠于中者必謹小誠于外以成其大不誠入則求君之嗜欲能順之公怨良臣則具其徃失而益之出則行威以取富夫何宻近不為大利變而務與君至義者也此難得其知也公曰然則先聖柰何對曰先聖之治也審見賔客聴治不留羣臣皆得畢其誠䜛諛安得容其私公曰然則夫子扐寡人止之寡人亦事勿用對曰䜛夫佞人之在君側者若社之有鼠也諺言有之曰社鼠不可熏去䜛佞之人隠君之威以自守也是難去焉晏子春秋巻七欽定四庫全書晏子春秋巻八外篇下晏子聘于吳吳王問君子之行何如晏子對曰君順懐之政治歸之不懐暴君之禄不居亂國之位君子見兆則退不與亂國俱滅不與暴君偕亡晏子使吳吳王曰寡人得寄僻陋蠻夷之鄉希見教君子之行請私而無為罪晏子蹵然辟位吳王曰吾聞齊君盖賊以僈野以暴吾子容焉何甚也晏子逡巡而對曰吾聞之微事不通麤事不能者必勞大事不得小事不為者必貧大者不能致人小者不能至人之門者必困此臣之所以仕也如臣者豈能以道食人者哉晏子出王笑曰嗟乎今日吾譏晏子訾猶倮而髙橛者也仲尼曰靈公汙晏子事之以整齊莊公壯晏子事之以宣武景公奢晏子事之以恭儉君子也相三君而善不通下晏子細人也晏子聞之見仲尼曰嬰聞君子有譏于嬰是以來見如嬰者豈能以道食人者哉嬰之宗族待嬰而祀其先人者數百家與齊國之間士待嬰而舉火者數百家臣為此仕者也如臣者豈能以道食人者哉晏子出仲尼送之以賔客之禮再拜其辱反命門弟子曰救民之姓而不夸行補三君而不有晏子果君子也司馬子期問晏子曰士亦有不干君不恤民徒居無為而取名者乎晏子對曰嬰聞之能足以贍上益民而不為者謂之不仁不仁而取名者嬰未得聞之也高子問晏子曰子事靈公莊公景公皆敬子三君之心一耶夫子之心三也晏子對曰善哉問事君嬰聞一心可以事百君三心不可以事一君故三君之心非一也而嬰之心非三心也且嬰之于靈公也盡復而不能立之政所謂僅全其四支以從其君者也及莊公陳武夫尚勇力欲辟勝于邪而嬰不能禁故退而埜處嬰聞之言不用者不受其禄不治其事者不與其難吾于莊公行之矣今之君輕國而重樂薄于民而厚于養籍斂過量使令過任而嬰不能禁嬰庸知其能全身以事君乎晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人将加大誅于子晏子對曰臣請改道易行而治東阿三年不治臣請死之景公許于是明年上計景公迎而賀之曰甚善矣子之治東阿也晏子對曰前臣之治東阿也屬託不行貨賂不至陂池之魚以利貧民當此之時民無飢君反以罪臣今臣後之東阿也屬託行貨賂至并重賦斂倉庫少内便事左右陂池之魚入于權宗當此之時飢者過半矣君廼反迎而賀臣愚不能復治東阿願乞骸骨避賢者之路再拜稽首景公廼下席而謝之曰子彊復治東阿東阿者子之東阿也寡人無復與焉晏子相景公其論人也見賢而進之不同君所欲見不善則廢之不辟君所愛行巳而無私直言而無諱有納書者曰廢置不周于君前謂之專出言不諱于君前謂之易專易之行存則君臣之道廢矣吾不知晏子之為忠臣也公以為然晏子入朝公色不悦故晏子歸備載使人辭曰嬰故老悖無能毋敢服壯者事辭而不為臣退而窮處東畊海濱堂下生藜藿門外生荆棘七年燕魯分争百姓惛亂而家無積公自治國權輕諸侯身弱髙國公恐復召晏子晏子至公一歸七年之禄而家無藏晏子立諸侯忌其威髙國服其政燕魯貢職小國旹朝晏子沒而後衰晏子使高糺治家三年而辭焉儐者諫曰高糺之事夫子三年曾無以爵位而逐之敢請其罪晏子曰若夫方立之人維聖人而巳如嬰者仄陋之人也若夫左嬰右嬰之人不舉曰維将不正今此子事吾三年未嘗弼吾過也吾是以辭之景公問太卜曰汝之道何能對曰臣能動地公召晏子而告之曰寡人問太卜曰汝之道何能對曰能動地地可動乎晏子黙然不對出見太卜曰昔吾見鈎星在四心之間地其動乎太卜曰然晏子曰吾言之恐子死之也黙然不對恐君之惶也子言君臣俱得焉忠于君者豈必傷人哉晏子出太卜走入見公曰臣非能動地地固将動也陳子陽聞之曰晏子黙而不對者不欲太卜之死也徃見太卜者恐君之惶也晏子仁人也可謂忠上而惠下也景公謂晏子曰昔吾先君桓公子管仲狐與榖其縣十七著之于帛申之以策通之諸侯以為其子孫賞邑寡人不足以辱而先君今為夫子賞邑通之子孫晏子辭曰昔聖王論功而賞賢賢者得之不肖者失之御徳修禮無有荒怠今事君而免于罪者其子孫奚宜與焉若為齊國大夫者必有賞邑則齊君何以共其社稷與諸侯幣帛嬰請辭遂不受景公賜晏子狐之白裘𤣥豹之被其貲千金使梁丘據致之晏子辭而不受三反公曰寡人有此二將欲服之今夫子不受寡人不敢服與其閉藏之豈如弊之身乎晏子曰君就賜使嬰修百官之政君服之上而使嬰服之于下不可以為教固辭而不受右複篇}
