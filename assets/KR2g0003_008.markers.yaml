  - {type: variant, offset: 22, length: 0, content: '', WYG: 盡受子叔昭伯曰臣受命于君曰諸侯相見交讓争處其卑禮之文也交委多爭受少行之實也禮成文于前行成章于後交之所以長久也且吾聞君子不盡人之歡不竭人之忠吾是以不盡受也晏子歸報公公喜笑曰魯君猶若是乎晏子曰臣聞大國貪于名小國貪于實此諸侯之公患也今魯處卑而不貪乎尊辭實而不貪乎多行廉不為茍得道義不為茍合不盡人之歡不竭人之忠以全其交君之道義殊于世俗國免於公患公曰寡人説魯君故予之地今行果若此吾將使人賀之晏子曰否君以驩予之地而賀其辭則交不親而地不為徳矣公曰善于是重魯之幣毋比諸侯厚其禮毋比賔客君子于魯而後明行廉辭地之}
