  - {type: variant, offset: 20, length: 0, content: '', WYG: 一心事百君者也栢常騫去周之齊見晏子曰騫周室之賤史也不量其不肖願事君子敢聞正道直行則不容于世隱道危行則不忍道亦無滅身亦無廢者何若晏子曰善哉問事君乎嬰聞之執二灋􅅂則不取也輕進茍合則不信也直易無諱則速傷也新始好利則無敝也且嬰聞養世之君子從重不為進從輕不為退省行而不伐讓利而不夸陳物而勿専見象而勿强道不滅身不廢矣晏子春秋巻四欽定四庫全書晏子春秋巻五内篇襍上第五晏子臣于莊公公不悦飲酒令召晏子晏子至入門公令樂人奏歌曰已哉已哉寡人不能説也爾何來為晏子入坐樂人三奏然後知其謂已也遂起北面坐地公曰夫子從席曷為坐地晏子對曰嬰聞訟夫坐地今嬰將與君訟敢毋坐地乎嬰聞之衆而無義彊而無禮好勇而惡賢者禍必及其身若公者之謂矣且嬰言不用願請身去遂趨而歸管籥其家者納之公財在外者斥之市曰君子有力于民則進爵禄不辭貴富無力于民而旅食不惡貧賤遂徒行而東畊于海濵居數年果有崔杼之難晏子為莊公臣言大用每朝賜爵益邑俄而不用每朝致邑與爵爵邑盡退朝而乘嘳然而歎終而笑其僕曰何歎笑相從數也晏子曰吾嘆也哀吾君不免于難吾笑也喜吾自得也吾亦無死矣崔杼果弑莊公晏子立崔杼之門從者曰死乎晏子曰獨吾君也乎哉吾死也曰行乎曰獨吾罪也乎哉吾亡也曰歸乎曰吾君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若君為已死而為已亡非其私暱孰能任之且人有君而弑之吾焉得死之而焉得亡之將庸何歸門唘而入崔子曰子何不死子何不死晏子曰禍始吾不在也禍終吾不知也吾何為死且吾聞之以亡為行者不足以存君以死為義者不足以立功嬰豈其婢子也哉其縊而從之也遂􅃝免坐枕君尸而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民崔杼既弑莊公而立景公杼與慶封相之刼諸將軍大夫及顯士庶人于太宮之坎上令無得不盟者為壇三仞埳其下以甲千列環其内外盟者皆脱劔而入維晏子不肎崔杼許之有敢不盟者㦸拘其頸劔承其心令自盟曰不與崔慶而與公室者受其不祥言不疾指不至血者死所殺七人次及晏子晏子奉桮血仰天嘆曰嗚呼崔子為無道而弑其君不與公室而與崔慶者受此不祥俛而飲血崔杼謂晏子曰子變子言則齊國吾與子共之子不變子言㦸既在脰劒既在心維子圖之也晏子曰刼吾以刃而失其志非勇也回吾以利而倍其君非義也崔子乎獨不為天討乎詩云莫莫葛虆施于條枚愷悌君子求福不回今嬰且可以回而求福乎曲刃鈎之直兵推之嬰不革矣崔杼將殺之或曰不可子以子之君無道而殺之今其臣有道之士也又從而殺之不可以為敎矣崔子遂舍之晏子曰若大夫為大不仁而為小仁焉有中乎趨出授綏而乘其僕將馳晏子撫其手曰徐之疾不必生徐不必死鹿生于野命縣于厨嬰命有繫矣按之成節而後去詩云彼巳之子舍命不渝晏子之謂也景公使晏子為東阿宰三年毁聞于國景公不説召而免之晏子謝曰嬰知嬰之過矣請復治阿三年而譽必聞于國景公不忍復使治阿三年而譽聞于國景公説召而賞之景公問其故對曰昔者嬰之治阿也築蹊徑急門閭之政而滛民惡之舉儉力孝弟罰偷窳而惰民惡之決獄不避貴强惡之左右所求法則予非法則否而左右惡之事貴人體不過禮而貴人惡之是以三邪毁乎内二䜛毁于内三年而毁聞乎君也今臣謹更之不築蹊徑而緩門閭之政而淫民説不舉儉力孝弟不罰偷窳而惰民説決獄阿貴强而貴强説左右所求言諾而左右説事貴人體過禮而貴人説是三邪譽乎外二讒譽乎内三年而譽聞于君也昔者嬰之所以當誅者宜賞今所以當賞者宜誅是故不敢受景公知晏子賢迺任以國政三年而齊大興景公與晏子立于曲潢之上晏子稱曰衣莫若新人莫若故公曰衣之新也信善矣人之故相知情晏子歸負載使人辭于公曰嬰故老耄無能也請毋服壯者之事公自治國身弱於髙國百姓大亂公恐復召晏子諸侯忌其威而髙國服其政田疇墾辟蠶桑豢牧之處不足絲蠶于燕牧馬于魯共貢入朝墨子聞之曰晏子知道景公知窮矣景公之時饑晏子請為民發粟公不許當為路寢之臺晏子令吏重其賃逺其兆徐其日而不趨三年臺成而民振故上悦乎㳺民足乎食君子曰政則晏子欲發粟與民而巳若使不可得則依物而偶于政景公登東門防民單服然後上公曰此大傷牛馬蹄矣夫何不下六尺哉晏子對曰昔者吾先君桓公明君也而管仲賢相也夫以賢相佐明君而東門防全也古者不為殆有為也蚤嵗溜水至入廣門即下六尺耳鄉者防下六尺則無齊矣夫古之重變古常此之謂也景公逰于夀宮睹長年負薪者而有饑色公悲之喟然歎曰令吏養之晏子曰臣聞之樂賢而哀不肖守國之本也今君愛老而恩無所不逮治國之本也公笑有喜色晏子曰聖王見賢以樂賢見不肖以哀不肖今請求老弱之不養鰥寡之無室者論而共秩焉公曰諾於是老弱有養鰥寡有室景公探雀鷇鷇弱反之晏子聞之不待時而入見景公公汗出惕然晏子曰君何為者也公曰吾探雀鷇鷇弱故反之晏子逡巡北面再拜而賀曰吾君有聖王之道矣公曰寡人探雀鷇鷇弱故反之其當聖王之道者何也晏子對曰君探雀鷇鷇弱反之是長幼也吾君仁愛曾禽獸之加焉而况于人乎此聖王之道也景公睹嬰兒有乞于塗者公曰是無歸夫晏子對曰君存何為無歸使吏養之可立而以聞景公正晝被髪乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慙而不朝晏子睹裔款而問曰君何故不朝對曰昔者君正晝被髪乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慙而出反不果是以不朝晏子入見景公曰昔者寡人有罪被髪乘六馬以出正閨刖跪擊馬而反之曰爾非吾君也寡人以天子大夫之賜得率百姓以守宗廟今見戮于刖跪以辱社稷吾猶可以齊于諸侯乎晏子對曰君勿惡焉臣聞下無直辭上有隱君民多諱言君有驕行古者明君在上下多直辭君上好善民多諱言今君有失行刖跪直辭禁之是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諌公笑曰可乎晏子曰可于是令刖跪倍資無征時朝無事也景公飲酒夜移于晏子前驅款門曰君至晏子被𤣥端立于門曰諸侯得㣲有故乎國家得㣲有事乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于司馬穰苴之家前驅款門曰君至穰苴介冑操㦸立于門曰諸侯得㣲有兵乎大臣得㣲有叛者乎君何為非時而夜辱公曰酒醴之味金石之聲願與將軍樂之穰苴對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于梁丘據之家前驅款門曰君至梁丘據左操瑟右挈竽行歌而出公曰樂哉今夕吾飲也㣲彼二子者何以治吾國㣲此一臣者何以樂吾身君子曰聖賢之君皆有益友無偷樂之臣景公弗能及故兩用之僅得不亡晏子侍于景公朝寒公曰請進暖食晏子對曰嬰非君奉餽之臣也敢辭公曰請進服裘對曰嬰非君茵席之臣也敢辭公曰然夫子之于寡人何為者也對曰嬰社稷之臣也公曰何謂社稷之臣對曰夫社稷之臣能立社稷别上下之義使當其理制百官之序使得其宜作為辭令可分布于四方自是之後君不以禮不見晏晏子飲景公酒令器必新家老曰財不足請斂于氓晏子曰止夫樂者上下同之故天子與天下諸侯與境内大夫以下各與其僚無有獨樂今上樂其樂下傷其費是獨樂音也不可晏子飲景公酒日暮公呼具火晏子辭曰詩云側弁之俄言失徳也屢舞傞傞言失容也既醉以酒既飽以徳既醉而出竝受其福賔主之禮也醉而不出是謂伐徳賔之罪也嬰以卜其日未卜其夜公曰善舉酒祭之再拜而出曰豈過我哉吾託國于晏子也以其家貨養寡人不欲其淫侈也而況與寡人謀國乎晉平公欲伐齊使范昭往觀焉景公觴之飲酒酣范昭曰請君之棄罇公曰酌寡人之罇進之于客范昭巳飲晏子曰徹罇更之罇觶具矣范昭佯醉不悦而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰𡨕臣不習范昭趨而出景公謂晏子曰晉大國也使人來將觀吾政今子怒大國之使者將奈何晏子曰夫范昭之為人也非陋而不知禮也且欲試吾君臣故絶之也景公謂太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也調之必人主舞之今范昭人臣欲舞天子之樂臣故不為也范昭歸以報平公曰齊未可伐也臣欲試其君而晏子識之臣欲犯其禮而太師知之仲尼聞曰夫不出于尊俎之間而知千里之外其晏子之謂也可謂折衝矣而太師其與焉景公伐魯傅許得東門無澤公問馬魯之年榖何如對隂水厥陽冰厚五寸不知以告晏子晏子對曰君子也問年榖而對以冰禮也隂水厥陽冰厚五寸者寒温節節則刑政平平則上下和和則年榖熟年充衆和而伐之臣恐罷民敝兵不成君之意請禮魯以息吾怨遣其執以明吾徳公曰善迺不伐魯景公予魯君地山隂數百社使晏子致之魯使子叔昭伯受地不盡受也晏子曰寡君獻地忠廉也曷}
