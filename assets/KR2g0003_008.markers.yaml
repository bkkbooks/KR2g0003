  - {type: variant, offset: 16, length: 0, content: '', WYG: 之民皆君之臣也而維據盡力以愛君闕景公走狗死公令外共之棺内給之祭晏子聞之諫公曰亦細物也特以與左右為笑耳晏子曰君過矣夫厚籍斂不以反民棄貨財而笑左右傲細民之憂而崇左右之笑則國亦無望巳且夫孤老凍餒而死狗有祭鰥寡不恤而死狗有棺行辟若此百姓聞之必怨吾君諸侯聞之必輕吾國怨聚於百姓而權輕於諸侯而乃以為細物君其圖之公曰善趣庖治狗以會朝屬公孫接田開疆古冶子事景公以勇力搏虎聞晏子過而趨三子者不起晏子入見公曰臣聞明君之蓄勇力之士也上有君臣之義下有長率之倫内可以禁暴外可以威敵上利其功下服其勇故尊其位重其禄今君之蓄勇力之士也上無君臣之義下無長率之倫内不以禁暴外不可威敵此危國之噐也不若去之公曰三子者搏之恐不得刺之恐不中也晏子曰此皆力攻勍敵之人也無長㓜之禮因請公使人少餽之二桃曰三子何不計功而食桃公孫接仰天而歎曰晏子智人也夫使公之計吾功者不受桃是無勇也士衆而桃寡何不計功而食桃矣接一搏􅢢而再搏乳虎若接之功可以食桃而無與人同矣援桃而起田開疆曰吾伏兵而郤三軍者再若開疆之功亦可以食桃而無與人同矣援桃而起古冶子曰吾嘗從君濟於河黿御左驂以入砥柱之流當是時也冶少不能游濳行逆流百歩順流九里得黿而殺之左操驂尾右挈黿頭鶴躍而出津人皆曰河伯也若冶視之則大黿之首若冶之功亦可以食桃而無與人同矣二子何不反桃抽劒而起公孫接田開疆曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也皆反其桃挈領而死古冶子曰二子死之冶獨生之不仁耻人以言而夸其聲不義恨乎所行不死無勇雖然二子同桃而節冶專桃而宜亦反其桃挈領而死使者復曰已死矣公斂之以服葬之以士禮焉景公登射晏子修禮而侍公曰選射之禮寡人厭之矣吾欲得夫勇力士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也夫勇多則弑其君力多則殺其長然而不敢者維禮之謂也禮者所以御民也轡者所以御馬也無禮而能治國家者嬰未之聞也景公曰善廼飾射更席以為上客終日問禮晏子春秋巻二欽定四庫全書晏子春秋巻三内篇問上第三荘公問晏子曰威當世而服天下時耶晏子對曰行也公曰何行對曰能愛邦内之民者能服境外之不善重士民之死力者能禁暴國之邪逆聽任賢者能威諸侯安仁義而樂利世者能服天下不能愛邦内之民者不能服境外之不善輕士民之死力者不能禁暴國之邪逆愎諫傲賢者之言不能威諸侯倍仁義而貪名實者不能威當世而服天下者此其道也已而公不用晏子退而窮處公任勇力之士而輕臣僕之死用兵無休國罷民害朞年百姓大亂而身及崔氏禍君子曰盡忠不豫交不用不懐禄其晏子可謂亷矣荘公將伐晉問于晏子晏子對曰不可君得合而欲多養欲而意驕得合而欲多者危養欲而意驕者困今君任勇力之士以伐明主若不濟國之福也不德而有功憂必及君公作色不說晏子辭不為臣退而窮處堂下生蓼藿門外生荆棘荘公終任勇力之士西伐晉取朝歌及太行孟門兹於兌朞而民散身㓕於崔氏崔氏之亂逐羣公及慶氏亡景公舉兵欲伐魯問於晏子晏子對曰不可魯公好義而民戴之好義者安見戴者和伯禽之治存焉故不可攻攻義者不祥危安者必困且嬰聞之伐人者德足以安其國政足以和其民國安民和然後可以舉兵而征暴今君好酒而辟德無以安國厚藉斂意使令無以和民德無以安之則危政無以和之則亂未免乎危亂之理而欲伐安和之國不可不若脩政而待其君之亂也其君離上怨其下然後伐之則義厚而利多義厚則敵寡利多則民歡公曰善遂不果代魯景公伐斄勝之問晏子曰吾欲賞於斄何如對曰臣聞之以謀勝國者益臣之禄以民力勝國者益民之利故上有羡獲下有加利君上享其名臣下利其實故用智者不偷業用力者不傷苦此古之善伐者也公曰善於是破斄之臣東邑之卒皆有加利是上獨擅名利下流也景公外傲諸侯内輕百姓好勇力崇樂以從嗜欲諸侯不說百姓不親公患之問於晏子曰古之聖王其行若何晏子對曰其行公正而無邪故讒人不得入不阿黨不私色故羣徒之卒不得容薄身厚民故聚斂之人不得行不侵大國之地不耗小國之民故諸侯皆欲其尊不刼人以甲兵不威人以衆彊故天下皆欲其彊德行教訓加於諸侯慈愛利澤加于百姓故海内歸之若流水今衰世君人者辟邪阿黨故讒諂羣徒之卒繁厚身養薄視民故聚斂之人行侵大國之地耗小國之民故諸侯不欲其尊刼人以兵甲威人以衆强故天下不欲其强災害加於諸侯勞苦施於百姓故讐敵進伐天下不救貴威離散百姓不興公曰然則何若對曰請卑辭重幣以說于諸侯輕罪省功以謝于百姓其可乎公曰諾於是卑辭重幣而諸侯附輕罪省功而百姓親故小國入朝燕魯共貢墨子聞之曰晏子知道道在為人而失為已為人者重自為者輕景公自為而小國不為與在為人而諸侯為役則道在為人而行在反已矣故晏子知道矣景公問晏子曰吾欲善治齊國之政以干覇王之諸侯晏子作色對曰官未具也臣數以聞而君不肯聽也故臣聞仲尼居處惰倦亷隅不正則季次原憲侍氣鬱而疾志意不通則仲由卜商侍德不盛行不厚則顔囘騫雍侍今君之朝臣萬人兵車千乗不善政之所失于下霣墜下民者衆矣未有能士敢以聞者臣故曰官未具也公曰寡人今欲從夫子而善齊國之政可乎對曰嬰聞國有具官然後其政可善公作色不說曰齊國雖小柰何謂官不具對曰此非臣之所復也昔吾先君桓公身體惰懈辭令不給則隰朋暱侍右左多過獄讞不中則弦寗暱侍田野不修民氓不安則寗戚暱侍軍吏怠戎士偷則王子成甫暱侍居處佚怠左右懾畏繁乎樂省乎治則東郭牙暱侍德義不中信行衰㣲則管子暱侍先君能以人之長續其短以人之厚補其薄是以辭令窮逺而不逆兵加於有罪而不頓是故諸侯朝其德而天子致其胙今君之過失多矣未有一士以聞也故曰官不具公曰善景公問晏子曰昔吾先君桓公有管仲夷吾保乂齊國能遂武功而立文德糾合兄弟撫存翌州呉越受令荆楚惛憂莫不賔服勤于周室天子加德先君昭功管子之力也今寡人亦欲存齊國之政於夫子夫子以佐佑寡人彰先君之功烈而繼管子之業晏子對曰昔吾先君桓公能任用賢國有什伍治徧細民貴不凌賤冨不傲貧功不遺罷佞不吐愚舉事不私聽獄不阿内妾無羡食外臣無羡禄鰥寡無饑色不以飲食之辟害民之財不以宫室之侈勞人之力節取於民而普施之府無蔵倉無粟上無驕行下無謟德是以管子能以齊國免於難而以吾先君參乎天子今君欲彰先君之功烈而繼管子之業則無以多辟傷百姓無以嗜欲玩好怨諸侯臣孰敢不承善盡力以順君意今君䟽逺賢人而任讒諛使民若不勝藉斂若不得厚取於民而薄其施多求于諸侯而輕其禮府藏朽蠧而禮悖於諸侯菽粟蔵深而怨積于百姓君臣交惡而政刑無常臣恐國之危失而公不得享也又惡能彰先君之功烈而繼管子之業乎景公問晏子莒與魯孰先亡對曰以臣觀之也莒之細人變而不化貪而好假高勇而賤仁士武以疾忿急以速竭是以上不能養其下下不能事其上上下不能相收則政之大體失矣故以臣觀之也莒其先亡公曰魯何如對曰魯之君臣猶好為義下之妥妥也奄然寡聞是以上能養其下下能事其上上下相收政之大體存矣故魯猶可長守然其亦有一焉彼鄒滕雉犇而出其地猶稱公侯大之事小弱之事强乆矣彼周者殷之樹國也魯近齊而親殷以變小國而不服於隣以逺望魯㓕國之道也齊其有魯與莒乎公曰魯與莒之事寡人既得聞之矣寡人之德亦薄然後世孰踐有齊國者對曰田無宇之後為㡬公曰何故也對曰公量小私量大以施於民其與士交也用財無筐篋之藏國人負携其子而歸之若水之流下也夫先與人利而後辭其難不亦寡乎若茍勿辭也從而撫之不亦㡬乎景公問於晏子曰治國何患晏子對曰患夫社䑕公曰何謂也對曰夫社束木而塗之䑕因徃託焉熏之則恐燒其木灌之則恐敗其塗此䑕所以不可得殺者以社故也夫國亦有焉人主左右是也内則蔽善惡于君上外則賣權重于百姓不誅之則為亂誅之則為人主所案據腹而有之此亦國之社䑕也人有酤酒者為噐甚潔清置表甚長而酒酸不售問之里人其故里人云公狗之猛人挈噐而入且酤公酒狗迎而噬之此酒所以酸而不售也夫國亦有猛狗用事者是也有道術之士欲干萬乗之主而用事者迎而齕之此亦國之猛狗也左右為社䑕用事者為猛狗主安得無壅國安得無患乎景公問晏子曰寡人意氣衰身病甚今吾欲具圭璋犧牲令祝宗薦之乎上帝宗廟意者禮可以干福乎晏子對曰嬰聞之古者先君之干福也政必合乎民行必順乎神節宫室不敢大斬伐以無偪山林節飲食無多畋漁以無偪川澤祝宗用事辭罪而不敢有所求也是以神民俱順而山川納禄今君政反乎民而行悖乎神大宫室多斬伐以偪山林羡飲食多畋漁以偪川澤是以民神俱怨而山川收禄司過薦罪而祝宗祈福意者逆乎公曰寡人非夫子無所聞此請革心易行于是廢公阜之遊止海食之獻斬伐者以時畋漁者有數居處飲食節之勿羡祝宗用事辭罪而不敢有所求也故隣國忌之百姓親之晏子没而後衰景公問晏子曰古之盛君其行如何晏子對曰薄于身而厚于民約于身而廣于世其處上也足以明政行教不以威天下其取財也權有無均貧富不以養嗜欲誅不避貴賞不遺賤不淫于樂不遁于哀盡智導民而不伐焉勞力嵗事而不責焉為政尚相利故下不以相害行教尚相愛故民不以相惡為名刑罰中於法廢罪順於民是以賢者處上而不華不肖者處下而不怨四海之内社稷之中粒食之民一意同欲若夫私家之政生有遺教此盛君之行也公不圖晏子曰臣聞問道者更政聞道者更容今君稅斂重故民心離市賈悖故商旅絶玩好充故家貨殚積邪在於上蓄怨蔵於民嗜欲備於側毁非滿於國而公不圖公曰善于是令玩好不御公市不豫宫室不飾業土不成止役輕稅上下行之而百姓相親景公問晏子曰謀必得事必成有術乎晏子對曰有公曰其術如何晏子曰謀度於義者必得事因于民者必成公曰奚謂也對曰其謀也左右無所繫上下無所靡其聲不悖其實不逆謀于上不違天謀于下不違民以此謀者必得矣事大則利厚事小則利薄稱事之小大權利之輕重國有義勞民有如利以此舉事者必成矣夫逃人而謀雖成不安傲民舉事雖成不榮故臣聞義謀之法以民事之本也故及義而謀信民而動未聞不存者也昔三代之興也謀必度其義事必因于民及其衰也建謀不及義興事傷民故度義因民謀事之術也公曰寡人不敏聞善不行其危如何對曰上君全善其次出入焉其次結邪而羞問全善之君能制出入之君時問雖日危尚可以没身羞問之君不能保其身今君雖危尚可没其身也景公問晏子曰莅國治民善為國家者何如晏子對曰舉賢以臨國官能以敕民則其道也舉賢官能則民與若矣公曰雖有賢能吾庸知乎晏子對曰賢而隠庸為賢乎吾君亦不務乎是故不知也公曰請問求賢對曰觀之以其游説之以其行君無以靡曼辯辭定其行無以毁譽非議定其身如此則不為行以揚聲不掩欲以榮君故通則視其所舉窮則視其所不為富則視其所不取夫上士難進而易退也其次易進易退也其下易進難退也以此數物者取人其可乎景公問晏子曰為君身尊民安為臣事治身榮難乎易乎晏子對曰易公曰何若對曰為君節養其餘以顧民則君尊而民安為臣忠信而無踰職業則事治而身榮公又問為君何行則危為臣何行則廢晏子對曰為君厚藉斂而託之為民進讒諛而託之用賢逺公正而託之不順君行此三者則危為臣比周以求進踰職業防下隱利而求多從君不陳過而求親人臣行此三者則廢故明君不以邪觀民守則而不虧立法儀而不犯茍有所求于民而不以身害之是故刑政安於下民心固於上故察士不比周而進不為苟而求言無隂陽行無内外順則進否則退不與上行邪是以進不失亷退不失行也景公問晏子曰寡人持不仁其無義耳也不然北面與夫子而義晏子對曰嬰人臣也公曷為出若言公曰請終問天下之所以存亡晏子曰縵宻不能蔍苴學者詘身無以用人而又不為人用者卑善人不能戚惡人不能踈者危交游朋友從無以說于人又不能說人者窮事君要利大者不得小者不為者餧脩道立義大不能專小不能附者滅此足以觀存亡矣景公問晏子曰君子常行曷若晏子對曰衣冠不中不敢以入朝所言不義不敢以要君行已不順治事不公不敢以莅衆衣冠無不中故朝無竒辟之服所言無不義故下無偽上之報身行順治事公故國無阿黨之義三者君子之常行者也景公問晏子曰賢君之治國若何晏子對曰其政任賢其行愛民其取下節其自養儉在上不犯下在治不傲窮從邪害民者有罪進善舉過者有賞其政刻上而饒下赦過而救窮不因喜以加賞不因怒以加罰不從欲以勞民不脩怒而危國上無驕行下無謟德上無私義下無竊權上無朽蠧之蔵下無凍餒之民不事驕行而尚同其民安樂而尚親賢君之治國若此景公問晏子曰明王之教民何若晏子對曰明其教令而先之以行義養民不苛而防之以刑辟所求于下者不務于上所禁于民者不行于身守于民財無虧之以利立于儀法不犯之以邪苟所求于民不以身害之故下之勸從其教也稱事以任民中聽以禁邪不窮之以勞不害之以實茍所禁于民不以事逆之故下不敢犯其上也古者百里而異習千里而殊俗故明王脩道一民同俗上愛民為法下相親為義是以天下不相遺此明王教民之理也景公問于晏子曰忠臣之事君也何若晏子對曰有難不死出亡不送公不悅曰君裂地而封之䟽爵而貴之君有難不死出亡不送可謂忠乎對曰言而見用終身無難臣奚死焉謀而見從終身不出臣奚送焉若言不用有難而死之是妄死也謀而不從出亡而送之是詐偽也故忠臣也者能納善於君不能與君陷於難景公問晏子曰忠臣之行何如對曰不掩君過諫乎前不華乎外選賢進能不私乎内稱身就位計能定禄睹賢不居其上受禄不過其量不權居以為行不稱位以為忠不揜賢以隠長不刻下以諛上君在不事太子國危不交諸侯順則進否則退不與君行邪也景公問佞人之事君如何晏子對曰意難難不至也明言行之以飾身偽言無欲以說人嚴其交以見其愛觀上之所欲而㣲為之偶求君逼邇而隂為之與内重爵禄而外輕之以誣行下事左右而面示至公以偽亷求上采聽而幸以求進傲禄以求多辭任以求重工乎取鄙乎予歡乎新慢乎故恡乎財薄乎施覩貧窮若不識趨利若不及外交以自揚背親以自厚積豐義之養而聲矜䘏之義非譽乎情而言不行身渉旹所議而好論賢不肖有之已不難非之人無之已不難求之人其言彊梁而信其進敏遜而順此佞人之行也明君之所誅愚君之所信也景公問晏子曰聖人之不得意何如晏子對曰上作事反天時從政逆鬼神籍斂殫百姓四時易序神祗並怨道忠者不聽薦善者不行諛過者有賚救失者有罪故聖人伏匿隠處不干長上潔身守道不與世䧟乎邪是以卑而不失義瘁而不失亷此聖人之不得意也聖人之得意何如對曰世治政平舉事調乎天藉斂和乎百姓樂及其政逺者懐其德四時不失序風雨不降虐天明象而贊地長育而具物神降福而不靡民服教而不偽治無怨業居無廢民此聖人之得意也景公問晏子曰古者君民而不危用國而不弱惡乎失之晏子對曰嬰聞之以邪莅國以暴和民者危脩道以要利得求而返邪者弱古者文王修德不以要利㓕暴不以順紂干崇侯之暴而禮梅伯之醢是以諸侯明乎其行百姓通乎其德故君民而不危用國而不弱也景公問晏子曰古之莅國治民者其任人何如晏子對曰地不同生而任之以一種責其俱生不可得人不同能而任之以一事不可責徧成責焉無已智者有不能給求焉無饜天地有不能贍也故明王之任人謟諛不邇乎左右阿黨不治乎本朝任人之長不强其短任人之工不强其拙此任人之大畧也景公問晏子曰古者離散其民而隕失其國者其常行何如晏子對曰國貧而好大智薄而好專貴賤無親焉大臣無禮焉尚䜛諛而賤賢人樂簡慢而玩百姓國無常法民無經紀好辯以為忠流湎而忘國好兵而忘民肅于罪誅而慢于慶賞樂人之哀利人之難德不足以懐人政不足以惠民賞不足以勸善刑不足以防非亡國之行也今民聞公令如冦讐此古離散其民隕失其國所常行者也景公問晏子曰吾欲和民親下柰何晏子對曰君得臣而任使之與言信必順其令赦其過任大無多責焉使邇臣無求嬖焉無以嗜欲貧其家無信䜛人傷其心家不外求而足事君不因人而進則臣和矣儉於藉斂節于貨財作工不歴時使民不盡力百官節適闗市省征山林陂澤不專其利領民治民勿使煩亂知其貧冨勿使凍餒則民親矣公曰善寡人聞命矣故令諸子無外親謁辟梁丘據無使受報百官節適闗市省征陂澤不禁寃報者過留獄者請焉景公問晏子曰取人得賢之道何如晏子對曰舉之以語考之以事能諭則尚而親之近而勿辱以取人則得賢之道也是以明君居上寡其官而多其行拙于文而工于事言不中不言行不法不為也景公問晏子曰臣之報其君何以晏子對曰臣雖不知必務報君以德士逢有道之君則順其令逢無道之君則争其不義故君者擇臣而使之臣雖賤亦得擇君而事之景公問晏子曰臨國莅民所患何也晏子對曰所患者三忠臣不信一患也信臣不忠二患也君臣異心三患也是以明君居上無忠而不信無信而不忠者是故君臣同欲而百姓無怨也景公問于晏子曰為政何患晏子對曰患善惡之不分公曰何以察之對曰審擇左右善則百僚各得其所宜而善惡分孔子聞之曰此言也信矣善進則不善無由入矣不善進則善無由入矣晏子春秋巻三欽定四庫全書晏子春秋巻四内篇問下第四景公出遊問于晏子曰吾欲觀于轉附朝舞遵海而南至于琅琊寡人何修則夫先王之逰晏子再拜曰善哉君之問也聞天子之諸侯為巡狩諸侯之天子為述職故春省耕而補不足者謂之遊秋省實而助不給者謂之豫夏諺曰吾君不逰我曷以休吾君不豫我曷以助一逰一豫為諸侯度今君之㳺不然師行而糧食貧苦不補勞者不息夫從上歴時而不反謂之流從下而不反謂之連從獸而不歸謂之荒從樂而不歸謂之亡古者聖王無流連之逰荒亡之行公曰善命吏計公掌之粟籍長幼貧氓之數吏所委發廩出粟以予貧民者三千鍾公所身見癃老者七十人振贍然後歸也景公問于晏子曰昔吾先君桓公善飲酒窮樂食味方丈好色無别辟若此何以能率諸侯以朝天子乎晏子對曰昔吾先君桓公變俗以政下賢以身管仲君之賊者也知其能足以安國濟功故迎之于魯郊自御禮之于廟異日君過于康莊聞甯戚歌止車而聽之則賢人之風也舉以為大田先君見賢不留使能不怠是以内政則民懷之征伐則諸侯畏之今君聞先君之過而不能明其大節桓公之霸也君奚疑焉景公問晏子曰昔吾先君桓公從車三百乗九合諸侯一匡天下今吾從車千乘可以逮先君桓公之後乎晏子對曰桓公從車三百乘九合諸侯一匡天下者左有鮑叔右有仲父今君左為倡右為優讒人在前䛕人在後又焉可逮桓公之後者乎景公問晏子廉政而長久其行何也晏子對曰其行水也美哉水乎清清其濁不無雩途其清不無灑除是以長久也公曰㢘政而遫亡其行何也對曰其行石也堅哉石乎落落視之則堅循之則堅内外皆堅無以為久是以遫亡也景公問晏子曰請問為臣之道晏子對曰見善必通不私其利慶善而不有其名稱身居位不為茍進稱事授禄不為茍得體貴側賤不逆其倫居賢不肖不亂其序肥美之地不為私邑賢質之士不為私臣君明其所言民得其所利而不伐其功此臣之道也景公問晏子曰人性有賢不肖可學乎晏子對曰詩云髙山仰止景行行止行之者其人也故諸侯並立善而不怠者為長列士竝學終善者為師景公問晏子曰富民安衆難乎晏子對曰易節欲則民富中聽則民安行此兩者而已矣景公問晏子曰國如何則可謂安矣晏子對曰下無諱言官無怨治通人不華窮民不怨喜樂無羡賞忿怒無羨刑上有禮于士下有恩于民地博不兼小兵强不刼弱百姓内安其政外歸其義可謂安矣景公問晏子曰當今之時諸侯孰危晏子對曰莒其先亡乎公曰何故對曰地侵于齊貨謁于晉是以亡也晏子聘于吳吳王曰子大夫以君命辱在敝邑之地施貺寡人寡人受貺矣願有私問焉晏子逡巡而對曰嬰北方之賤臣也得奉君命以趨于末朝恐辭令不審譏于下吏懼不知所以對者吳王曰寡人聞夫子久矣今乃得見願終其問晏子避席對曰敬受命矣吳王曰國如何則可處如何則可去也晏子對曰嬰聞之親疏得處其倫大臣得盡其忠民無怨治國無虐刑則可處矣是以君子懷不逆之君居治國之位親疏不得居其倫大臣不得盡其忠民多怨治國有虐刑則可去矣是以君子不懷暴君之禄不處亂國之位晏子聘於吳吳王曰敢問長保威强勿失之道若何晏子對曰先民而後身先施而後誅强不暴弱貴不凌賤富不傲貧百姓並進有司不侵民和政平不以威强退人之君不以衆强兼人之地其用灋為時禁暴故世不逆其志其用兵為衆屏患故民不疾其勞此長保威强勿失之道也失此者危矣吳王忿然作色不説晏子曰寡君之事畢矣嬰無斧鑕之罪請辭而行遂不復見晏子使魯見昭公昭公説曰天下以子大夫語寡人者衆矣今得見而羨乎所聞請私而無為罪寡人聞大國之君葢回曲之君也曷為以子大夫之行事回曲之君乎晏子逡巡對曰嬰不肖嬰之族又不若嬰待嬰而祀先者五百家故嬰不敢擇君晏子出昭公語人曰晏子仁人也反亡君安危國而不私利焉僇崔杼之尸滅賊亂之徒不獲名焉使齊外無諸侯之憂内無國家之患不伐功焉鍖然不滿退託於族晏子可謂仁人矣晏子聘于魯魯昭公問焉吾聞之莫三人而迷今吾以魯一國迷慮之不免于亂何也晏子對曰君之所尊舉而富貴入所以與圖身出所以與圖國及左右偪邇皆同於君之心者也犒魯國化而為一心魯無與二其何暇有三夫偪邇于君之側者距本朝之勢國之所以治也左右讒諛相與塞善行之所以衰也士者持禄㳺者養交身之所以危也詩曰芃芃棫樸薪之槱之濟濟辟王左右趨之此言古者聖王明君之使以善也故外知事之情而内得心之誠是以不迷也晏子聘于魯魯昭公問曰夫儼然辱臨敝邑竊甚嘉之寡人受貺請問安國衆民如何晏子對曰嬰聞傲大賤小則國危慢聽厚斂則民散事大養小安國之器也謹聽節儉衆民之術也晏子使晉晉平公饗之文室既静矣晏矣平公問焉曰昔吾先君得衆若何晏子對曰君饗寡君施及使臣御在君側恐懼不知所以對平公曰聞子大夫數矣今廼得見願終聞之晏子對曰臣聞君子如美淵澤容之衆人歸之如魚有依極其㳺泳之樂若淵澤決竭其魚動流夫往者維雨乎不可復已公又問曰請問莊公與今孰賢晏子曰兩君之行不同臣不敢不知也公曰王室之正也諸侯之専制也是以欲聞子大夫之言也對曰先君莊公不安静處樂節飲食不好鐘鼓好兵作武士與同飢渴寒暑君之强過人之量有一過不能已焉是以不免于難今君大宮室美臺榭以辟飢渴寒暑畏禍敬鬼神君之善足以沒身不足以及子孫矣晏子使于晉晉平公問曰吾子之君徳行髙下如何晏子對以小善公曰否吾非問小善問子之君徳行髙下也晏子蹵然曰諸侯之交紹而相見辭之有所隱也君之命質臣無所隱嬰之君無稱焉平公蹵然而辭送再拜而反曰殆哉吾過誰曰齊君不肖直稱之士正在本朝也晏子聘于晉叔向從之宴相與語叔向曰齊其何如晏子對曰此季世也吾弗知齊其為田氏乎叔向曰何謂也晏子曰公棄其民而歸于田氏齊舊四量豆區釜鍾四升為豆各自其四以登于釜釜十則鍾田氏三量皆登一焉鍾乃巨矣以家量貸以公量收之山木如市弗加于山魚鹽蜃蛤弗加于海民參其力二入于公而衣食其一公積朽蠧而老小凍餒國都之市屨賤踊貴民人痛疾或燠休之昔者殷人誅殺不當僇民無時文王慈惠殷衆收䘏無主是故天下歸之無私與維徳之授今公室驕暴而田氏慈惠其愛之如父母而歸之如流水欲無獲民將焉避之箕伯直柄虞遂伯戲其相胡公大姬已在齊矣叔向曰維吾公室亦季世也戎馬不駕卿無軍行公乘無人卒列無長庶民罷敝宫室滋侈道殣相望而女富溢尤民聞公命如逃冦讐欒卻胥原狐續慶伯降在皂𨽻政在家門民無所依而君日不悛以樂惂憂公室之卑其何日之有讒鼎之銘曰昧旦丕顯後世猶怠況日不悛其能久乎晏子曰然則子將若何叔向曰人事畢矣待天而已矣晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之肸之宗十一族維羊舌氏在而已􅆄又無子公室無度幸而得死豈其獲祀焉叔向問晏子曰齊國之徳衰矣今子何若晏子對曰嬰聞事明君者竭心力以沒其身行不逮則退不以誣持禄事惰君者優㳺其身以沒其世力不能則去不以䛕持危且嬰聞君子之事君也進不失忠退不失行不茍合以隱忠可謂不失忠不持利以傷廉可謂不失行叔向曰善哉詩有之曰進退維谷其此之謂歟叔向問晏子曰正士之義邪人之行何如晏子對曰正士處勢臨衆不阿私行于國足養而不忘故通則事上使䘏其下窮則敎下使順其上事君盡禮行忠不矜爵禄不用則去而不議其交友也論身義行不為茍戚不同則疎而不悱不毁進于君不以刻民尊于國故用於上則民安行于下則君尊故得衆上不疑其身用于君不悖于行是以進不喪亡退不危身此正士之行也邪人則不然用于上則虐民行于下則逆上事君茍進不道忠交友茍合不道行持䛕巧以正禄比姦邪以厚養矜爵禄以臨人夸體貌以華世不任于上則輕議不篤于友則好誹故用于上則民憂行于下則君危是以其事君近于罪其交友近于患其得上辟于辱其為生憤於刑故用於上則誅行于下則弑是故交通則辱生患則危此邪人之行也叔向問晏子曰事君之倫徒處之義奚如晏子對曰事君之倫知慮足以安國譽厚足以導民和柔足以懷衆不廉上以為名不倍民以為行上也潔于治已不飾過以求先不讒䛕以求進不阿久私不誣所能次也盡力守職不怠奉官從上不敢惰畏上故不茍忌罪故不辟下也三者事君之倫也及夫大賢則徒處與有事無擇也隨時宜者也有所謂君子者能不足以補上退處不順上治唐園考菲履共恤上令弟長鄉里不夸言不愧行君子也不以上為本不以民為憂内不恤其家外不顧其身㳺夸言愧行自勤于飢寒不及醜儕命之曰狂僻之民明上之所禁也進也不能及上退也不能徒處作窮於富利之門畢志於畎畝之業窮通行無常處之慮佚于心利通不能窮業不成命之曰處封之民明上之所誅也有智不足補君有能不足以勞民俞身徒處謂之傲上茍進不擇所道茍得不知所惡謂之亂賊身無以與君能無以勞民飾徒處之義揚輕上之名謂之亂國明君在上三者不免罪叔向曰賢不肖性夫吾每有問而未嘗自得也叔向問晏子曰世亂不遵道上辟不用義正行則民遺曲行則道廢正行而遺民乎與持民而遺道乎此二者之于行何如晏子對曰嬰聞之卑而不失尊曲而不失正者以民為本也茍持民矣安有遺道茍遺民矣安有正行焉叔向問晏子曰意孰為髙行孰為厚對曰意莫髙于愛民行莫厚于樂民又問曰意孰為下行孰為賤對曰意莫下于刻民行莫賤于害身也叔向問晏子曰嗇吝愛之于行何如晏子對曰嗇者君子之道吝愛者小人之行也叔向曰何謂也晏子曰稱財多寡而節用之富無金藏貧不假貸謂之嗇積多不能分人而厚自養謂之吝不能分人又不能自養謂之愛故夫嗇者君子之道吝愛者小人之行也叔向問晏子曰君子之大義何若嬰子對曰君子之大義和調而不縁溪盎而不苛莊敬而不狡和柔而不銓刻廉而不劌行精而不以明汚齊尚而不以遺罷富貴不傲物貧窮不易行尊賢而退不肖此君子之大義也叔向問晏子曰進不能事上退不能為家傲世樂業枯槁為名不疑其所守者可謂能行其道乎晏子對曰嬰聞古之能行道者世可以正則正不可以正則曲其正也不失上下之倫其曲也不失仁義之理道用與世樂業不用有所依歸不以傲上華世不以枯槁為名故道者世之所以治而身之所以安也今以不事上為道以不顧家為行以枯槁為名世行之則亂身行之則危且天之與地而上下有衰矣明王始立而居國為制矣政敎錯而民行有倫矣今以不事上為道反天地之衰矣以不顧家為行倍先聖之道矣以枯槁為名則世塞政敎之途矣有明上不以為下遭亂世不可以治亂説若道謂之惑行若道謂之狂惑者狂者木石之樸也而道義未戴焉叔向問晏子曰何若則可謂榮矣晏子對曰事親孝無悔往行事君忠無悔往辭和于兄弟信于朋友不諂過不責得言不相坐行不相反在上治民足以尊君在下莅修足以變人身無所咎行無所創可謂榮矣叔向問晏子曰人何以則可謂保其身晏子對曰詩曰既明且哲以保其身夙夜匪懈以事一人不庶幾不要幸先其難乎而後幸得之時其所也失之非其罪也可謂保其身矣曾子問晏子曰古者嘗有上不諌上下不顧民退處山谷以成行義者也晏子對曰察其身無能也而託乎不欲諫上謂之誕意也上惛亂徳義不行而邪辟朋黨賢人不用士亦不易其行而從邪以求進故有隱有不隱其行法士也迺夫議上則不取也夫上不諫上下不顧民退處山谷嬰不識其何以為成行義者也梁丘據問晏子曰子事三君君不同心而子俱順焉仁人固多心乎晏子對曰嬰聞之順愛不懈可以使百姓暴强不忠不可以使一人一心可以事百君三心不可以事一君仲尼聞之曰小子識}
