  - {type: variant, offset: 2, length: 0, content: '', WYG: 上下二篇與漢志八篇之數相合若世所𫝊烏程閔氏刻本以一事而内篇外篇􅃨見所記大同小異者悉移而夾註内篇下殊為變亂無緒今故仍從此本著錄庶㡬猶畧近古焉乾隆四十五年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書晏子春秋巻一内篇諫上第一莊公奮乎勇力}
