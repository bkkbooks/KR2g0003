  - {type: variant, offset: 18, length: 0, content: '', krp: 第一景公置酒㤗山四望而泣晏子諫第二景公夢見彗星使人占之晏子諫第三景公問古而無死其樂若何晏子諫第四景公謂梁丘據與巳和晏子諌第五景公使祝史禳彗星晏子諫第六景公有疾梁丘據裔欵請誅祝史晏子諫第七景公見道殣自慙無悳晏子諌第八景公欲誅斷所愛橚者晏子諫第九景公坐路寢曰請將有此晏子諌第十景公䑓成盆成适願合葬其母晏子諫而許第十一景公築長庲臺晏子舞而諫第十二景公使燭鄒主鳥而亡之公怒將加誅晏子諫第十三景公問治國之患晏子對以佞人䜛夫在君側十四景公問後孰將踐有齊國晏子對㠯田氏第十五晏子使吳吳王問君子之行晏子對以不亂國俱滅第十六吳王問齊君僈暴吾子何容焉晏子對㠯豈能㠯道食人第十七司馬子期問有不干君不䘏民耴名者乎晏子對㠯不仁也第十八高子問事靈公莊公景公皆敬子晏子對㠯一心第十九晏子再治東河上計景公迎賀晏子辤第二十太卜紿景公能動地晏子知其妄使卜自曉公第二十一有獻書譖晏子退耕而國不治復召晏子第二十二晏子使髙糺治家三年而未嘗弼過逐之第二十三景公稱桓公之封管仲益晏子邑辤不受第二十四景公使梁丘據致千金衣裘晏子固辤不受第二十五晏子衣鹿裘㠯朝景公嗟其貧晏子稱有飾第二十六仲尼稱晏子行𥙷三君而不有果君子也第二十七}
