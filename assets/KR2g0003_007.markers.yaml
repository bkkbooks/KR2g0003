  - {type: variant, offset: 0, length: 6032, content: 外篇重而異者景公飲酒命晏子去禮晏子諫景公飲酒數日而樂去冠被裳自鼓盆甕謂左右曰仁人亦樂是夫梁丘據對曰仁人之耳目亦猶人也夫奚為獨不樂此也公曰趣駕迎晏子晏子朝服以至受觴再拜公曰寡人甚樂此樂欲與夫子共之請去禮晏子對曰君之言過矣群臣皆欲去禮以事君嬰恐君之不欲也今齊國五尺之童子力皆過嬰又能勝君然而不敢亂者畏禮義也上若無禮無以使其下下若無禮無以事其上夫麋鹿維無禮故父子同麀夫人之所以貴於禽獸者以有禮也嬰聞之人君無禮無以臨其邦大夫無禮官吏不恭父子無禮其家必凶兄弟無禮不能久同詩曰人而無禮胡不遄死故禮不可去也公曰寡人不敏無良左右淫蠱寡人以至于此請殺之晏子曰左右何罪君若無禮則好禮者去無禮者至君若好禮則有禮者至無禮者去公曰善請易衣革冠更受命晏子避走立乎門外公令人糞灑改席召衣冠以迎晏子晏子入門三讓升階用三獻禮焉嗛酒嘗膳再拜告饜而出公下拜送之門反命撤酒去樂曰吾以彰晏子之教也景公置酒泰山四望而泣晏子諫景公置酒于泰山之上酒酣公四望其地喟然嘆泣數行而下曰寡人將去此堂堂國者而死乎左右佐哀而泣者三人曰吾細人也猶將難死而況公乎棄是國也而死其孰可為乎晏子獨搏其髀仰天而大笑曰樂哉今日之飲也公怫然怒曰寡人有哀子獨大笑何也晏子對曰今日見怯君一諛臣三是以大笑公曰何謂諛怯也晏子曰夫古之有死也令後世賢者得之以息不肖者得之以伏若使古之王者毋知有死自昔先君太公至今尚在而君亦安得此國而哀之夫盛之有衰生之有死天之分也物有必至事有常然古之道也曷為可悲至老尚哀死者怯也左右助哀者諛也怯諛聚居是故笑之公慚而更辭曰我非為去國而死哀也寡人聞之彗星出其所向之國君當之今彗星出而向吾國我是以悲也晏子曰君之行義回邪無德于國穿池沼則欲其深以廣也為臺榭則欲其高且大也賦歛如撝奪誅僇如仇讎自是觀之茀又將出彗星之出庸可懼乎于是公懼迺歸寘池沼廢臺榭薄賦歛緩刑罰三十七日而彗星亡景公夢見彗星使人占之晏子諫景公瞢見彗星明日召晏子而問焉寡人聞之有彗星者必有亡國夜者寡人夢見彗星吾欲召占夢者使占之晏子對曰君居處無節衣服無度不聽正諫興事無已賦歛無厭使民如將不勝萬民懟怨茀星又將見瞢奚獨彗星乎景公問古而無死其樂若何晏子諫景公飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之古若無死爽鳩氏之樂非君所願也景公謂梁丘據與己和晏子諫景公至自畋晏子侍於遄臺梁丘據造焉公曰維據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羹焉水火醯醢鹽梅以烹魚肉燀之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心君臣亦然君所謂可而有否焉臣獻其否以成其可君所謂否而有可焉臣獻其可以去其否是以政平而不干民無爭心故詩曰亦有和羹既戒且平鬷嘏無言時靡有爭先王之濟五味和五聲也以平其心成其政也聲亦如味一氣二體三類四物五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速高下出入周疏以相濟也君子聽之以平其心心平德和故詩曰德音不瑕今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是公曰善景公使祝史禳彗星晏子諫齊有彗星景公使祝禳之晏子諫曰無益也秪取誣焉天道不謟不貳其命若之何禳之也且天之有彗以除穢也君無穢德又何禳焉若德之穢禳之何損詩云維此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國君無違德方國將至何患于彗詩曰我無所監夏后及商用亂之故民卒流亡若德之回亂民將流亡祝史之為無能補也公說乃止景公有疾梁丘據裔款請誅祝史晏子諫遂痁景公疥期而不瘳諸侯之賓問疾者多在梁丘據裔款言於公曰吾事鬼神豐于先君有加矣今君疾病為諸侯憂是祝史之罪也諸侯不知其謂我不敬君盍誅于祝固史嚚以辭賓公說告晏子晏子對曰日宋之盟屈建問范會之德於趙武趙武曰夫子之家事治言于晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈建以語康王康王曰神人無怨宜夫子之光輔五君以為諸侯主也公曰據與款謂寡人能事鬼神故欲誅于祝史子稱是語何故對曰若有德之君外內不廢上下無怨動無違事其祝史薦信無愧心矣是以鬼神用饗國受其福祝史與焉其所以蕃祉老壽者為信君使也其言忠信於鬼神其適遇淫君外內頗邪上下怨疾動作辟違從欲厭私高臺深池撞鐘舞女斬刈民力輸掠其聚以成其違不恤後人暴虐淫縱肆行非度無所還忌不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也其蓋失數美是矯誣也進退無辭則虛以求媚是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也其言僭嫚于鬼神公曰然則若之何對曰不可為也山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之縣鄙之人入從其政偪邇之關暴征其私承嗣大夫彊易其賄布常無藝徵歛無度宮室日更淫樂不違內寵之妾肆奪于市外寵之臣僭令於鄙私欲養求不給則應民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛史君若欲誅於祝修德而後可公說使有司寬政毀關去禁薄歛已責公疾愈景公見道殣自慚無德晏子諫景公賞賜及後宮文繡被臺榭菽粟食鳧鴈出而見殣謂晏子曰此何為而死晏子對曰此餧而死公曰嘻寡人之無德也甚矣對曰君之德著而彰何為無德也景公曰何謂也對曰君之德及後宮與臺榭君之玩物衣以文繡君之鳧鴈食以菽粟君之營內自樂延及後宮之族何為其無德也顧臣願有請于君由君之意自樂之心推而與百姓同之則何殣之有君不推此而苟營內好私使財貨偏有所聚菽粟幣帛腐於囷府惠不遍加于百姓公心不周乎萬國則桀紂之所以亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛德公布之于天下則湯武可為也一殣何足恤哉景公欲誅斷所愛橚者晏子諫景公登箐室而望見人有斷雍門之橚者公令吏拘之顧謂晏子趣誅之晏子默然不對公曰雍門之橚寡人所甚愛也此見斷之故使夫子誅之夫子默然而不應何也晏子對曰嬰聞之古者人君出則闢道十里非畏也冕前有旒惡多所見也纊紘珫耳惡多所聞也泰帶重半鈞舄履倍重不欲輕也刑死之罪日中之朝君過之則赦之嬰未嘗聞為人君而自坐其民者也公曰赦之無使夫子復言景公坐路寢曰誰將有此晏子諫景公坐於路寢曰美哉室其誰將有此乎晏子對曰其田氏乎田無宇為垾矣公曰然則柰何晏子對曰為善者君上之所勸也豈可禁哉夫田氏國門擊柝之家父以託其子兄以託其弟於今三世矣山木如市不加于山魚鹽蚌蜃不加于海民財為之歸今歲凶飢蒿種芼歛不半道路有死人齊舊四量而豆豆四而區區四而釜釜十而鐘田氏四量各加一焉以家量貸以公量收之則所以糴百姓之死命者澤矣今公家驕汰而田氏慈惠國澤是將焉歸田氏雖無德而施于民公厚歛而田氏厚施焉詩曰雖無德與汝式歌且舞田氏之施民歌舞之也國之歸焉不亦宜乎景公臺成盆成适願合葬其母晏子諫而許景公宿于路寢之宮夜分聞西方有男子哭者公悲之明日朝問於晏子曰寡人夜者聞西方有男子哭者聲甚哀氣甚悲是奚為者也寡人哀之晏子對曰西郭徒居布衣之士盆成适也父之孝子兄之順弟也又嘗為孔子門人今其母不幸而死祔柩未葬家貧身老子𡥶恐力不能合祔是以悲也公曰子為寡人弔之因問其偏祔何所在晏子奉命往弔而問偏之所在盆成适再拜稽首而不起曰偏祔寄于路寢得為地下之臣擁札摻筆給事宮殿中右陛之下願以某日送未得君之意也窮困無以圖之布唇枯舌焦心熱中今君不辱而臨之願君圖之晏子曰然此人之甚重者也而恐君不許也盆成适蹶然曰凡在君耳且臣聞之越王好勇其民輕死楚靈王好細腰其朝多餓人子胥忠其君故天下皆願得以為臣曾參孝己愛其親故天下皆願得以為子今為人子臣而離散其親戚孝乎哉足以為子臣乎若此而得祔是生臣而安死母也若此而不得則臣請輓尸車而寄之於國門外宇溜之下身不敢飲食擁轅執輅木乾鳥栖袒肉暴骸以望君愍之賤臣雖愚竊意明君哀而不忍也晏子入復乎公公忿然作色而怒曰子何必患若言而教寡人乎晏子對曰嬰聞之忠不避危愛無惡言且嬰固以難之矣今君營處為游觀既奪人有又禁其葬非仁也肆心傲聽不恤民憂非義也若何勿聽因道盆成适之辭公喟然太息曰悲乎哉子勿復言迺使男子袒免女子髮笄者以百數為開凶門以迎盆成适适脫衰絰冠條纓墨緣以見乎公公曰吾聞之五子不滿隅一子可滿朝非迺子耶盆成适于是臨事不敢哭奉事以禮畢出門然後舉聲焉景公築長庲臺晏子舞而諫景公築長庲之臺晏子侍坐觴三行晏子起舞曰歲已暮矣而禾不穫忽忽矣若之何歲已寒矣而役不罷惙惙矣如之何舞三而涕下沾襟景公慚焉為之罷長庲之役景公使燭鄒主鳥而亡之公怒將加誅晏子諫景公好弋使燭鄒主鳥而亡之公怒詔吏殺之晏子曰燭鄒有罪三請數之以其罪而殺之公曰可於是召而數之公前曰燭鄒汝為吾君主鳥而亡之是罪一也使吾君以鳥之故殺人是罪二也使諸侯聞之以吾君重鳥而輕士是罪三也數燭鄒罪已畢請殺之公曰勿殺寡人聞命矣景公問治國之患晏子對以佞人讒夫在君側景公問晏子曰治國之患亦有常乎對曰佞人讒夫之在君側者好惡良臣而行與小人此國之常患也公曰讒佞之人則誠不善矣雖然則奚曾為國常患乎晏子曰君以為耳目而好繆事則是君之耳目繆也夫上亂君之耳目下使群臣皆失其職豈不誠足患哉公曰如是乎寡人將去之晏子曰公不能去也公忿然作色不說曰夫子何少寡人甚也對曰臣何敢槁也夫能自周於君者才能皆非常也夫藏大不誠于中者必謹小誠於外以成其大不誠入則求君之嗜欲能順之君怨良臣則具其往失而益之出則行威以取富夫何密近不為大利變而務與君至義者也此難得其知也公曰然則先聖柰何對曰先聖之治也審見賓客聽治不留患日不足群臣皆得畢其誠讒諛安得容其私公曰然則夫子助寡人止之寡人亦事勿用對曰讒夫佞人之在君側者若社之有鼠也諺言有之曰社鼠不可熏去讒佞之人隱君之威以自守也是難去焉景公問後世孰將踐有齊者晏子對以田氏景公與晏子立曲潢之上望見齊國問晏子曰後世孰將踐有齊國者乎晏子對曰非賤臣之所敢議也公曰胡必然也得者無失則虞夏常存矣晏子對曰臣聞見足以知之者智也先言而後當者惠也夫智與惠君子之事臣奚足以知之乎雖然臣請陳其為政君彊臣弱政之本也君唱臣和教之隆也刑罰在君民之紀也今夫田無宇二世有功于國而利取分寡公室兼之國權專之君臣易施而無衰乎嬰聞之臣富主亡由是觀之其無宇之後無幾齊國田氏之國也嬰老不能待公之事公若即世政不在公室公曰然則柰何晏子對曰維禮可以已之其在禮也家施不及國民不懈貨不移工賈不變士不濫官不諂大夫不收公利公曰善今知禮之可以為國也對曰禮之可以為國也久矣與天地並立君令臣忠父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮之經也君令而不違臣忠而不二父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而貞姑慈而從婦聽而婉禮之質也公曰善哉寡人迺今知禮之尚也晏子曰夫禮先王之所以臨天下也以為其民是故尚之晏子使吳吳王問君子之行晏子對以不與亂國俱滅晏子聘于吳吳王問君子之行何如晏子對曰君順懷之政治歸之不懷暴君之祿不居亂國之位君子見兆則退不與亂國俱滅不與暴君偕亡吳王問齊君僈暴吾子何容焉晏子對以豈能以道食人晏子使吳吳王曰寡人得寄僻陋蠻夷之鄉希見教君子之行請私而無為罪晏子蹴然辟位吳王曰吾聞齊君蓋賊以僈野以暴吾子容焉何甚也晏子逡巡而對曰臣聞之微事不通麤事不能者必勞大事不得小事不為者必貧大者不能致人小者不能至人之門者必困此臣之所以仕也如臣者豈能以道食人者哉晏子出王笑曰嗟乎今日吾譏晏子猶倮而訾高橛者也司馬子期問有不干君不恤民取名者乎晏子對以不仁也司馬子期問晏子曰士亦有不干君不恤民徒居無為而取名者乎晏子對曰嬰聞之能足以贍上益民而不為者謂之不仁不仁而取名者嬰未得聞之也高子問子事靈公莊公景公皆敬子晏子對以一心高子問晏子曰子事靈公莊公景公皆敬子三君之心一耶夫子之心三也晏子對曰善哉問事君嬰聞一心可以事百君三心不可以事一君故三君之心非一心也而嬰之心非三心也且嬰之於靈公也盡復而不能立之政所謂僅全其四支以從其君者也及莊公陳武夫尚勇力欲辟勝干邪而嬰不能禁故退而埜處嬰聞之言不用者不受其祿不治其事者不與其難吾於莊公行之矣今之君輕國而重樂薄於民而厚于養籍歛過量使令過任而嬰不能禁嬰庸知其能全身以事君乎晏子再治東阿上計景公迎賀晏子辭晏子治東阿三年景公召而數之曰吾以子為可而使子治東阿今子治而亂子退而自察也寡人將加大誅於子晏子對曰臣請改道易行而治東阿三年不治臣請死之景公許之於是明年上計景公迎而賀之曰甚善矣子之治東阿也晏子對曰前臣之治東阿也屬託不行貨賂不至陂池之魚以利貧民當此之時民無飢者而君反以罪臣今臣後之東阿也屬託行貨賂至并重賦歛倉庫少內便事左右陂池之魚入于權家當此之時飢者過半矣君迺反迎而賀臣臣愚不能復治東阿願乞骸骨避賢者之路再拜便僻景公迺下席而謝之曰子彊復治東阿東阿者子之東阿也寡人無復與焉太卜紿景公能動地晏子知其妄使卜自曉公景公問太卜曰汝之道何能對曰臣能動地公召晏子而告之曰寡人問太卜曰汝之道何能對曰能動地地可動乎晏子默然不對出見太卜曰昔吾見鉤星在四心之間地其動乎太卜曰然晏子曰吾言之恐子死之也默然不對恐君之惶也子言君臣俱得焉忠於君者豈必傷人哉晏子出太卜走入見公曰臣非能動地地固將動也陳子陽聞之曰晏子默而不對者不欲太卜之死也往見太卜者恐君之惶也晏子仁人也可謂忠上而惠下也有獻書譖晏子退耕而國不治復召晏子晏子相景公其論人也見賢而進之不同君所欲見不善則廢之不辟君所愛行己而無私直言而無諱有納書者曰廢置不周於君前謂之專出言不諱於君前謂之易專易之行存則君臣之道廢矣吾不知晏子之為忠臣也公以為然晏子入朝公色不悅故晏子歸備載使人辭曰嬰故老悖無能毋敢服壯者事辭而不為臣退而窮處東耕海濱堂下生藜藋門外生荊棘七年燕魯分爭百姓惛亂而家無積公自治國權輕諸侯身弱高國公恐復召晏子晏子至公一歸七年之祿而家無藏晏子立諸侯忌其威高國服其政燕魯貢職小國時朝晏子沒而後衰晏子使高糾治家三年而未嘗弼過逐之晏子使高糾治家三年而辭焉儐者諫曰高糾之事夫子三年曾無以爵位而逐之敢請其罪晏子曰若夫方立之人維聖人而已如嬰者仄陋之人也若夫左嬰右嬰之人不舉四維將不正今此子事吾三年未嘗弼吾過也吾是以辭之景公稱桓公之封管仲益晏子邑辭不受景公謂晏子曰昔吾先君桓公予管仲狐與穀其縣十七著之于帛申之以策通之諸侯以為其子孫賞邑寡人不足以辱而先君今為夫子賞邑通之子孫晏子辭曰昔聖王論功而賞賢賢者得之不肖者失之御德修禮無有荒怠今事君而免于罪者其子孫奚宜與焉若為齊國大夫者必有賞邑則齊君何以共其社稷與諸侯幣帛嬰請辭遂不受景公使梁丘據致千金之裘晏子固辭不受景公賜晏子狐白之裘玄豹之茈其貲千金使梁丘據致之晏子辭而不受三反公曰寡人有此二將欲服之今夫子不受寡人不敢服與其閉藏之豈如弊之身乎晏子曰君就賜使嬰脩百官之政君服之上而使嬰服之于下不可以為教固辭而不受晏子衣鹿裘以朝景公嗟其貧晏子稱有飾晏子相景公布衣鹿裘以朝公曰夫子之家若此其貧也是奚衣之惡也寡人不知是寡人之罪也晏子對曰嬰聞之蓋顧人而後衣食者不以貪昧為非蓋顧人而後行者不以邪辟為累嬰不肖嬰之族又不如嬰也待嬰以祀其先人者五百家嬰又得布衣鹿裘而朝於嬰不有飾乎再拜而辭仲尼稱晏子行補三君而不有果君子也仲尼曰靈公汙晏子事之以整齊莊公壯晏子事之以宣武景公奢晏子事之以恭儉君子也相三君而善不通下晏子細人也晏子聞之見仲尼曰嬰聞君子有譏於嬰是以來見如嬰者豈能以道食人者哉嬰之宗族待嬰而祀其先人者數百家與齊國之閒士待嬰而舉火者數百家臣為此仕者也如臣者豈能以道食人者哉晏子出仲尼送之以賓客之禮再拜其辱反命門弟子曰救民之姓而不夸行補三君而不有晏子果君子也, WYG: ''}
