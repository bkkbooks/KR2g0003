  - {type: variant, offset: 4, length: 0, content: '', SBCK: 第四凢三十章景公問何修則夫先王之游晏子對㠯省耕實第一景公問桓公何以致霸晏子對㠯下贒以身第二景公問欲逮桓公之後晏子對㠯任非其人第三景公問廉政而長乆晏子對㠯其行水也第四景公問爲臣之道晏子對㠯九節第五景公問贒不肖可學乎晏子對㠯彊勉爲上第六景公問富民安衆晏子對㠯節中聽第七景公問􅀦如何則謂安晏子對㠯内安政外歸義第八景公問諸侯孰危晏子對㠯莒其先亡第九景公使吳吳王問可處可去晏子對㠯視􅀦治亂第十景公問保威强不失之道晏子對以先民後身第十一景公使魯魯君問何事囘曲之君晏子對㠯庇族第十二魯昭公問魯一國迷何也晏子對以化爲一心第十三魯昭公問安􅀦衆民晏子對以事大飬小謹節􅃪儉第十四晏子使􅀳􅀳平公問先君得衆若何晏子對以如美淵澤第十五􅀳平公問齊君德行髙下晏子對以小善第十六􅀳叔向問齊􅀦若何晏子對以齊德衰民歸田氏第十七叔向問齊悳衰子若何晏子對以進不失退忠不失行第十八叔向問正士邪人之行如何晏子對㠯使下順逆第十九叔向問事君徒處之義奚如晏子對㠯大贒無擇第二十叔向問處亂世其行正曲晏子對㠯民爲本第二十一叔向問意孰爲髙行孰爲厚晏子􅟃以愛民樂民第二十二叔向嗇吝􅋢扵行何如晏子對嗇者君子之道第二十三叔向問君子之大義何若晏子對以尊贒退不肖第二十四向叔問傲世樂業能行道乎晏子對以狂惑也第二十五叔向問人何若則榮晏子對㠯事君親忠孝第二十六叔向問人何以則可保身晏子對以不要幸第二十七曾子問不諌上不顧民可成行義者晏子以何以成也第二十八梁丘據問子事三君不同心晏子對㠯一心可㠯事百君第二十九栢常騫問道無㓕身無廢晏子對㠯養世君子第三十}
