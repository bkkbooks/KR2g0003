body:
  text: 外篇不合經術者仲尼見景公景公欲封之晏子以為不可仲尼之齊見景公景公説之欲封之以爾稽以告晏子晏子對曰不可彼浩裾自順不可以教下好樂綏於民不可使親治立命而建事不可守職厚葬破民貧國久喪遁哀費日不可使子民行之難者在內而傳者無其外故異于服勉于容不可以道衆而馴百姓自大賢之滅周室之卑也威儀加多而民行滋薄聲樂繁充而世德滋衰今孔丘盛聲樂以侈世飾弦歌鼓舞以聚徒繁登降之禮以示儀務趨翔之節以觀衆傳學不可以儀世勞思不可以補民兼壽不能殫其教當年不能究其禮積財不能贍其樂繁飾邪術以營世君盛為聲樂以淫愚其民其道也不可以示世其教也不可以導民今欲封之以移齊國之俗非所以導衆存民也公曰善于是厚其禮而留其封敬見不問其道仲尼乃行景公上路寢聞哭聲問梁丘據晏子對景公上路寢聞哭聲曰吾若聞哭聲何為者也梁丘據對曰魯孔丘之徒鞠語者也明於禮樂審於服喪其母死葬埋甚厚服喪三年哭泣甚疾公曰豈不可哉而色悅之晏子曰古者聖人非不知能繁登降之禮制規矩之節行表綴之數以教民以為煩人留日故制禮不羡於便事非不知能揚干戚鐘鼓竽瑟以勸衆也以為費財留工故制樂不羡于和民非不知能纍世殫國以奉死哭泣處哀以持久也而不為者知其無補死者而深害生者故不以導民今品人飾禮煩事羡樂淫民崇死以害生三者聖王之所禁也賢人不用德毀俗流故三邪得行于世是非賢不肖雜上妄説邪故好惡不足以導衆此三者路世之政單事之教也公曷為不察聲受而色悅之仲尼見景公景公曰先生奚不見寡人宰乎仲尼遊齊見景公景公曰先生奚不見寡人宰乎仲尼對曰臣聞晏子事三君而得順焉是有三心所以不見也仲尼出景公以其言告晏子晏子對曰不然非嬰為三心三君為一心故三君皆欲其國之安是以嬰得順也嬰聞之是而非之非而是之猶非也孔丘必據處此一心矣仲尼之齊見景公而不見晏子子貢致問仲尼之齊見景公而不見晏子子貢曰見君不見其從政者可乎仲尼曰吾聞晏子事三君而順焉吾疑其為人晏子聞之曰嬰則齊之世民也不維其行不識其過不能自立也嬰聞之有幸見愛無幸見惡誹譽為類聲響相應見行而從之者也嬰聞之以一心事三君者所以順焉以三心事一君者不順焉今未見嬰之行而非其順也嬰聞之君子獨立不慚于影獨寢不慚於魂孔子拔樹削迹不自以為辱窮陳蔡不自以為約非人不得其故是猶澤人之非斤斧山人之非綱罟也出之其口不知其困也始吾望儒而貴之今吾望儒而疑之仲尼聞之曰語有之言發於爾不可止於遠也行存於身不可掩於衆也吾竊議晏子而不中夫人之過吾罪幾矣丘聞君子過人以為友不及人以為師今丘失言於夫子夫子譏之是吾師也因宰我而謝焉然仲尼見之景公出田顧問晏子若人之衆有孔子乎景公出田寒故以為渾猶顧而問晏子曰若人之衆則有孔子焉乎晏子對曰有孔子焉則無有若舜焉則嬰不識公曰孔子之不逮舜為間矣曷為有孔子焉則無有若舜焉則嬰不識晏子對曰是乃孔子之所以不逮舜孔子行一節者也處民之中其過之識況乎處君子之中乎舜者處民之中則自齊乎士處君子之中則齊乎君子上與聖人則固聖人之材也此乃孔子之所以不逮舜也仲尼相魯景公患之晏子對以勿憂仲尼相魯景公患之謂晏子曰鄰國有聖人敵國之憂也今孔子相魯若何晏子對曰君其勿憂彼魯君弱主也孔子聖相也君不如陰重孔子設以相齊孔子強諫而不聽必驕魯而有齊君勿納也夫絶於魯無主于齊孔子困矣居期年孔子去魯之齊景公不納故困於陳蔡之間景公問有臣有兄弟而強足恃乎晏子對不足恃景公問晏子曰有臣而強足恃乎晏子對曰不足恃有兄弟而強足恃乎晏子對曰不足恃公忿然作色曰吾今有恃乎晏子對曰有臣而強無甚如湯有兄弟而強無甚如桀湯有弒其君桀有亡其兄豈以人為足恃哉可以無亡也景公遊牛山少樂請晏子一願景公遊于牛山少樂公曰請晏子一願晏子對曰不嬰何願公曰晏子一願對曰臣願有君而見畏有妻而見歸有子而可遺公曰善乎晏子之願載一願晏子對曰臣願有君而明有妻而材家不貧有良鄰有君而明日順嬰之行有妻而材則使嬰不忘家不貧則不慍朋友所識有良鄰則日見君子嬰之願也公曰善乎晏子之願也晏子對曰臣願有君而可輔有妻而可去有子而可怒公曰善乎晏子之願也景公為大鐘晏子與仲尼柏常騫知將毀景公為大鐘將懸之晏子仲尼柏常騫三人朝俱曰鐘將毀衝之果毀公召三子者而問之晏子對曰鍾大不祀先君而以燕非禮是以曰鍾將毀仲尼曰鍾大而懸下衝之其氣下回而上薄是以曰鍾將毀柏常騫曰今庚申雷日也音莫勝於雷是以曰鍾將毀也田無宇非晏子有老妻晏子對以去老謂之亂田無宇見晏子獨立於閨內有婦人出於室者髮班白衣緇布之衣而無裏裘田無宇譏之曰出於室何為者也晏子曰嬰之家也無宇曰位為中卿食田七十萬何以老妻為對曰嬰聞之去老者謂之亂納少者謂之淫且夫見色而忘義處富貴而失倫謂之逆道嬰可以有淫亂之行不顧于倫逆古之道乎工女欲入身於晏子晏子辭不受有工女託於晏子之家焉者曰婢妾東廓之野人也願得入身比數於下陳焉晏子曰乃今而後自知吾不肖也古之為政者士農工商異居男女有別而不通故士無邪行女無淫事今僕託國主民而女欲奔僕僕必色見而行無廉也遂不見景公欲誅羽人晏子以為法不宜殺景公蓋姣有羽人視景公僭者公謂左右曰問之何視寡人之僭也羽人對曰言亦死而不言亦死竊姣公也公曰合色寡人也殺之晏子不時而入見曰蓋聞君有所怒羽人公曰然色寡人故將殺之晏子對曰嬰聞拒欲不道惡愛不祥雖使色君於法不宜殺也公曰惡然乎若使沐浴寡人將使抱背景公謂晏子東海之中有水而赤晏子詳對景公謂晏子曰東海之中有水而赤其中有棗華而不實何也晏子對曰昔者秦繆公乘龍而理天下以黃布裹蒸棗至東海而捐其布彼黃布故水赤蒸棗故華而不實公曰吾詳問子何為對曰嬰聞之詳問者亦詳對之也景公問天下有極大極細晏子對景公問晏子曰天下有極大乎晏子對曰有鵬足遊浮雲背凌蒼天尾偃天間躍啄北海頸尾咳於天地然而漻漻乎不知六翮之所在公曰天下有極細乎晏子對曰有東海有蟲巢於蚊睫再乳再飛而蚊不為驚臣嬰不知其名而東海漁者命曰焦冥莊公圖莒國人擾紿以晏子在乃止莊公闔門而圖莒國人以為有亂也皆操長兵而立於衢閭公召睢休相而問曰寡人闔門而圖莒國人以為有亂皆摽長兵而立于衢閭奈何休相對曰誠無亂而國以為有則仁人不存請令于國言晏子之在也公曰諾以令於國孰謂國有亂者晏子在焉然後皆散兵而歸君子曰夫行不可不務也晏子存而民心安此非一日之所為也所以見於前信於後者是以晏子立人臣之位而安萬民之心晏子死景公馳往哭哀畢而去景公遊于災聞晏子死公乘侈輿服繁駔驅之而因為遲下車而趨知不若車之遫則又乘比至於國者四下而趨行哭而往至伏尸而號曰子大夫日夜責寡人不遺尺寸寡人猶且淫泆而不收怨罪重積于百姓今天降禍於齊國不加于寡人而加於夫子齊國之社稷危矣百姓將誰告夫晏子死景公哭之稱莫復陳告吾過晏子死景公操玉加於晏子而哭之涕沾襟章子諫曰非禮也公曰安用禮乎昔者吾與夫子遊於公邑之上一日而三不聽寡人今其孰能然乎吾失夫子則亡何禮之有免而哭哀盡而去晏子沒左右諛弦章諫景公賜之魚晏子沒十有七年景公飲諸大夫酒公射出質堂上唱善若出一口公作色太息播弓矢弦章入公曰章未吾失晏子嘗聞吾不善章曰臣聞君好臣服君嗜臣食尺蠖食黃身黃食蒼身蒼君其食諂人言乎公曰善賜弦章魚五十乘弦章歸魚車塞途章撫其僕曰曩之唱善者皆欲此魚也固辭不受群書治要引晏子沒左右諛弦章諫景公賜之魚公曰章自吾失晏子於今十有七年矣未嘗聞吾不善今射出質唱善者如出一口弦章對曰此諸臣之不肖也智不足以知君之不善勇不足以犯君之顏然而有一焉臣聞君好之則臣服之君嗜之則臣食之尺蠖食黃其身黃食蒼其身蒼君其猶有食諂人之言乎公曰善太平御覽人事部六十七引晏子沒左右諛弦章諫景公賜之魚公以五十乘魚賜弦章弦章歸魚車塞塗章撫其御之手曰昔者晏子辭賞以正君故過失不掩今諸臣諂諛以干利吾若受魚是反晏子之義而順諂諛之欲也固辭魚不受君子曰弦章之廉晏子之遺行也
