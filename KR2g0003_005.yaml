body:
  text: 內篇雜上莊公不悅晏子晏子坐地訟公而歸晏子臣於莊公公不悅飲酒令召晏子晏子至入門公令樂人奏歌曰已哉已哉寡人不能說也爾何來為晏子入坐樂人三奏然後知其謂己也遂起北面坐地公曰夫子從席曷為坐地晏子對曰嬰聞訟夫坐地今嬰將與君訟敢毋坐地乎嬰聞之衆而無義彊而無禮好勇而惡賢者禍必及其身若公者之謂矣且嬰言不用願請身去遂趨而歸管籥其家者納之公財在外者斥之市曰君子有力於民則進爵祿不辭貴富無力于民而旅食不惡貧賤遂徒行而東耕於海濱居數年果有崔杼之難莊公不用晏子晏子致邑而退後有崔氏之禍晏子為莊公臣言大用每朝賜爵益邑俄而不用每朝致邑與爵爵邑盡退朝而乘嘳然而歎終而笑其僕曰何歎笑相從數也晏子曰吾嘆也哀吾君不免於難吾笑也喜吾自得也吾亦無死矣崔杼果弒莊公晏子立崔杼之門從者曰死乎晏子曰獨吾君也乎哉吾死也曰行乎曰獨吾罪也乎哉吾亡也曰歸乎曰吾君死安歸君民者豈以陵民社稷是主臣君者豈為其口實社稷是養故君為社稷死則死之為社稷亡則亡之若君為己死而為己亡非其私昵孰能任之且人有君而弒之吾焉得死之而焉得亡之將庸何歸門啓而入崔子曰子何不死子何不死晏子曰禍始吾不在也禍終吾不知也吾何為死且吾聞之以亡為行者不足以存君以死為義者不足以立功嬰豈其婢子也哉其縊而從之也遂袒免坐枕君尸而哭興三踊而出人謂崔子必殺之崔子曰民之望也舍之得民崔慶劫齊將軍大夫盟晏子不與崔杼既弒莊公而立景公杼與慶封相之劫諸將軍大夫及顯士庶人於大宮之坎上令無得不盟者為壇三仞坎其下以甲千列環其內外盟者皆脫劍而入維晏子不肯崔杼許之有敢不盟者戟拘其頸劍承其心令自盟曰不與崔慶而與公室者受其不祥言不疾指不至血者死所殺七人次及晏子晏子奉杯血仰天嘆曰嗚呼崔子為無道而弒其君不與公室而與崔慶者受此不祥俯而飲血崔杼謂晏子曰子變子言則齊國吾與子共之子不變子言戟既在脰劍既在心維子圖之也晏子曰劫吾以刃而失其志非勇也回吾以利而倍其君非義也崔子子獨不為夫詩乎詩云莫莫葛虆施於條枚愷愷君子求福不回今嬰且可以回而求福乎曲刃鉤之直兵推之嬰不革矣崔杼將殺之或曰不可子以子之君無道而殺之今其臣有道之士也又從而殺之不可以為教矣崔子遂舍之晏子曰若大夫為大不仁而為小仁焉有中乎趨出授綏而乘其僕將馳晏子撫其手曰徐之毋失節疾不必生徐不必死鹿生於野命縣于廚嬰命有所繫矣按之成節而後去詩云彼己之子舍命不渝晏子之謂也晏子再治阿而見信景公任以國政景公使晏子為阿宰三年而毀聞於國景公不說召而免之晏子謝曰嬰知嬰之過矣請復治阿三年而譽必聞於國景公不忍復使治阿三年而譽聞於國景公說召而賞之景公問其故對曰昔者嬰之治阿也築蹊徑急門閭之政而淫民惡之舉儉力孝弟罰偷窳而惰民惡之決獄不避貴強貴強惡之左右所求法則豫非法則否而左右惡之事貴人體不過禮而貴人惡之是以三邪毀乎外二讒毀于內三年而毀聞乎君也今臣謹更之不築蹊徑而緩門閭之政而淫民說不舉儉力孝弟不罰偷窳而惰民說決獄阿貴強而貴彊說左右所求言諾而左右說事貴人體過禮而貴人說是以三邪譽乎外二讒譽乎內三年而譽聞于君也昔者嬰之所以當誅者宜賞今所以當賞者宜誅是故不敢受景公知晏子賢乃任以國政三年而齊大興景公惡故人晏子退國亂復召晏子景公與晏子立于曲潢之上晏子稱曰衣莫若新人莫若故公曰衣之新也信善矣人之故相知情晏子歸負載使人辭于公曰嬰故老耄無能也請毋服壯者之事公自治國身弱於高國百姓大亂公恐復召晏子諸侯忌其威而高國服其政田疇墾辟蠶桑豢牧之處不足絲蠶於燕牧馬于魯共貢入朝墨子聞之曰晏子知道景公知窮矣齊饑晏子因路寢之役以振民景公之時饑晏子請為民發粟公不許當為路寢之臺晏子令吏重其賃遠其兆徐其日而不趨三年臺成而民振故上悅乎游民足乎食君子曰政則晏子欲發粟與民而已若使不可得則依物而偶於政景公欲墮東門之堤晏子謂不可變古景公登東門防民單服然後上公曰此大傷牛馬蹄矣夫何不下六尺哉晏子對曰昔者吾先君桓公明君也而管仲賢相也夫以賢相佐明君而東門防全也古者不為殆有為也蚤歲溜水至入廣門即下六尺耳鄉者防下六尺則無齊矣夫古之重變古常此之謂也景公憐饑者晏子稱治國之本以長其意景公遊於壽宮睹長年負薪者而有饑色公悲之喟然令吏養之晏子曰臣聞之樂賢而哀不肖守國之本也今君愛老而恩無所不逮治國之本也公笑有喜色晏子曰聖王見賢以樂賢見不肖以哀不肖今請求老弱之不養鰥寡之無室者論而共秩焉公曰諾于是老弱有養鰥寡有室景公探雀鷇鷇弱反之晏子稱長幼以賀景公探雀鷇鷇弱反之晏子聞之不時而入見公汗出惕然晏子曰君何為者也公曰吾探雀鷇鷇弱故反之晏子逡巡北面再拜而賀曰吾君有聖王之道矣公曰寡人探雀鷇鷇弱故反之其當聖人之道者何也晏子對曰君探雀鷇鷇弱反之是長幼也吾君仁愛曾禽獸之加焉而況于人乎此聖王之道也景公睹乞兒於途晏子諷公使養景公睹嬰兒有乞於塗者公曰是無歸夫晏子對曰君存何為無歸使吏養之可立而以聞景公慚刖跪之辱不朝晏子稱直請賞之景公正晝被髮乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慚而不朝晏子睹裔款而問曰君何故不朝對曰昔者君正晝被髮乘六馬御婦人以出正閨刖跪擊其馬而反之曰爾非吾君也公慚而反不果出是以不朝晏子入見景公曰昔者寡人有罪被髮乘六馬以出正閨刖跪擊馬而反之曰爾非吾君也寡人以子大夫之賜得率百姓以守宗廟今見戮於刖跪以辱社稷吾猶可以齊于諸侯乎晏子對曰君勿惡焉臣聞下無直辭上有隱君民多諱言君有驕行古者明君在上下多直辭君上好善民無諱言今君有失行刖跪直辭禁之是君之福也故臣來慶請賞之以明君之好善禮之以明君之受諫公笑曰可乎晏子曰可於是令刖跪倍資無征時朝無事也景公夜從晏子飲晏子稱不敢與景公飲酒夜移于晏子家前驅款門曰君至晏子被玄端立于門曰諸侯得微有故乎國家得微有事乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之晏子對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移于司馬穰苴之家前驅款門曰君至穰苴介胄操戟立于門曰諸侯得微有兵乎大臣得微有叛者乎君何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂之穰苴對曰夫布薦席陳簠簋者有人臣不敢與焉公曰移於梁丘據之家前驅款門曰君至梁丘據左操瑟右挈竽行歌而出公曰樂哉今夕吾飲也微彼二子者何以治吾國微此一臣者何以樂吾身君子曰聖賢之君皆有益友無偷樂之臣景公弗能及故兩用之僅得不亡景公使進食與裘晏子對以社稷臣晏子侍于景公朝寒公曰請進暖食晏子對曰嬰非君奉餽之臣也敢辭公曰請進服裘對曰嬰非君茵席之臣也敢辭公曰然夫子之於寡人何為者也對曰嬰社稷之臣也公曰何謂社稷之臣對曰夫社稷之臣能立社稷別上下之義使當其理制百官之序使得其宜作為辭令可分布于四方自是之後君不以禮不見晏子晏子飲景公止家老斂欲與民共樂晏子飲景公酒令器必新家老曰財不足請斂于氓晏子曰止夫樂者上下同之故天子與天下諸侯與境內自大夫以下各與其僚無有獨樂今上樂其樂下傷其費是獨樂者也不可晏子飲景公酒公呼具火晏子稱詩以辭晏子飲景公酒日暮公呼具火晏子辭曰詩云側辨之俄言失德也屢舞傞傞言失容也既醉以酒既飽以德既醉而出竝受其福賓主之禮也醉而不出是謂伐德賓之罪也嬰已卜其日未卜其夜公曰善舉酒而祭之再拜而出曰豈過我哉吾託國于晏子也以其家貨養寡人不欲其淫侈也而況與寡人謀國乎晉欲攻齊使人往觀晏子以禮侍而折其謀晉平公欲伐齊使范昭往觀焉景公觴之飲酒酣范昭曰請君之棄樽公曰酌寡人之樽進之于客范昭已飲晏子曰徹樽更之樽觶具矣范昭佯醉不悅而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰冥臣不習范昭趨而出景公謂晏子曰晉大國也使人來將觀吾政今子怒大國之使者將奈何晏子曰夫范昭之為人也非陋而不知禮也臣且欲試吾君故絶之也景公為太師曰子何以不為客調成周之樂乎太師對曰夫成周之樂天子之樂也若調之必人主舞之今范昭人臣也而欲舞天子之樂臣故不為也范昭歸以報平公曰齊未可伐也臣欲試其君而晏子識之臣欲犯其樂而太師知之仲尼聞之曰夫不出於尊俎之間而知衝千里之外其晏子之謂也而太師其與焉景公問東門無澤年穀而對以冰晏子請罷伐魯景公伐魯傅許得東門無澤公問焉魯之年穀何如對曰陰冰凝陽冰厚五寸不知以告晏子晏子對曰君子也問年穀而對以冰禮也陰水厥陽冰厚五寸者寒溫節節則刑政平平則上下和和則年穀熟年充衆和而伐之臣恐罷民弊兵不成君之意請禮魯以息吾怨遣其執以明吾德公曰善乃不伐魯景公使晏子豫魯地而魯使不盡受景公豫魯君地山陰數百社使晏子致之魯使子叔昭伯受地不盡受也晏子曰寡君獻地忠廉也曷為不盡受子叔昭伯曰臣受命於君曰諸侯相見交讓爭處其卑禮之文也交委多爭受少行之實也禮成文于前行成章於後交之所以長久也且吾聞君子不盡人之歡不竭人之忠吾是以不盡受也晏子歸報公公喜笑曰魯君猶若是乎晏子曰臣聞大國貪于名小國貪于實此諸侯之公患也今魯處卑而不貪乎尊辭實而不貪乎多行廉不為苟得道義不為苟合不盡人之歡不竭人之忠以全其交君之道義殊于世俗國免於公患公曰寡人說魯君故豫之地今行果若此吾將使人賀之晏子曰不君以歡豫之地而賀其辭則交不親而地不為德矣公曰善於是重魯之幣毋比諸侯厚其禮毋比賓客君子於魯而後明行廉辭地之可為重名也景公遊紀得金壺中書晏子因以諷之景公遊於紀得金壺發而視之中有丹書曰食魚無反勿乘駑馬公曰善哉知若言食魚無反則惡其鱢也勿乘駑馬惡其取道不遠也晏子對曰不然食魚無反毋盡民力乎勿乘駑馬則無置不肖於側乎公曰紀有書何以亡也晏子對曰有以亡也嬰聞之君子有道懸之閭紀有此言注之壺不亡何待乎景公賢魯昭公去國而自悔晏子謂無及已魯昭公失國走齊景公問焉曰君何年之少而棄國之蚤奚道至於此乎昭公對曰吾少之時人多愛我者吾體不能親人多諫我者吾志不能用也是以內無拂而外無輔也輔拂無一人諂諛我者甚衆譬之猶秋蓬也孤其根而美枝葉秋風一至根且拔矣景公辨其言以語晏子曰使是人反其國豈不為古之賢君乎晏子對曰不然夫愚者多悔不肖者自賢溺者不問隊迷者不問路溺而後問墜迷而後問路譬之猶臨難而遽鑄兵噎而遽掘井雖速亦無及已景公使魯有事已仲尼以為知禮晏子使魯仲尼命門弟子往觀子貢反報曰孰謂晏子習于禮乎夫禮曰登階不歷堂上不趨授玉不跪今晏子皆反此孰謂晏子習于禮者晏子既已有事于魯君退見仲尼仲尼曰夫禮登階不歷堂上不趨授玉不跪夫子反此乎晏子曰嬰聞兩楹之間君臣有位焉君行其一臣行其二君之來遬是以登階歷堂上趨以及位也君授玉卑故跪以下之且吾聞之大者不踰間小者出入可也晏子出仲尼送之以賓客之禮反命門弟子曰不計之義維晏子為能行之晏子之魯進食有豚亡二肩不求其人晏子之魯朝食進餽膳有豚焉晏子曰去其二肩晝者進膳則豚肩不具侍者曰膳豚肩亡晏子曰釋之矣侍者曰我能得其人晏子曰止吾聞之量功而不量力則民盡藏餘不分則民盜子教我所以改之無教我求其人也曾子將行晏子送之而贈以善言曾子將行晏子送之曰嬰聞之君子贈人以軒不若以言嬰請以言之以軒乎曾子曰請以言晏子曰今夫車輪山之直木也良匠揉之其圓中規雖有槁暴不復嬴矣故君子慎隱揉和氏之璧井里之困也良工修之則為存國之寶故君子慎所修今夫蘭本三年而成湛之苦酒則君子不近庶人不佩湛之麋醢而賈匹馬矣非蘭本美也所湛然也願子之必求所湛嬰聞之君子居必擇鄉游必就士擇居所以求士求士所以辟患也嬰聞之汩常移質習俗移性不可不慎也晏子之晉睹齊纍越石父解左驂贖之與歸晏子之晉至中牟睹弊冠反裘負芻息於塗側者以為君子也使人問焉曰子何為者也對曰我越石父者也晏子曰何為而至此曰吾為人臣僕於中牟見使將歸晏子曰何為之僕對曰不免凍餓之切吾身是以為僕也晏子曰為僕幾何對曰三年矣晏子曰可得贖乎對曰可遂解左驂以贈之因載而與之俱歸至舍不辭而入越石父怒而請絶晏子使人應之曰吾未嘗得交夫子也子為僕三年吾乃今日睹而贖之吾於子尚未可乎子何絶我之暴也越石父對之曰臣聞之士者詘乎不己知者而申乎知己者故君子不以功輕人之身不為彼功詘身之理吾三年為人臣僕而莫吾知也今子贖我吾以子為知我矣嚮者子乘不我辭也吾以子為忘今又不辭而入是與臣我者同矣我猶且為臣請鬻於世晏子出見之曰嚮者見客之容而今也見客之意嬰聞之省行者不引其過察實者不譏其辭嬰可以辭而無棄乎嬰誠革之乃令糞灑改席尊醮而禮之越石父曰吾聞之至恭不修途尊禮不受擯夫子禮之僕不敢當也晏子遂以為上客君子曰俗人之有功則德德則驕今晏子有功免人于厄而反詘下之其去俗亦遠矣此全功之道也晏子之御感妻言而自抑損晏子薦以為大夫晏子為齊相出其御之妻從門間而窺其夫其夫為相御擁大蓋策駟馬意氣揚揚甚自得也既而歸其妻請去夫問其故妻曰晏子長不滿六尺身相齊國名顯諸侯今者妾觀其出志念深矣常有以自下者今子長八尺乃為人僕御然子之意自以為足妾是以求去也其後夫自抑損晏子怪而問之御以實對晏子薦以為大夫泯子午見晏子晏子恨不盡其意燕之游士有泯子午者南見晏子於齊言有文章術有條理巨可以補國細可以益晏子者三百篇睹晏子恐慎而不能言晏子假之以悲色開之以禮顏然後能盡其復也客退晏子直席而坐廢朝移時在側者曰嚮者燕客侍夫子胡為憂也晏子曰燕萬乘之國也齊千里之塗也泯子午以萬乘之國為不足說以千里之塗為不足遠則是千萬人之上也且猶不能殫其言於我況乎齊人之懷善而死者乎吾所以不得睹者豈不多矣然吾失此何之有也晏子乞北郭騷米以養母騷殺身以明晏子之賢齊有北郭騷者結罘罔梱蒲葦織履以養其母猶不足踵門見晏子曰竊說先生之義願乞所以養母者晏子使人分倉粟府金而遺之辭金而受粟有間晏子見疑于景公出奔過北郭騷之門而辭北郭騷沐浴而出見晏子曰夫子將焉適晏子曰見疑于齊君將出奔北郭騷曰夫子勉之矣晏子上車太息而歎曰嬰之亡豈不宜哉亦不知士甚矣晏子行北郭子召其友而告之曰吾說晏子之義而嘗乞所以養母者焉吾聞之養及親者身伉其難今晏子見疑吾將以身死白之著衣冠令其友操劍奉笥而從造于君庭求復者曰晏子天下之賢者也今去齊國齊國必侵矣方見國之必侵也不若先死請以頭託白晏子也因謂其友曰盛吾頭于笥中奉以託退而自刎其友因奉託而謂復者曰此北郭子為國故死吾將為北郭子死又退而自刎景公聞之大駭乘馹而自追晏子及之國郊請而反之晏子不得已而反聞北郭子之以死白己也大息而歎曰嬰之亡豈不宜哉亦愈不知士甚矣景公欲見高糾晏子辭以祿仕之臣景公謂晏子曰吾聞高糾與夫子遊寡人請見之晏子對曰臣聞之為地戰者不能成其王為祿仕者不能正其君高糾與嬰為兄弟久矣未嘗干嬰之行補嬰之闕特祿仕之臣也何足以補君乎高糾治晏子家不得其俗乃逐之高糾事晏子而見逐高糾曰臣事夫子三年無得而卒見逐其說何也晏子曰嬰之家俗有三而子無一焉糾曰可得聞乎晏子曰嬰之家俗閒處從容不談議則疏出不相揚美入不相削行則不與通國事無論驕士慢知者則不朝也此三者嬰之家俗今子是無一焉故嬰非特食餽之長也是以辭晏子居喪遜畣家老仲尼善之晏子居晏桓子之喪粗衰斬苴絰帶杖菅屨食粥居倚廬寢苫枕草其家老曰非大夫喪父之禮也晏子曰唯卿為大夫曾子以聞孔子孔子曰晏子可謂能遠害矣不以己之是駁人之非遜辭以避咎義也夫
